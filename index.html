<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:5px;
  padding:10px;
  color:white;
  background:#555;
  border:none;
}

.tab { display:none; }
.active { display:block; }

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

.player {
  width:45px;
  height:45px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  touch-action:none;
}

.teamA { background:#1b5e20; }
.teamB { background:#1565c0; }

.stat-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

.stat-block {
  display:flex;
  align-items:center;
  gap:5px;
}

input { padding:8px; margin:5px; width:80%; }

button { padding:8px; font-size:16px; }

.ai-box {
  background:#eee;
  padding:10px;
  margin:10px;
  border-radius:8px;
}

.history { max-width:400px; margin:auto; text-align:left; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('stats')">Stats</button>
<button onclick="showTab('summary')">Summary</button>
<button onclick="showTab('history')">History</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3>
<input id="teamAInput" value="Colmcille">
<br>
<button onclick="shareTeam('pitchA')">Share Team</button>
</h3>
<div class="pitch" id="pitchA"><div class="line"></div></div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3>
<input id="teamBInput" placeholder="Team B">
<br>
<button onclick="shareTeam('pitchB')">Share Team</button>
</h3>
<div class="pitch" id="pitchB"><div class="line"></div></div>
</div>

<!-- STATS -->
<div id="stats" class="tab">

<h2>Match Stats</h2>

<h3>
<span id="nameA">Colmcille</span> vs 
<span id="nameB">Team B</span>
</h3>

<h1 id="score">0-00 | 0-00</h1>

<button onclick="confirmReset()" style="background:#c62828;color:white;">Reset Match</button>
<button onclick="saveMatch()" style="background:#2e7d32;color:white;">Save</button>

<hr>

<h3>Colmcille</h3>

<div class="stat-row">
<div class="stat-block">Goals <button onclick="gA(-1)">➖</button><span id="gA">0</span><button onclick="gA(1)">➕</button></div>
<div class="stat-block">Points <button onclick="pA(-1)">➖</button><span id="pA">0</span><button onclick="pA(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Wides <button onclick="wA(-1)">➖</button><span id="wA">0</span><button onclick="wA(1)">➕</button></div>
<div class="stat-block">Fouls <button onclick="fA(-1)">➖</button><span id="fA">0</span><button onclick="fA(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Passes <button onclick="paA(-1)">➖</button><span id="paA">0</span><button onclick="paA(1)">➕</button></div>
</div>

<hr>

<h3>Team B</h3>

<div class="stat-row">
<div class="stat-block">Goals <button onclick="gB(-1)">➖</button><span id="gB">0</span><button onclick="gB(1)">➕</button></div>
<div class="stat-block">Points <button onclick="pB(-1)">➖</button><span id="pB">0</span><button onclick="pB(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Wides <button onclick="wB(-1)">➖</button><span id="wB">0</span><button onclick="wB(1)">➕</button></div>
<div class="stat-block">Fouls <button onclick="fB(-1)">➖</button><span id="fB">0</span><button onclick="fB(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Passes <button onclick="paB(-1)">➖</button><span id="paB">0</span><button onclick="paB(1)">➕</button></div>
</div>

</div>

<!-- SUMMARY -->
<div id="summary" class="tab">

<h2>AI Match Insights</h2>

<div class="ai-box">
<h3>Colmcille</h3>
<p id="aiA"></p>
</div>

<div class="ai-box">
<h3>Team B</h3>
<p id="aiB"></p>
</div>

</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>Match History</h2>
<div id="historyList"></div>
</div>

<script>

/* LOAD */
window.onload = function(){
 loadPlayers();
 loadHistory();
 update();
};

/* TABS */
function showTab(id){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* TEAM NAMES */
teamAInput.oninput=()=>nameA.innerText=teamAInput.value;
teamBInput.oninput=()=>nameB.innerText=teamBInput.value;

/* STATS */
let GA=0,PA=0,WA=0,FA=0,PSA=0;
let GB=0,PB=0,WB=0,FB=0,PSB=0;

function update(){
 score.innerText =
  GA+"-"+(PA<10?"0":"")+PA+" | "+
  GB+"-"+(PB<10?"0":"")+PB;

 gA.innerText=GA; pA.innerText=PA; wA.innerText=WA; fA.innerText=FA; paA.innerText=PSA;
 gB.innerText=GB; pB.innerText=PB; wB.innerText=WB; fB.innerText=FB; paB.innerText=PSB;

 updateAI();
}

/* AI */
function updateAI(){
 let attA=GA+PA+WA, scA=GA+PA;
 let attB=GB+PB+WB, scB=GB+PB;

 let effA=attA?Math.round((scA/attA)*100):0;
 let effB=attB?Math.round((scB/attB)*100):0;

 aiA.innerHTML=`Shooting %: ${effA}%<br>Scores/Wides: ${scA}/${WA}<br>Attempts: ${attA}`;
 aiB.innerHTML=`Shooting %: ${effB}%<br>Scores/Wides: ${scB}/${WB}<br>Attempts: ${attB}`;
}

/* FUNCTIONS */
function gA(v){GA=Math.max(0,GA+v);update();}
function pA(v){PA=Math.max(0,PA+v);update();}
function wA(v){WA=Math.max(0,WA+v);update();}
function fA(v){FA=Math.max(0,FA+v);update();}
function paA(v){PSA=Math.max(0,PSA+v);update();}

function gB(v){GB=Math.max(0,GB+v);update();}
function pB(v){PB=Math.max(0,PB+v);update();}
function wB(v){WB=Math.max(0,WB+v);update();}
function fB(v){FB=Math.max(0,FB+v);update();}
function paB(v){PSB=Math.max(0,PSB+v);update();}

/* RESET */
function confirmReset(){
 if(confirm("Reset match?")) resetMatch();
}
function resetMatch(){
 GA=PA=WA=FA=PSA=0;
 GB=PB=WB=FB=PSB=0;
 update();
}

/* HISTORY */
function saveMatch(){
 let h=JSON.parse(localStorage.getItem("gaaHistory")||"[]");
 h.unshift({teamA:teamAInput.value,teamB:teamBInput.value,score:score.innerText,date:new Date().toLocaleString()});
 localStorage.setItem("gaaHistory",JSON.stringify(h));
 loadHistory();
 alert("Saved!");
}

function loadHistory(){
 let h=JSON.parse(localStorage.getItem("gaaHistory")||"[]");
 historyList.innerHTML=h.map(m=>`<div><b>${m.teamA} vs ${m.teamB}</b><br>${m.score}<br><small>${m.date}</small><hr></div>`).join("");
}

/* SHARE */
function shareTeam(id){
 html2canvas(document.getElementById(id)).then(c=>{
  c.toBlob(b=>{
   let f=new File([b],"team.png",{type:"image/png"});
   if(navigator.share){
    navigator.share({files:[f],title:"Team Sheet"});
   }else alert("Sharing not supported");
  });
 });
}

/* PLAYERS */
function addPlayer(n,x,y,p){
 let d=document.createElement("div");
 d.className="player "+(p.id==="pitchA"?"teamA":"teamB");
 d.innerText=n;
 d.style.left=x+"px";
 d.style.top=y+"px";

 d.onclick=()=>{
  let name=prompt("Player:",d.innerText);
  if(name)d.innerText=name;
 };

 let ox,oy;

 d.addEventListener("touchstart",e=>{
  ox=e.touches[0].clientX-d.offsetLeft;
  oy=e.touches[0].clientY-d.offsetTop;
 });

 d.addEventListener("touchmove",e=>{
  let r=p.getBoundingClientRect();
  d.style.left=(e.touches[0].clientX-r.left-ox)+"px";
  d.style.top=(e.touches[0].clientY-r.top-oy)+"px";
 });

 p.appendChild(d);
}

function loadPlayers(){
 let pos=[[170,20],[60,100],[170,100],[280,100],[60,180],[170,180],[280,180],[120,260],[220,260],[60,340],[170,340],[280,340],[60,440],[170,440],[280,440]];
 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],pitchA));
 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],pitchB));
}

</script>

</body>
</html>
