<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.tab { display:none; }
.active { display:block; }

.nav { background:#333; padding:10px; }
.nav button { margin:3px; padding:8px; color:white; background:#555; border:none; }

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.player {
  width:48px; height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

.subs { margin:10px; }

.dot {
  width:20px; height:20px;
  border-radius:50%;
  background:#ccc;
  display:inline-block;
  margin:3px;
}
.used { background:red; }

button { margin:4px; padding:10px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Columkill</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('score')">Score</button>
<button onclick="showTab('history')">History</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3>Columkill</h3>
<div class="pitch" id="pitchA"></div>
<button onclick="formation('A')">Formation</button>
<div class="subs" id="subsA"></div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3 id="teamBName" contenteditable="true" oninput="updateTeamB()">Team B</h3>
<div class="pitch" id="pitchB"></div>
<button onclick="formation('B')">Formation</button>
<div class="subs" id="subsB"></div>
</div>

<!-- SCORE -->
<div id="score" class="tab">
<h3>Score</h3>
<h4>Columkill vs <span id="scoreTeamB">Team B</span></h4>

<div id="scoreDisplay">0-00</div>

<button onclick="goal()">+ Goal</button>
<button onclick="point()">+ Point</button>
<button onclick="wide()">+ Wide</button>

<p>Wides: <span id="wides">0</span></p>

<button onclick="saveMatch()">Save Match</button>
<button onclick="exportReport()">Export Report</button>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h3>Match History</h3>
<div id="historyList"></div>
</div>

<script>

// NAV
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// TEAM NAME
function updateTeamB(){
 let name=document.getElementById("teamBName").innerText;
 document.getElementById("scoreTeamB").innerText=name;
}

// SCORE
let goals=0, points=0, wides=0;

function updateScore(){
 document.getElementById("scoreDisplay").innerText =
  goals + "-" + (points<10?"0":"") + points;
 document.getElementById("wides").innerText=wides;
}

function goal(){ goals++; updateScore(); }
function point(){ points++; updateScore(); }
function wide(){ wides++; updateScore(); }

// PLAYERS
function createPlayer(n,x,y,team){
 let pitch = team==="A"?pitchA:pitchB;

 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let ox, oy;

 p.addEventListener("touchstart",e=>{
  ox=e.touches[0].clientX-p.offsetLeft;
  oy=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let r=pitch.getBoundingClientRect();
  p.style.left=e.touches[0].clientX-r.left-ox+"px";
  p.style.top=e.touches[0].clientY-r.top-oy+"px";
 });

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
}

function clear(team){
 let pitch = team==="A"?pitchA:pitchB;
 pitch.innerHTML="";
}

function formation(team){
 clear(team);

 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],team));
}

// SUB DOTS
function createSubs(id){
 let container=document.getElementById(id);
 container.innerHTML="";
 for(let i=0;i<5;i++){
  let d=document.createElement("div");
  d.className="dot";
  d.onclick=()=>d.classList.toggle("used");
  container.appendChild(d);
 }
}

createSubs("subsA");
createSubs("subsB");

// SAVE HISTORY
function saveMatch(){
 let history=JSON.parse(localStorage.getItem("history")||"[]");

 let match={
  teamB:document.getElementById("teamBName").innerText,
  score:goals+"-"+points
 };

 history.push(match);
 localStorage.setItem("history",JSON.stringify(history));

 loadHistory();
 alert("Saved");
}

function loadHistory(){
 let history=JSON.parse(localStorage.getItem("history")||"[]");
 let list=document.getElementById("historyList");
 list.innerHTML="";

 history.forEach((m,i)=>{
  let div=document.createElement("div");
  div.innerText=`${i+1}. Columkill vs ${m.teamB} (${m.score})`;
  list.appendChild(div);
 });
}

loadHistory();

// EXPORT REPORT
function exportReport(){
 let teamB = document.getElementById("teamBName").innerText;

 let now = new Date();
 let date = now.toLocaleDateString();
 let time = now.toLocaleTimeString();

 let report =
`Match Report
Columkill vs ${teamB}

Score: ${goals}-${points}
Wides: ${wides}

Date: ${date}
Time: ${time}`;

 navigator.clipboard.writeText(report);
 alert("Report copied");
}

</script>

</body>
</html>
