<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAA Match Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: white;
  text-align: center;
}

.tabs {
  display: flex;
  background: #333;
}

.tabs button {
  flex: 1;
  padding: 15px;
  color: white;
  background: #333;
  border: none;
  cursor: pointer;
}

.tabs button.active {
  background: #4CAF50;
}

.tab-content {
  display: none;
  padding: 20px;
}

.tab-content.active {
  display: block;
}

.scoreboard {
  font-size: 28px;
  margin: 20px 0;
}

button {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="tabs">
  <button class="tablink active" onclick="openTab(event,'match')">Match</button>
  <button class="tablink" onclick="openTab(event,'stats')">Stats</button>
</div>

<!-- MATCH TAB -->
<div id="match" class="tab-content active">

  <h2>Score</h2>

  <div class="scoreboard">
    Home: <span id="homeScore">0</span> |
    Away: <span id="awayScore">0</span>
  </div>

  <h3>Home Team</h3>
  <button onclick="addScore('home',1)">+1 Point</button>
  <button onclick="addScore('home',3)">+1 Goal</button>

  <h3>Away Team</h3>
  <button onclick="addScore('away',1)">+1 Point</button>
  <button onclick="addScore('away',3)">+1 Goal</button>

</div>

<!-- STATS TAB -->
<div id="stats" class="tab-content">

  <h2>Stats</h2>

  <h3>Home Team</h3>
  Fouls: <span id="homeFouls">0</span>
  <button onclick="addStat('homeFouls')">+</button><br>

  Wides: <span id="homeWides">0</span>
  <button onclick="addStat('homeWides')">+</button><br>

  Turnovers: <span id="homeTurnovers">0</span>
  <button onclick="addStat('homeTurnovers')">+</button><br>

  Tackles: <span id="homeTackles">0</span>
  <button onclick="addStat('homeTackles')">+</button><br>

  Passes: <span id="homePasses">0</span>
  <button onclick="addStat('homePasses')">+</button>

  <h3>Away Team</h3>
  Fouls: <span id="awayFouls">0</span>
  <button onclick="addStat('awayFouls')">+</button><br>

  Wides: <span id="awayWides">0</span>
  <button onclick="addStat('awayWides')">+</button><br>

  Turnovers: <span id="awayTurnovers">0</span>
  <button onclick="addStat('awayTurnovers')">+</button><br>

  Tackles: <span id="awayTackles">0</span>
  <button onclick="addStat('awayTackles')">+</button><br>

  Passes: <span id="awayPasses">0</span>
  <button onclick="addStat('awayPasses')">+</button>

</div>

<script>

let scores = {
  home: 0,
  away: 0
};

function addScore(team, value) {
  scores[team] += value;
  document.getElementById(team + "Score").innerText = scores[team];
}

function addStat(stat) {
  let el = document.getElementById(stat);
  el.innerText = parseInt(el.innerText) + 1;
}

function openTab(evt, tabName) {
  let tabcontent = document.getElementsByClassName("tab-content");
  for (let i = 0; i < tabcontent.length; i++) {
    tabcontent[i].classList.remove("active");
  }

  let tablinks = document.getElementsByClassName("tablink");
  for (let i = 0; i < tablinks.length; i++) {
    tablinks[i].classList.remove("active");
  }

  document.getElementById(tabName).classList.add("active");
  evt.currentTarget.classList.add("active");
}

</script>

</body>
</html>
