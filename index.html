<div id="stats" class="section">

<button onclick="sharePage()">Share</button>

<div class="stat-line">Goals

<button onclick="updateHome('points',-1)">-</button>

<button onclick="updateHome('wides',-1)">-</button>
<span id="home_wides">0</span>
<button onclick="updateHome('wides',1)">+</button>
</div>

<div class="stat-line">Fouls 
<button onclick="updateHome('fouls',-1)">-</button>
<span id="home_fouls">0</span>

</div>

<div class="stat-line">Passes

</div>

<button onclick="updateHome('turnovers',-1)">-</button>

<span id="away_goals">0</span>
<button onclick="updateAway('goals',1)">+</button>
</div>

<div class="stat-line">Points 
<button onclick="updateAway('points',-1)">-</button>

</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Match History</h2>
<button onclick="shareHistory()">Share History</button>

<div id="historyList"></div>
</div>

<script>

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

let stats = {
  home:{goals:0,points:0,wides:0,fouls:0,passes:0,turnovers:0},
  away:{goals:0,points:0}
};

function updateHome(type,val){
  stats.home[type]=Math.max(0,stats.home[type]+val);
  document.getElementById("home_"+type).innerText=stats.home[type];
  updateScore();
}

function updateAway(type,val){
  stats.away[type]=Math.max(0,stats.away[type]+val);
  document.getElementById("away_"+type).innerText=stats.away[type];
  updateScore();
}

function updateScore(){
  scoreboard.innerText =
    stats.home.goals+"-"+String(stats.home.points).padStart(2,"0")+
    " | "+
    stats.away.goals+"-"+String(stats.away.points).padStart(2,"0");
}

/* SAVE */
function saveMatch(){
  let history = JSON.parse(localStorage.getItem("gaaHistory") || "[]");

  history.push({
    score: scoreboard.innerText,
    home: {...stats.home}
  });

  localStorage.setItem("gaaHistory", JSON.stringify(history));
  loadHistory();
  alert("Match Saved");
}

/* DELETE */
function deleteMatch(i){
  let history = JSON.parse(localStorage.getItem("gaaHistory") || "[]");
  history.splice(i,1);
  localStorage.setItem("gaaHistory", JSON.stringify(history));
  loadHistory();
}

/* LOAD */
function loadHistory(){
  let history = JSON.parse(localStorage.getItem("gaaHistory") || "[]");

  historyList.innerHTML = history.map((m,i)=>`
    <div class="history-item">
      <strong>${m.score}</strong><br>
      Wides: ${m.home.wides} | Fouls: ${m.home.fouls}<br>
      Passes: ${m.home.passes} | Turnovers: ${m.home.turnovers}
      <br><br>
      <button onclick="deleteMatch(${i})">Delete</button>
    </div>
  `).join("");
}

/* SHARE */
function sharePage(){
  navigator.clipboard.writeText(document.body.innerText);
  alert("Copied");
}

function shareHistory(){
  navigator.clipboard.writeText(historyList.innerText);
  alert("History copied");
}

loadHistory();

</script>

</body>
</html>
