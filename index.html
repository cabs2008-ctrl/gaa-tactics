```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: white;
}

/* Tabs */
.tabs {
  display: flex;
  background: #333;
}
.tab {
  flex: 1;
  padding: 14px;
  color: white;
  cursor: pointer;
}
.tab.active {
  background: #555;
}

/* Sections */
.section {
  display: none;
  padding: 10px;
}
.section.active {
  display: block;
}

/* Share button */
.share-btn {
  display: block;
  margin: 10px auto 20px auto;
  background: #333;
  color: white;
  border: none;
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 14px;
}

/* Pitch */
.pitch {
  position: relative;
  width: 100%;
  height: 78vh;
  background: green;
  border: 2px solid #333;
}
.pitch.blue {
  background: #1e90ff;
}

/* Players */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.6);
  width: 42px;
  height: 42px;
  border-radius: 50%;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* Stats */
.stat-line { margin: 12px 0; }
button { width: 32px; height: 32px; }

/* ✅ TIMER STYLE */
.timer {
  font-size: 28px;
  font-weight: bold;
  margin: 10px 0;
}

.timer-buttons button {
  margin: 5px;
  width: 60px;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home')">Colmcille</div>
  <div class="tab" onclick="showTab('away')">Team B</div>
  <div class="tab" onclick="showTab('stats')">Stats</div>
</div>

<!-- COLMCILLE -->
<div id="home" class="section active">
<h2>Colmcille</h2>
<button class="share-btn" onclick="shareApp()">Share</button>
<div class="pitch" id="homePitch"></div>
</div>

<!-- TEAM B -->
<div id="away" class="section">
<h2>Team B</h2>
<div class="pitch blue" id="awayPitch"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">

<h2>Match Stats</h2>
<h3>Colmcille vs Team B</h3>

<button class="share-btn" onclick="shareApp()">Share</button>

<!-- ✅ MATCH CLOCK -->
<div class="timer" id="matchTime">00:00</div>
<div class="timer-buttons">
  <button onclick="startTimer()">Start</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<h1 id="scoreboard">0-00 | 0-00</h1>

<hr>

<h3>Colmcille</h3>

<div class="stat-line">
Goals
<button onclick="updateStat('home','goals',-1)">-</button>
<span id="home_goals">0</span>
<button onclick="updateStat('home','goals',1)">+</button>

Points
<button onclick="updateStat('home','points',-1)">-</button>
<span id="home_points">0</span>
<button onclick="updateStat('home','points',1)">+</button>
</div>

<div class="stat-line">
Wides
<button onclick="updateStat('home','wides',-1)">-</button>
<span id="home_wides">0</span>
<button onclick="updateStat('home','wides',1)">+</button>

Fouls
<button onclick="updateStat('home','fouls',-1)">-</button>
<span id="home_fouls">0</span>
<button onclick="updateStat('home','fouls',1)">+</button>
</div>

<div class="stat-line">
Passes
<button onclick="updateStat('home','passes',-1)">-</button>
<span id="home_passes">0</span>
<button onclick="updateStat('home','passes',1)">+</button>
</div>

<div class="stat-line">
Turnovers
<button onclick="updateStat('home','turnovers',-1)">-</button>
<span id="home_turnovers">0</span>
<button onclick="updateStat('home','turnovers',1)">+</button>
</div>

<hr>

<h3>Team B</h3>

<div class="stat-line">
Goals
<button onclick="updateStat('away','goals',-1)">-</button>
<span id="away_goals">0</span>
<button onclick="updateStat('away','goals',1)">+</button>

Points
<button onclick="updateStat('away','points',-1)">-</button>
<span id="away_points">0</span>
<button onclick="updateStat('away','points',1)">+</button>
</div>

</div>

<script>

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function shareApp(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied!");
}

/* ✅ TIMER LOGIC */
let seconds = 0;
let timer = null;

function updateTimerDisplay(){
  let mins = Math.floor(seconds / 60);
  let secs = seconds % 60;
  document.getElementById("matchTime").innerText =
    String(mins).padStart(2,'0') + ":" + String(secs).padStart(2,'0');
}

function startTimer(){
  if(timer) return;
  timer = setInterval(()=>{
    seconds++;
    updateTimerDisplay();
  },1000);
}

function pauseTimer(){
  clearInterval(timer);
  timer = null;
}

function resetTimer(){
  pauseTimer();
  seconds = 0;
  updateTimerDisplay();
}

/* Stats */
let stats={
  home:{goals:0,points:0,wides:0,fouls:0,passes:0,turnovers:0},
  away:{goals:0,points:0}
};

function updateStat(team,type,val){
  stats[team][type]=Math.max(0,(stats[team][type]||0)+val);
  document.getElementById(team+"_"+type).innerText=stats[team][type];
  updateScore();
}

function updateScore(){
  scoreboard.innerText=
    stats.home.goals+"-"+String(stats.home.points).padStart(2,"0")+
    " | "+
    stats.away.goals+"-"+String(stats.away.points).padStart(2,"0");
}

/* Formation */
function createTeam(pitch){
  const positions=[
    [50,94],
    [10,80],[50,80],[90,80],
    [10,65],[50,65],[90,65],
    [35,50],[65,50],
    [10,35],[50,35],[90,35],
    [10,20],[50,20],[90,20]
  ];

  positions.forEach((pos,i)=>{
    let p=document.createElement("div");
    p.className="player";
    p.innerText=i+1;

    p.style.left=pos[0]+"%";
    p.style.top=pos[1]+"%";

    p.onclick=()=>{
      let name=prompt("Player name:",p.innerText);
      if(name) p.innerText=name;
    };

    pitch.appendChild(p);
  });
}

createTeam(homePitch);
createTeam(awayPitch);

</script>

</body>
</html>
