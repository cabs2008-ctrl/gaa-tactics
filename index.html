<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Tactics Elite</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.pitch {
  width:100%;
  max-width:400px;
  height:500px;
  margin:auto;
  background:#4CAF50;
  position:relative;
}

.player {
  width:48px;height:48px;border-radius:50%;
  position:absolute;display:flex;align-items:center;justify-content:center;
  color:white;
}

.A { background:#2e7d32; }
.B { background:#1565c0; }

button { margin:4px; padding:10px; }

.hidden { display:none; }

input { width:50px; margin:3px; }

</style>
</head>

<body>

<h3>GAA Match Day</h3>

<!-- NAV -->
<div>
<button onclick="showTab('pitchTab')">Pitch</button>
<button onclick="showTab('scoreTab')">Score</button>
</div>

<!-- PITCH TAB -->
<div id="pitchTab">
  <div class="pitch" id="pitch"></div>

  <button onclick="formation()">Formation</button>
</div>

<!-- SCORE TAB -->
<div id="scoreTab" class="hidden">

<h4>Half:
<button onclick="setHalf(1)">1st</button>
<button onclick="setHalf(2)">2nd</button>
</h4>

<h4>Team A</h4>
Goals <input id="aGoals">
Points <input id="aPoints">
Wides <input id="aWides">

<h4>Team B</h4>
Goals <input id="bGoals">
Points <input id="bPoints">
Wides <input id="bWides">

<br><br>

<button onclick="saveScore()">Save</button>

<h4 id="totalScore"></h4>

</div>

<script>
let pitch=document.getElementById("pitch");
let currentHalf=1;

function showTab(tab){
 document.getElementById("pitchTab").classList.add("hidden");
 document.getElementById("scoreTab").classList.add("hidden");
 document.getElementById(tab).classList.remove("hidden");
}

/* PLAYERS */
function create(n,x,y){
 let p=document.createElement("div");
 p.className="player A";
 p.innerText=n;
 p.style.left=x+"px";
 p.style.top=y+"px";

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
}

function formation(){
 pitch.innerHTML="";
 let pos=[
 [170,20],
 [30,100],[120,100],[210,100],[300,100],
 [30,200],[120,200],[210,200],[300,200],
 [30,300],[120,300],[210,300],[300,300],
 [100,420],[250,420]
 ];
 pos.forEach((p,i)=>create(i+1,p[0],p[1]));
}

/* SCORE SYSTEM */
function setHalf(h){
 currentHalf=h;
 loadScore();
}

function saveScore(){
 let data={
  aG:aGoals.value,
  aP:aPoints.value,
  bG:bGoals.value,
  bP:bPoints.value
 };
 localStorage.setItem("score"+currentHalf, JSON.stringify(data));
 updateTotal();
}

function loadScore(){
 let data=JSON.parse(localStorage.getItem("score"+currentHalf)||"{}");
 aGoals.value=data.aG||"";
 aPoints.value=data.aP||"";
 bGoals.value=data.bG||"";
 bPoints.value=data.bP||"";
}

function updateTotal(){
 let a=(aGoals.value*3||0)+(aPoints.value*1||0);
 let b=(bGoals.value*3||0)+(bPoints.value*1||0);
 document.getElementById("totalScore").innerText="Score: "+a+" - "+b;
}
</script>

</body>
</html>
