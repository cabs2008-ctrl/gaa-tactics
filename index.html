<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Lineup</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  background: #00c853;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HEADER */
.header {
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding: 10px;
}

#teamName {
  width: 90%;
  font-size: 18px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

/* BUTTONS */
.btn-group {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  flex: 1 1 45%;
  margin: 4px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: bold;
  color: white;
}

.save { background: #1565c0; }
.reload { background: #2e7d32; }
.reset { background: #c62828; }
.download { background: #ff9800; }
.share { background: #25D366; }

#msg {
  margin-top: 6px;
  font-size: 12px;
}

/* COLOR PICKER */
.color-picker {
  margin-top: 8px;
}

/* PITCH */
.pitch {
  width: 95vw;
  max-width: 400px;
  aspect-ratio: 90 / 140;
  background: repeating-linear-gradient(
    to bottom,
    #4caf50 0px,
    #4caf50 40px,
    #43a047 40px,
    #43a047 80px
  );
  border: 5px solid #bdbdbd;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

/* SVG LINES */
.lines {
  position: absolute;
  width: 100%;
  height: 100%;
}

.lines * {
  stroke: white;
  stroke-width: 0.6;
  fill: none;
}

/* PLAYERS */
.player {
  position: absolute;
  text-align: center;
  cursor: pointer;
}

.jersey {
  width: 9vw;
  max-width: 40px;
}

/* ✅ FIXED HERE */
.number {
  fill: black;
  font-size: 12px;
  font-weight: bold;
  text-anchor: middle;
  dominant-baseline: middle;
}

.name {
  background: #1b5e20;
  color: white;
  padding: 2px 5px;
  border-radius: 10px;
  font-size: 10px;
}

/* POSITIONS */
.p1 { bottom: 2%; left: 50%; transform: translateX(-50%); }
.p2 { bottom: 18%; right: 5%; }
.p3 { bottom: 18%; left: 50%; transform: translateX(-50%); }
.p4 { bottom: 18%; left: 5%; }
.p5 { bottom: 32%; right: 5%; }
.p6 { bottom: 32%; left: 50%; transform: translateX(-50%); }
.p7 { bottom: 32%; left: 5%; }
.p8 { bottom: 45%; right: 20%; }
.p9 { bottom: 45%; left: 20%; }
.p10 { bottom: 60%; right: 5%; }
.p11 { bottom: 60%; left: 50%; transform: translateX(-50%); }
.p12 { bottom: 60%; left: 5%; }
.p13 { top: 10%; right: 5%; }
.p14 { top: 10%; left: 50%; transform: translateX(-50%); }
.p15 { top: 10%; left: 5%; }

</style>
</head>

<body>

<div class="header">
  <input id="teamName" placeholder="Team Name">

  <div class="btn-group">
    <button class="btn save" onclick="saveData()">Save</button>
    <button class="btn reload" onclick="reloadData()">Reload</button>
    <button class="btn reset" onclick="resetAll()">Reset</button>
    <button class="btn download" onclick="downloadImage()">Download</button>
    <button class="btn share" onclick="shareImage()">Share</button>
  </div>

  <div class="color-picker">
    Jersey Color: <input type="color" id="colorPicker">
  </div>

  <div id="msg"></div>
</div>

<div class="pitch" id="pitch">

<svg class="lines" viewBox="0 0 90 140">
  <rect x="0" y="0" width="90" height="140"/>
  <line x1="0" y1="70" x2="90" y2="70"/>
  <line x1="0" y1="45" x2="90" y2="45"/>
  <line x1="0" y1="95" x2="90" y2="95"/>
  <line x1="0" y1="20" x2="90" y2="20"/>
  <line x1="0" y1="120" x2="90" y2="120"/>
  <line x1="0" y1="13" x2="90" y2="13"/>
  <line x1="0" y1="127" x2="90" y2="127"/>

  <rect x="25" y="0" width="40" height="13"/>
  <rect x="25" y="127" width="40" height="13"/>

  <rect x="38" y="0" width="14" height="4.5"/>
  <rect x="38" y="135.5" width="14" height="4.5"/>

  <path d="M25 20 A20 20 0 0 0 65 20"/>
  <path d="M25 120 A20 20 0 0 1 65 120"/>
</svg>

</div>

<script>
const defaultPlayers = Array(15).fill("Player");
defaultPlayers[0] = "Goalkeeper";

let players = JSON.parse(localStorage.getItem("team")) || [...defaultPlayers];
let jerseyColor = localStorage.getItem("jerseyColor") || "#8b0000";

const pitch = document.getElementById("pitch");
const input = document.getElementById("teamName");
const msg = document.getElementById("msg");
const colorPicker = document.getElementById("colorPicker");

input.value = localStorage.getItem("teamName") || "";
colorPicker.value = jerseyColor;

function saveData() {
  localStorage.setItem("team", JSON.stringify(players));
  localStorage.setItem("teamName", input.value);
  localStorage.setItem("jerseyColor", jerseyColor);
  showMsg("Saved!");
}

function reloadData() {
  players = JSON.parse(localStorage.getItem("team")) || [...defaultPlayers];
  input.value = localStorage.getItem("teamName") || "";
  jerseyColor = localStorage.getItem("jerseyColor") || "#8b0000";
  colorPicker.value = jerseyColor;
  render();
  showMsg("Reloaded!");
}

function resetAll() {
  if (!confirm("Reset everything?")) return;
  localStorage.clear();
  players = [...defaultPlayers];
  input.value = "";
  jerseyColor = "#8b0000";
  colorPicker.value = jerseyColor;
  render();
  showMsg("Reset complete");
}

function downloadImage() {
  html2canvas(pitch).then(canvas => {
    let link = document.createElement("a");
    link.download = "lineup.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

function shareImage() {
  html2canvas(pitch).then(canvas => {
    canvas.toBlob(blob => {
      let file = new File([blob], "lineup.png", { type: "image/png" });
      if (navigator.share) {
        navigator.share({ title: "Team Lineup", files: [file] });
      } else {
        alert("Sharing not supported. Use Download instead.");
      }
    });
  });
}

colorPicker.oninput = () => {
  jerseyColor = colorPicker.value;
  render();
};

function jersey(n) {
  return `
  <svg viewBox="0 0 64 64" class="jersey">
    <path d="M16 8 L24 4 L40 4 L48 8 L56 20 L48 24 L48 56 L16 56 L16 24 L8 20 Z"
    fill="${jerseyColor}"/>
    <text x="32" y="32" class="number">${n}</text>
  </svg>`;
}

function render() {
  document.querySelectorAll(".player").forEach(e => e.remove());

  players.forEach((name, i) => {
    let d = document.createElement("div");
    d.className = "player p" + (i+1);
    d.innerHTML = jersey(i+1) + `<div class="name">${name}</div>`;

    d.onclick = () => {
      let n = prompt("Edit player:", name);
      if (n && n.trim()) {
        players[i] = n;
        render();
      }
    };

    pitch.appendChild(d);
  });
}

function showMsg(t){
  msg.innerText=t;
  setTimeout(()=>msg.innerText="",1500);
}

render();
</script>

</body>
</html>
