<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
  display:flex; flex-direction:column; justify-content:center;
}
.player.selected { border:3px solid yellow; }

.subs {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 10px; margin: 12px auto; width: 95%; max-width: 420px;
}

.sub {
  width: 55px; height: 55px; border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 11px;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}

.stat-row {
  display: flex; justify-content: space-between;
  margin: 10px auto; padding: 12px;
  width: 92%; max-width: 420px;
  background: #f4f4f4; border-radius: 14px;
}

.btn-minus,.btn-plus {
  width: 35px; height: 35px; border: none;
  border-radius: 10px; font-size: 18px;
}
.btn-minus { background:#ff4d4d;color:white; }
.btn-plus { background:#28a745;color:white; }

.clock { font-size: 26px; font-weight: bold; }
.history-item { background:#f4f4f4;margin:10px auto;padding:12px;width:90%;max-width:420px;border-radius:12px;}
.top-btn { margin:5px;padding:8px 14px;border:none;border-radius:8px;background:#333;color:white;}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button class="top-btn" onclick="toggleSwapMode()">Swap Mode</button>
<button class="top-btn" onclick="resetTeam('home')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('home')">Save Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>
<div class="pitch green" id="homePitch"></div>
<h4>Subs</h4>
<div class="subs" id="homeSubs"></div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button class="top-btn" onclick="toggleSwapMode()">Swap Mode</button>
<button class="top-btn" onclick="resetTeam('away')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('away')">Save Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>
<div class="pitch blue" id="awayPitch"></div>
<h4>Subs</h4>
<div class="subs" id="awaySubs"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">
<h2>Match Stats</h2>
<button class="top-btn" onclick="shareMatch()">Share</button>
<h1 id="scoreboard"></h1>

<div class="clock" id="matchClock">00:00</div>
<button onclick="startClock()">Start</button>
<button onclick="pauseClock()">Pause</button>
<button onclick="resetClock()">Reset</button>

<h3>Home</h3>
<div id="homeStats"></div>
<hr>
<h3>Away</h3>
<div id="awayStats"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Saved Teams</h2>
<div id="teamList"></div>

<h3>Matches</h3>
<button class="top-btn" onclick="saveMatch()">Save Match</button>
<button class="top-btn" onclick="shareMatch()">Share</button>
<div id="historyList"></div>
</div>

<script>

/* TEAM SAVE/LOAD */
function getTeams(){ return JSON.parse(localStorage.getItem("gaaTeams")||"[]"); }

function saveTeam(team){
let list=getTeams();
list.unshift(JSON.parse(JSON.stringify(data[team])));
localStorage.setItem("gaaTeams",JSON.stringify(list));
renderTeams();
}

function loadTeam(team,i){
let list=getTeams();
data[team]=JSON.parse(JSON.stringify(list[i]));
saveData();
renderPitch(team);
renderSubs(team);
}

function renderTeams(){
let list=getTeams();
teamList.innerHTML=list.map((t,i)=>`
<div class="history-item">
<b>${t.name}</b><br>
<button onclick="loadTeam('home',${i})">Load Home</button>
<button onclick="loadTeam('away',${i})">Load Away</button>
</div>`).join("");
}

/* KEEP EVERYTHING ELSE EXACTLY SAME BELOW */

/* TABS */
function showTab(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
}

/* POSITIONS */
const positions=[[92,50],[78,25],[78,50],[78,75],[62,25],[62,50],[62,75],[46,40],[46,60],[30,25],[30,50],[30,75],[14,25],[14,50],[14,75]];

/* DATA */
let data=JSON.parse(localStorage.getItem("gaaData")||"{}");
if(!data.home) data.home={name:"Home",players:Array(15).fill(""),subs:Array(5).fill("")};
if(!data.away) data.away={name:"Away",players:Array(15).fill(""),subs:Array(5).fill("")};
function saveData(){localStorage.setItem("gaaData",JSON.stringify(data));}

/* TEAM NAME */
function editTeamName(team,el){let n=prompt("Team Name:",data[team].name);if(n){data[team].name=n;el.innerText=n;saveData();}}

/* SWAP MODE */
let swapMode=false,selectedPlayer=null;
function toggleSwapMode(){swapMode=!swapMode;selectedPlayer=null;}

/* PLAYERS */
function renderPitch(team){
document.getElementById(team+"Pitch").innerHTML=
positions.map((p,i)=>`<div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="${swapMode?`selectPlayer('${team}',${i})`:`editPlayer('${team}',${i})`}">${i+1}<br>${data[team].players[i]||""}</div>`).join("");
}
function editPlayer(team,i){let n=prompt("Player Name:",data[team].players[i]);if(n!==null){data[team].players[i]=n;saveData();renderPitch(team);}}
function selectPlayer(team,i){selectedPlayer={team,index:i};renderPitch(team);}

/* SUBS */
function renderSubs(team){
document.getElementById(team+"Subs").innerHTML=
data[team].subs.map((s,i)=>`<div class="sub" onclick="${swapMode?`swapWithSub('${team}',${i})`:`editSub('${team}',${i})`}">${i+16}<br>${s||""}</div>`).join("");
}
function editSub(team,i){let n=prompt("Sub Name:",data[team].subs[i]);if(n!==null){data[team].subs[i]=n;saveData();renderSubs(team);}}
function swapWithSub(team,i){if(!selectedPlayer||selectedPlayer.team!==team)return;let t=data[team].players[selectedPlayer.index];data[team].players[selectedPlayer.index]=data[team].subs[i];data[team].subs[i]=t;selectedPlayer=null;saveData();renderPitch(team);renderSubs(team);}

/* RESET */
function resetTeam(team){if(!confirm("Reset team?"))return;data[team].players=Array(15).fill("");data[team].subs=Array(5).fill("");saveData();renderPitch(team);renderSubs(team);}

/* STATS */
let stats={home:{goals:0,points:0,wides:0,fouls:0,turnovers:0,tackles:0},away:{goals:0,points:0}};
function renderStats(){
homeStats.innerHTML=`${row('home','goals','Goals')}${row('home','points','Points')}${row('home','wides','Wides')}${row('home','fouls','Fouls')}${row('home','turnovers','Turnovers')}${row('home','tackles','Tackles')}`;
awayStats.innerHTML=`${row('away','goals','Goals')}${row('away','points','Points')}`;
}
function row(team,key,label){return `<div class="stat-row"><div>${label}</div><div><button onclick="updateStat('${team}','${key}',-1)">-</button><span id="${team}_${key}">${stats[team][key]}</span><button onclick="updateStat('${team}','${key}',1)">+</button></div></div>`;}
function updateStat(team,key,val){stats[team][key]=Math.max(0,stats[team][key]+val);document.getElementById(`${team}_${key}`).innerText=stats[team][key];updateScore();}
function updateScore(){let h=stats.home.goals*3+stats.home.points;let a=stats.away.goals*3+stats.away.points;scoreboard.innerText=`${data.home.name} ${stats.home.goals}-${stats.home.points} (${h}) | ${data.away.name} ${stats.away.goals}-${stats.away.points} (${a})`;}

/* CLOCK */
let sec=0,timer=null;
function startClock(){if(!timer)timer=setInterval(()=>{sec++;updateClock();},1000);}
function pauseClock(){clearInterval(timer);timer=null;}
function resetClock(){pauseClock();sec=0;updateClock();}
function updateClock(){matchClock.innerText=String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0");}

/* HISTORY */
function getHistory(){return JSON.parse(localStorage.getItem("gaaHistory")||"[]");}
function saveMatch(){let h=getHistory();h.unshift({score:scoreboard.innerText,date:new Date().toLocaleString()});localStorage.setItem("gaaHistory",JSON.stringify(h));renderHistory();}
function renderHistory(){let h=getHistory();historyList.innerHTML=h.map(m=>`<div class="history-item">${m.score}<br>${m.date}</div>`).join("");}

/* SHARE */
function shareMatch(){let text=scoreboard.innerText||"No score yet";if(navigator.share){navigator.share({text});}else{prompt("Copy:",text);}}

/* INIT */
document.querySelector("#home h2").innerText=data.home.name;
document.querySelector("#away h2").innerText=data.away.name;
renderPitch("home");renderPitch("away");renderSubs("home");renderSubs("away");
renderStats();updateScore();updateClock();renderTeams();renderHistory();

</script>

</body>
</html>
