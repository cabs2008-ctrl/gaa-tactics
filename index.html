<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.tab { display:none; }
.active { display:block; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:3px; padding:8px;
  color:white; background:#555; border:none;
}

/* Pitch */
.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.player {
  width:48px; height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

canvas { position:absolute; top:0; left:0; }

button { margin:4px; padding:10px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('draw')">Draw</button>
<button onclick="showTab('score')">Stats</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3 contenteditable="true" id="teamAName">Colmcille</h3>
<div class="pitch" id="pitchA"></div>
<button onclick="formation('A')">Formation</button>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3 contenteditable="true" id="teamBName">Team B</h3>
<div class="pitch" id="pitchB"></div>
<button onclick="formation('B')">Formation</button>
</div>

<!-- DRAW -->
<div id="draw" class="tab">
<h3>Draw Tactics</h3>
<div style="position:relative; max-width:400px; margin:auto;">
  <div class="pitch"></div>
  <canvas id="drawCanvas" width="400" height="600"></canvas>
</div>
<button onclick="clearDraw()">Clear Lines</button>
</div>

<!-- STATS -->
<div id="score" class="tab">

<h3>Match Stats</h3>

<div id="statsCapture">

<table border="1" style="width:100%; max-width:400px; margin:auto; text-align:center;">
<tr>
<th>Metric</th>
<th id="teamANameDisplay">Colmcille</th>
<th id="teamBNameDisplay">Team B</th>
</tr>

<tr><td>Goals</td><td id="A_goals">0</td><td id="B_goals">0</td></tr>
<tr><td>Points</td><td id="A_points">0</td><td id="B_points">0</td></tr>
<tr><td>Wides</td><td id="A_wides">0</td><td id="B_wides">0</td></tr>
<tr><td>Turnovers</td><td id="A_turnovers">0</td><td id="B_turnovers">0</td></tr>

<tr><td>Shots</td><td id="A_shots">0</td><td id="B_shots">0</td></tr>
<tr><td>Scores</td><td id="A_scores">0</td><td id="B_scores">0</td></tr>
<tr><td>Shot %</td><td id="A_percent">0%</td><td id="B_percent">0%</td></tr>
</table>

</div>

<br>

<h4>Add Stats</h4>

<button onclick="addStat('A','goal')">A Goal</button>
<button onclick="addStat('A','point')">A Point</button>
<button onclick="addStat('A','wide')">A Wide</button>
<button onclick="addStat('A','turnover')">A Turnover</button>

<br><br>

<button onclick="addStat('B','goal')">B Goal</button>
<button onclick="addStat('B','point')">B Point</button>
<button onclick="addStat('B','wide')">B Wide</button>
<button onclick="addStat('B','turnover')">B Turnover</button>

<br><br>

<button onclick="exportFull()">Export Match</button>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

// TABS
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// PLAYERS
function createPlayer(n,x,y,team){
 let pitch = team==="A" ? document.getElementById("pitchA") : document.getElementById("pitchB");

 let p=document.createElement("div");
 p.className="player " + team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  p.style.left=(e.touches[0].clientX-rect.left-offsetX)+"px";
  p.style.top=(e.touches[0].clientY-rect.top-offsetY)+"px";
 });

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
}

function clear(team){
 let pitch = team==="A" ? document.getElementById("pitchA") : document.getElementById("pitchB");
 pitch.innerHTML="";
}

function formation(team){
 clear(team);

 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],team));
}

// DRAW
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");

canvas.addEventListener("touchstart",e=>{
 ctx.beginPath();
 ctx.moveTo(e.touches[0].clientX,e.touches[0].clientY);
});

canvas.addEventListener("touchmove",e=>{
 ctx.lineTo(e.touches[0].clientX,e.touches[0].clientY);
 ctx.stroke();
});

function clearDraw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

// STATS
let stats={
 A:{goals:0,points:0,wides:0,turnovers:0},
 B:{goals:0,points:0,wides:0,turnovers:0}
};

function addStat(team,type){
 stats[team][type+"s"]++;
 updateStats();
}

function updateStats(){
 ["A","B"].forEach(t=>{
  let s=stats[t];
  let scores=s.goals+s.points;
  let shots=scores+s.wides;
  let percent=shots?Math.round((scores/shots)*100):0;

  document.getElementById(t+"_goals").innerText=s.goals;
  document.getElementById(t+"_points").innerText=s.points;
  document.getElementById(t+"_wides").innerText=s.wides;
  document.getElementById(t+"_turnovers").innerText=s.turnovers;

  document.getElementById(t+"_scores").innerText=scores;
  document.getElementById(t+"_shots").innerText=shots;
  document.getElementById(t+"_percent").innerText=percent+"%";
 });

 document.getElementById("teamANameDisplay").innerText =
   document.getElementById("teamAName").innerText;

 document.getElementById("teamBNameDisplay").innerText =
   document.getElementById("teamBName").innerText;
}

// EXPORT
function exportFull(){
 html2canvas(document.body).then(canvas=>{
  let link=document.createElement("a");
  link.download="match.png";
  link.href=canvas.toDataURL();
  link.click();
 });
}

</script>

</body>
</html>
