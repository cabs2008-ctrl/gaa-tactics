<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family:Arial; text-align:center; margin:0; }

.tab { display:none; }
.active { display:block; }

.nav { background:#333; padding:10px; }
.nav button { color:white; background:#555; margin:3px; padding:8px; }

table {
  margin:auto;
  border-collapse:collapse;
}
td, th {
  border:1px solid black;
  padding:6px;
}
input { width:60px; }

</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('stats')">Stats</button>
<button onclick="showTab('history')">History</button>
<button onclick="showTab('trends')">Trends</button>
</div>

<!-- STATS -->
<div id="stats" class="tab active">

<h3>Colmcille vs <span id="teamBName" contenteditable="true">Team B</span></h3>

<table>
<tr><th>Home</th><th>KPI</th><th>Away</th></tr>

<tr><td><input id="h_att"></td><td>Attacks</td><td><input id="a_att"></td></tr>
<tr><td><input id="h_shots"></td><td>Shots</td><td><input id="a_shots"></td></tr>
<tr><td><input id="h_scores"></td><td>Scores</td><td><input id="a_scores"></td></tr>
<tr><td><input id="h_wides"></td><td>Wides</td><td><input id="a_wides"></td></tr>

<tr><td id="h_pct">0%</td><td>Shot %</td><td id="a_pct">0%</td></tr>
</table>

<button onclick="calcStats()">Calculate %</button>
<button onclick="saveMatch()">Save Match</button>
<button onclick="generateSummary()">Auto Summary</button>

<p id="summary"></p>

</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h3>Match History</h3>
<ul id="historyList"></ul>
</div>

<!-- TRENDS -->
<div id="trends" class="tab">
<h3>Season Trends</h3>
<p id="trendsOutput"></p>
</div>

<script>

function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// CALCULATE %
function calcStats(){
 let hs = h_scores.value, hsh = h_shots.value;
 let as = a_scores.value, ash = a_shots.value;

 h_pct.innerText = hsh ? Math.round((hs/hsh)*100)+"%" : "0%";
 a_pct.innerText = ash ? Math.round((as/ash)*100)+"%" : "0%";
}

// SAVE MATCH (MULTIPLE)
function saveMatch(){
 let matches = JSON.parse(localStorage.getItem("matches") || "[]");

 let match = {
  teamB: teamBName.innerText,
  h_shots: h_shots.value,
  h_scores: h_scores.value,
  a_shots: a_shots.value,
  a_scores: a_scores.value
 };

 matches.push(match);
 localStorage.setItem("matches", JSON.stringify(matches));

 alert("Match saved");
 loadHistory();
}

// LOAD HISTORY
function loadHistory(){
 let matches = JSON.parse(localStorage.getItem("matches") || "[]");
 let list = document.getElementById("historyList");
 list.innerHTML = "";

 matches.forEach((m,i)=>{
  let li = document.createElement("li");
  li.innerText = "vs " + m.teamB;
  li.onclick = ()=>loadMatch(i);
  list.appendChild(li);
 });
}

// LOAD ONE MATCH
function loadMatch(i){
 let matches = JSON.parse(localStorage.getItem("matches") || "[]");
 let m = matches[i];

 teamBName.innerText = m.teamB;
 h_shots.value = m.h_shots;
 h_scores.value = m.h_scores;
 a_shots.value = m.a_shots;
 a_scores.value = m.a_scores;

 showTab("stats");
}

// AUTO SUMMARY
function generateSummary(){
 let h_pct_val = parseInt(h_pct.innerText);
 let a_pct_val = parseInt(a_pct.innerText);

 let text = "";

 if(h_pct_val > a_pct_val){
  text += "Colmcille more efficient. ";
 } else if(a_pct_val > h_pct_val){
  text += "Opponent more efficient. ";
 }

 if(h_att.value > a_att.value){
  text += "Winning possession battle.";
 } else {
  text += "Losing possession battle.";
 }

 document.getElementById("summary").innerText = text;
}

// TRENDS
function loadTrends(){
 let matches = JSON.parse(localStorage.getItem("matches") || "[]");

 if(matches.length === 0){
  trendsOutput.innerText = "No data yet.";
  return;
 }

 let totalShots = 0, totalScores = 0;

 matches.forEach(m=>{
  totalShots += Number(m.h_shots || 0);
  totalScores += Number(m.h_scores || 0);
 });

 let avgShots = (totalShots / matches.length).toFixed(1);
 let avgScores = (totalScores / matches.length).toFixed(1);

 trendsOutput.innerText =
  "Avg Shots: " + avgShots + " | Avg Scores: " + avgScores;
}

// INIT
loadHistory();
loadTrends();

</script>

</body>
</html>
