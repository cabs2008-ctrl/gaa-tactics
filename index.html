<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.tab { display:none; }
.active { display:block; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:3px;
  padding:8px;
  color:white;
  background:#555;
  border:none;
}

/* PITCH */
.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line { position:absolute; width:100%; height:2px; background:white; top:50%; }

/* PLAYERS */
.player {
  width:48px; height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

canvas { position:absolute; top:0; left:0; }

button { margin:4px; padding:10px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Columkill</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('draw')">Draw</button>
<button onclick="showTab('score')">Score</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3>Colmcille</h3>
<div class="pitch" id="pitchA">
<div class="line"></div>
</div>
<button onclick="formation('A')">Formation</button>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3 id="teamBName" contenteditable="true" oninput="updateTeamBName()">Team B</h3>
<div class="pitch" id="pitchB">
<div class="line"></div>
</div>
<button onclick="formation('B')">Formation</button>
</div>

<!-- DRAW -->
<div id="draw" class="tab">
<h3>Draw</h3>
<div style="position:relative; max-width:400px; margin:auto;">
  <div class="pitch"></div>
  <canvas id="drawCanvas" width="400" height="600"></canvas>
</div>
<button onclick="clearDraw()">Clear</button>
</div>

<!-- SCORE -->
<div id="score" class="tab">
<h3>Score</h3>

<h4>Columkill vs <span id="scoreTeamB">Team B</span></h4>

<h2 id="scoreDisplay">0-00</h2>

<button onclick="goal()">+ Goal</button>
<button onclick="point()">+ Point</button>
<button onclick="wide()">+ Wide</button>

<p>Wides: <span id="wides">0</span></p>

</div>

<script>
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// TEAM B NAME
function updateTeamBName(){
 let name = document.getElementById("teamBName").innerText;
 document.getElementById("scoreTeamB").innerText = name;
}

// SCORE
let goals=0, points=0, wides=0;

function updateScore(){
 document.getElementById("scoreDisplay").innerText =
  goals + "-" + (points<10?"0":"") + points;
 document.getElementById("wides").innerText = wides;
}

function goal(){ goals++; updateScore(); }
function point(){ points++; updateScore(); }
function wide(){ wides++; updateScore(); }

// PLAYERS
function createPlayer(n,x,y,team){
 let pitch = team==="A" ? pitchA : pitchB;

 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  let x=e.touches[0].clientX-rect.left-offsetX;
  let y=e.touches[0].clientY-rect.top-offsetY;
  p.style.left=x+"px";
  p.style.top=y+"px";
 });

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
}

function clear(pitch){
 pitch.innerHTML = '<div class="line"></div>';
}

// CORRECT FORMATION
function formation(team){
 let pitch = team==="A" ? pitchA : pitchB;
 clear(pitch);

 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],team));
}

// DRAW
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");

canvas.addEventListener("touchstart",e=>{
 ctx.beginPath();
 ctx.moveTo(e.touches[0].clientX,e.touches[0].clientY);
});

canvas.addEventListener("touchmove",e=>{
 ctx.lineTo(e.touches[0].clientX,e.touches[0].clientY);
 ctx.stroke();
});

function clearDraw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
