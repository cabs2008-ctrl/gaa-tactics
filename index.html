<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAA Match Tracker</title>

<style>

body {
  font-family: Arial;
  margin: 0;
  background: white;
  text-align: center;
}

/* TABS */
.tabs {
  display: flex;
  width: 100%;
  background: #333;
}

.tab {
  flex: 1;
  padding: 16px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.tab.active { background: #555; }

/* SECTIONS */
.section {
  display: none;
  padding: 10px;
}

.section.active { display: block; }

/* ✅ FULL WIDTH PITCH FIX */
.pitch {
  position: relative;
  width: 95vw;        /* FULL WIDTH */
  height: 70vh;       /* BIG HEIGHT */
  margin: 10px auto;
  border: 3px solid #333;
}

.green { background: green; }
.blue { background: #1e90ff; }

/* PLAYERS BIGGER */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  line-height: 55px;
  font-size: 16px;
  font-weight: bold;
}

/* STATS */
.stat-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
  font-size: 18px;
}

.stat-row button {
  width: 45px;
  height: 45px;
  font-size: 18px;
}

/* TEXT */
h1 { font-size: 34px; }
h2 { font-size: 26px; }

button {
  padding: 10px 16px;
  font-size: 16px;
  margin: 10px 0;
}

</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Colmcille</div>

</div>

<!-- STATS -->
<div id="stats" class="section">
<h2>Match Stats</h2>
<button onclick="sharePage()">Share</button>

<h1 id="scoreboard">0-00 | 0-00</h1>

<h3>Colmcille</h3>

<div class="stat-row">Goals
<button onclick="updateHome('goals',-1)">-</button>
<span id="home_goals">0</span>
<button onclick="updateHome('goals',1)">+</button>
</div>

<div class="stat-row">Points
<button onclick="updateHome('points',-1)">-</button>
<span id="home_points">0</span>
<button onclick="updateHome('points',1)">+</button>
</div>

<div class="stat-row">Wides
<button onclick="updateHome('wides',-1)">-</button>
<span id="home_wides">0</span>
<button onclick="updateHome('wides',1)">+</button>
</div>

<div class="stat-row">Fouls
<button onclick="updateHome('fouls',-1)">-</button>
<span id="home_fouls">0</span>
<button onclick="updateHome('fouls',1)">+</button>
</div>

<div class="stat-row">Passes
<button onclick="updateHome('passes',-1)">-</button>
<span id="home_passes">0</span>
<button onclick="updateHome('passes',1)">+</button>
</div>

<div class="stat-row">Turnovers
<button onclick="updateHome('turnovers',-1)">-</button>
<span id="home_turnovers">0</span>
<button onclick="updateHome('turnovers',1)">+</button>
</div>

<hr>

<h3>Team B</h3>

<div class="stat-row">Goals
<button onclick="updateAway('goals',-1)">-</button>
<span id="away_goals">0</span>
<button onclick="updateAway('goals',1)">+</button>
</div>

<div class="stat-row">Points
<button onclick="updateAway('points',-1)">-</button>
<span id="away_points">0</span>
<button onclick="updateAway('points',1)">+</button>
</div>

</div>

<script>

function showTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

function editTeamName(el){
  let name = prompt("Enter team name:", el.innerText);
  if(name) el.innerText = name;
}

function editPlayer(el){
  let name = prompt("Edit player:", el.innerText);
  if(name) el.innerText = name;
}

let stats={
 home:{goals:0,points:0,wides:0,fouls:0,passes:0,turnovers:0},
 away:{goals:0,points:0}
};

function updateHome(t,v){
 stats.home[t]=Math.max(0,stats.home[t]+v);
 document.getElementById("home_"+t).innerText=stats.home[t];
 updateScore();
}

function updateAway(t,v){
 stats.away[t]=Math.max(0,stats.away[t]+v);
 document.getElementById("away_"+t).innerText=stats.away[t];
 updateScore();
}

function updateScore(){
 scoreboard.innerText=
 stats.home.goals+"-"+String(stats.home.points).padStart(2,"0")+
 " | "+
 stats.away.goals+"-"+String(stats.away.points).padStart(2,"0");
}

function sharePage(){
 navigator.clipboard.writeText(document.body.innerText);
 alert("Copied");
}

</script>

</body>
</html>
