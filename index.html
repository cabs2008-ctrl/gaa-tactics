<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }

.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }

.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch {
  position: relative;
  width: 95vw;
  height: 70vh;
  margin: 10px auto;
  border: 3px solid #333;
}

.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.8);
  font-size: 12px;
  font-weight: bold;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.subs {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
}

.sub {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(0,0,0,0.1);
  font-size: 12px;
  font-weight: bold;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 10px auto;
  padding: 12px;
  width: 92%;
  max-width: 420px;
  background: #f4f4f4;
  border-radius: 14px;
}

.btn-minus, .btn-plus {
  width: 35px;
  height: 35px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
}

.btn-minus { background: #ff4d4d; color: white; }
.btn-plus { background: #28a745; color: white; }

.clock { font-size: 26px; font-weight: bold; }

.history-item {
  background: #f4f4f4;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  max-width: 420px;
  border-radius: 12px;
}

.top-btn {
  margin: 5px;
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>

<button class="top-btn" onclick="resetTeam('home')">Reset Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>

<div class="pitch green" id="homePitch"></div>
<div class="subs" id="homeSubs"></div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>

<button class="top-btn" onclick="resetTeam('away')">Reset Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>

<div class="pitch blue" id="awayPitch"></div>
<div class="subs" id="awaySubs"></div>
</div>

<!-- STATS (UNCHANGED) -->
<div id="stats" class="section">
<h2>Match Stats</h2>

<button class="top-btn" onclick="shareMatch()">Share</button>

<h1 id="scoreboard"></h1>

<div class="clock" id="matchClock">00:00</div>
<button onclick="startClock()">Start</button>
<button onclick="pauseClock()">Pause</button>
<button onclick="resetClock()">Reset</button>

<h3 id="homeLabel"></h3>
<div id="homeStats"></div>

<hr>

<h3 id="awayLabel"></h3>
<div id="awayStats"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Match History</h2>

<button class="top-btn" onclick="saveMatch()">Save Match</button>
<button class="top-btn" onclick="shareMatch()">Share</button>

<div id="historyList"></div>
</div>

<script>

/* POSITIONS */
const positions = [
[92,50],[78,25],[78,50],[78,75],
[62,25],[62,50],[62,75],
[46,40],[46,60],
[30,25],[30,50],[30,75],
[14,25],[14,50],[14,75]
];

/* DATA */
let data = JSON.parse(localStorage.getItem("gaaData")||"{}");

if(!data.home) data.home={
  name:"Home",
  players:Array.from({length:15},()=>""), 
  subs:Array.from({length:5},()=> "")
};

if(!data.away) data.away={
  name:"Away",
  players:Array.from({length:15},()=>""), 
  subs:Array.from({length:5},()=> "")
};

function saveData(){
  localStorage.setItem("gaaData",JSON.stringify(data));
}

/* PLAYERS */
function renderPitch(team){
  document.getElementById(team+"Pitch").innerHTML =
    positions.map((p,i)=>`
      <div class="player"
        style="top:${p[0]}%;left:${p[1]}%"
        onclick="editPlayer('${team}',${i})">
        ${i+1}<br>${data[team].players[i] || ""}
      </div>
    `).join("");
}

function editPlayer(team,i){
  let n=prompt("Player Name:",data[team].players[i]);
  if(n!==null){
    data[team].players[i]=n;
    saveData();
    renderPitch(team);
  }
}

/* SUBS */
function renderSubs(team){
  document.getElementById(team+"Subs").innerHTML =
    data[team].subs.map((s,i)=>`
      <div class="sub" onclick="editSub('${team}',${i})">
        ${i+16}<br>${s || ""}
      </div>
    `).join("");
}

function editSub(team,i){
  let n=prompt("Sub Name:",data[team].subs[i]);
  if(n!==null){
    data[team].subs[i]=n;
    saveData();
    renderSubs(team);
  }
}

/* RESET */
function resetTeam(team){
  if(!confirm("Reset players for "+data[team].name+"?")) return;

  data[team].players = Array.from({length:15},()=> "");
  data[team].subs = Array.from({length:5},()=> "");

  saveData();
  renderPitch(team);
  renderSubs(team);
}

/* TEAM NAME */
function editTeamName(team,el){
  let n=prompt("Team:",data[team].name);
  if(n){
    data[team].name=n;
    el.innerText=n;
    saveData();
    renderLabels();
  }
}

/* TABS */
function showTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

/* ===== STATS (UNCHANGED) ===== */
const statList = [
  {key:"goals",label:"Goals"},
  {key:"points",label:"Points"},
  {key:"wides",label:"Wides"},
  {key:"fouls",label:"Fouls"},
  {key:"turnovers",label:"Turnovers"}
];

let stats = {
  home:Object.fromEntries(statList.map(s=>[s.key,0])),
  away:Object.fromEntries(statList.map(s=>[s.key,0]))
};

function renderStats(){
  renderLabels();
  ["home","away"].forEach(team=>{
    document.getElementById(team+"Stats").innerHTML =
      statList.map(s=>`
      <div class="stat-row">
        <div>${s.label}</div>
        <div>
          <button class="btn-minus" onclick="updateStat('${team}','${s.key}',-1)">-</button>
          <span id="${team}_${s.key}">${stats[team][s.key]}</span>
          <button class="btn-plus" onclick="updateStat('${team}','${s.key}',1)">+</button>
        </div>
      </div>`).join("");
  });
}

function renderLabels(){
  homeLabel.innerText=data.home.name;
  awayLabel.innerText=data.away.name;
}

function updateStat(team,key,val){
  stats[team][key]=Math.max(0,stats[team][key]+val);
  document.getElementById(`${team}_${key}`).innerText=stats[team][key];
  updateScore();
}

function updateScore(){
  let h=stats.home.goals*3+stats.home.points;
  let a=stats.away.goals*3+stats.away.points;
  scoreboard.innerText=
    `${data.home.name} ${stats.home.goals}-${stats.home.points} (${h}) vs ${data.away.name} ${stats.away.goals}-${stats.away.points} (${a})`;
}

/* CLOCK */
let sec=0,timer=null;
function startClock(){ if(!timer) timer=setInterval(()=>{sec++;updateClock();},1000); }
function pauseClock(){ clearInterval(timer); timer=null; }
function resetClock(){ pauseClock(); sec=0; updateClock(); }
function updateClock(){
  matchClock.innerText=
    String(Math.floor(sec/60)).padStart(2,"0")+":"+
    String(sec%60).padStart(2,"0");
}

/* HISTORY */
function getHistory(){ return JSON.parse(localStorage.getItem("gaaHistory")||"[]"); }

function saveMatch(){
  let h=getHistory();
  h.unshift({score:scoreboard.innerText,date:new Date().toLocaleString()});
  localStorage.setItem("gaaHistory",JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=getHistory();
  historyList.innerHTML=h.map((m,i)=>`
    <div class="history-item">
      ${m.score}<br>${m.date}
      <br><button onclick="deleteMatch(${i})">Delete</button>
    </div>
  `).join("");
}

function deleteMatch(i){
  let h=getHistory();
  h.splice(i,1);
  localStorage.setItem("gaaHistory",JSON.stringify(h));
  renderHistory();
}

/* SHARE */
function shareMatch(){
  let text = `${scoreboard.innerText}`;
  if(navigator.share){ navigator.share({ text }); }
  else{ prompt("Copy:",text); }
}

/* INIT */
document.querySelector("#home h2").innerText=data.home.name;
document.querySelector("#away h2").innerText=data.away.name;

renderPitch("home");
renderPitch("away");
renderSubs("home");
renderSubs("away");
renderStats();
updateScore();
updateClock();
renderHistory();

</script>

</body>
</html>
