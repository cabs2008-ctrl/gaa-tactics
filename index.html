<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAA Match Tracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: white;
}

/* Tabs */
.tabs {
  display: flex;
  background: #333;
}
.tab {
  flex: 1;
  padding: 14px;
  color: white;
  font-size: 15px;
  cursor: pointer;
}
.tab.active {
  background: #555;
}

/* Sections */
.section {
  display: none;
  padding: 10px;
}
.section.active {
  display: block;
}

/* Pitch (FIXED SIZE PROPERLY) */
.pitch {
  position: relative;
  width: 95%;
  max-width: 500px;
  height: 500px;
  margin: 10px auto;
  border: 3px solid #333;
  border-radius: 6px;
}

.green { background: #2e7d32; }
.blue { background: #2f6fd6; }

/* Players */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  line-height: 42px;
  font-size: 14px;
  font-weight: bold;
}

/* Stats layout */
.stat-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin: 8px 0;
}

button {
  padding: 6px 10px;
  font-size: 14px;
}

h1 { font-size: 28px; }
h2 { font-size: 20px; }

</style>
</head>

<div id="stats" class="section">

<button onclick="sharePage()">Share</button>

<h3>Colmcille</h3>

<div class="stat-row">Goals 
<button onclick="updateHome('goals',-1)">-</button>

</div>

<button onclick="updateHome('fouls',-1)">-</button>

</div>

</div>

<button onclick="updateHome('turnovers',-1)">-</button>
<span id="home_turnovers">0</span>
<button onclick="updateHome('turnovers',1)">+</button>

<h3>Team B</h3>

<div class="stat-row">Goals 
<button onclick="updateAway('goals',-1)">-</button>
<span id="away_goals">0</span>
<button onclick="updateAway('goals',1)">+</button>
</div>

<div class="stat-row">Points 
<button onclick="updateAway('points',-1)">-</button>
<span id="away_points">0</span>
<button onclick="updateAway('points',1)">+</button>
</div>

</div>

<script>

function showTab(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

let stats = {
  home:{goals:0,points:0,wides:0,fouls:0,passes:0,turnovers:0},
  away:{goals:0,points:0}
};

function updateHome(t,v){
  stats.home[t]=Math.max(0,stats.home[t]+v);
  document.getElementById("home_"+t).innerText=stats.home[t];
  updateScore();
}

function updateAway(t,v){
  stats.away[t]=Math.max(0,stats.away[t]+v);
  document.getElementById("away_"+t).innerText=stats.away[t];
  updateScore();
}

function updateScore(){
  document.getElementById("scoreboard").innerText =
    stats.home.goals+"-"+String(stats.home.points).padStart(2,"0")+
    " | "+
    stats.away.goals+"-"+String(stats.away.points).padStart(2,"0");
}

function sharePage(){
  navigator.clipboard.writeText(document.body.innerText);
  alert("Copied");
}

</script>
