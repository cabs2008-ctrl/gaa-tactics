<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:5px;
  padding:10px;
  color:white;
  background:#555;
  border:none;
}

.tab { display:none; }
.active { display:block; }

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

.player {
  width:45px;
  height:45px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  touch-action:none;
}

.teamA { background:#1b5e20; }
.teamB { background:#1565c0; }

.stat-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

.stat-block {
  display:flex;
  align-items:center;
  gap:5px;
}

button { padding:8px; font-size:16px; }

.ai-box {
  background:#eee;
  padding:10px;
  margin:10px;
  border-radius:8px;
}

.select-mode {
  outline:3px solid yellow;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('stats')">Stats</button>
<button onclick="showTab('summary')">Summary</button>
<button onclick="showTab('history')">History</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3>
<input id="teamAInput" value="Colmcille">
<br>
<button onclick="shareTeam('pitchA')">Share Team</button>
</h3>
<div class="pitch" id="pitchA"><div class="line"></div></div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3>
<input id="teamBInput" placeholder="Team B">
<br>
<button onclick="shareTeam('pitchB')">Share Team</button>
</h3>
<div class="pitch" id="pitchB"><div class="line"></div></div>
</div>

<!-- STATS -->
<div id="stats" class="tab">

<h2>Match Stats</h2>

<h3>
<span id="nameA">Colmcille</span> vs 
<span id="nameB">Team B</span>
</h3>

<h1 id="score">0-00 | 0-00</h1>

<button onclick="confirmReset()" style="background:#c62828;color:white;">Reset</button>
<button onclick="saveMatch()" style="background:#2e7d32;color:white;">Save</button>

<hr>

<h3>Colmcille</h3>

<div class="stat-row">
<div class="stat-block">Goals <button onclick="startSelect('A','goal')">➕</button></div>
<div class="stat-block">Points <button onclick="startSelect('A','point')">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Wides <button onclick="wA(1)">➕</button></div>
<div class="stat-block">Fouls <button onclick="fA(1)">➕</button></div>
</div>

<hr>

<h3>Team B</h3>

<div class="stat-row">
<div class="stat-block">Goals <button onclick="startSelect('B','goal')">➕</button></div>
<div class="stat-block">Points <button onclick="startSelect('B','point')">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Wides <button onclick="wB(1)">➕</button></div>
<div class="stat-block">Fouls <button onclick="fB(1)">➕</button></div>
</div>

</div>

<!-- SUMMARY -->
<div id="summary" class="tab">
<h2>AI Match Insights</h2>
<div class="ai-box"><p id="aiA"></p></div>
<div class="ai-box"><p id="aiB"></p></div>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>Match History</h2>
<div id="historyList"></div>
</div>

<script>

let selectMode=null;
let selectTeam=null;

/* START SELECT */
function startSelect(team,type){
 selectMode=type;
 selectTeam=team;
 showTab(team==="A"?"teamA":"teamB");
}

/* PLAYERS */
function addPlayer(n,x,y,pitch){
 let p=document.createElement("div");
 p.className="player "+(pitch.id==="pitchA"?"teamA":"teamB");
 p.innerText=n;
 p.style.left=x+"px";
 p.style.top=y+"px";

 p.onclick=()=>{
  if(selectMode){
    if(selectTeam==="A"){
      if(selectMode==="goal") GA++;
      if(selectMode==="point") PA++;
    }else{
      if(selectMode==="goal") GB++;
      if(selectMode==="point") PB++;
    }
    selectMode=null;
    update();
    return;
  }

  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 let ox,oy;
 p.addEventListener("touchstart",e=>{
  ox=e.touches[0].clientX-p.offsetLeft;
  oy=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let r=pitch.getBoundingClientRect();
  p.style.left=(e.touches[0].clientX-r.left-ox)+"px";
  p.style.top=(e.touches[0].clientY-r.top-oy)+"px";
 });

 pitch.appendChild(p);
}

function loadPlayers(){
 let pos=[[170,20],[60,100],[170,100],[280,100],[60,180],[170,180],[280,180],[120,260],[220,260],[60,340],[170,340],[280,340],[60,440],[170,440],[280,440]];
 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],pitchA));
 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],pitchB));
}

/* STATS */
let GA=0,PA=0,WA=0,FA=0;
let GB=0,PB=0,WB=0,FB=0;

function update(){
 score.innerText =
  GA+"-"+(PA<10?"0":"")+PA+" | "+
  GB+"-"+(PB<10?"0":"")+PB;

 updateAI();
}

/* AI */
function updateAI(){
 let attA=GA+PA+WA, scA=GA+PA;
 let attB=GB+PB+WB, scB=GB+PB;

 aiA.innerHTML=`A Shooting %: ${attA?Math.round(scA/attA*100):0}%`;
 aiB.innerHTML=`B Shooting %: ${attB?Math.round(scB/attB*100):0}%`;
}

/* SIMPLE */
function wA(){WA++;update();}
function fA(){FA++;update();}
function wB(){WB++;update();}
function fB(){FB++;update();}

/* RESET */
function confirmReset(){
 if(confirm("Reset?")){GA=PA=WA=FA=GB=PB=WB=FB=0;update();}
}

/* HISTORY */
function saveMatch(){
 let h=JSON.parse(localStorage.getItem("gaaHistory")||"[]");
 h.unshift({score:score.innerText,date:new Date().toLocaleString()});
 localStorage.setItem("gaaHistory",JSON.stringify(h));
 loadHistory();
}

function loadHistory(){
 let h=JSON.parse(localStorage.getItem("gaaHistory")||"[]");
 historyList.innerHTML=h.map(m=>`<div>${m.score}<br>${m.date}<hr></div>`).join("");
}

/* SHARE */
function shareTeam(id){
 html2canvas(document.getElementById(id)).then(c=>{
  c.toBlob(b=>{
   let f=new File([b],"team.png",{type:"image/png"});
   if(navigator.share){
    navigator.share({files:[f]});
   }
  });
 });
}

/* TABS */
function showTab(id){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

window.onload=function(){
 loadPlayers();
 loadHistory();
 update();
};

</script>

</body>
</html>
