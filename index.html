<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
 position: absolute;
 transform: translate(-50%, -50%);
 width: 55px; height: 55px;
 border-radius: 50%;
 background: rgba(255,255,255,0.7);
 font-size: 11px;
 display:flex; flex-direction:column; justify-content:center;
 cursor:pointer;
}

.subs { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:12px auto; }

.sub {
 width:55px;height:55px;border-radius:50%;
 background:rgba(255,255,255,0.7);
 font-size:11px;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
 cursor:pointer;
}

.stat-row {
 display:flex; justify-content:space-between; align-items:center;
 margin:10px auto; padding:12px;
 width:92%; max-width:420px;
 background:#f4f4f4; border-radius:14px;
}

.btn-minus,.btn-plus {
 width:35px;height:35px;border:none;border-radius:10px;font-size:18px;
}
.btn-minus{background:#ff4d4d;color:white;}
.btn-plus{background:#28a745;color:white;}

.clock { font-size:26px;font-weight:bold; }

.score-row {
 padding:10px;
 margin:10px auto;
 max-width:420px;
 background:#555;
 color:white;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="tabs">
 <div class="tab active" onclick="showTab('home',this)">Home</div>
 <div class="tab" onclick="showTab('away',this)">Away</div>
 <div class="tab" onclick="showTab('stats',this)">Stats</div>
 <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button onclick="saveTeam('home')">Save Team</button>
<button onclick="shareMatch()">Share</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<div class="pitch green" id="homePitch"></div>
<div class="subs" id="homeSubs"></div>
</div>

<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button onclick="saveTeam('away')">Save Team</button>
<button onclick="shareMatch()">Share</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<div class="pitch blue" id="awayPitch"></div>
<div class="subs" id="awaySubs"></div>
</div>

<div id="stats" class="section">
<div id="scoreboard"></div>

<div class="clock" id="matchClock">00:00</div>
<button onclick="startClock()">Start</button>
<button onclick="pauseClock()">Pause</button>
<button onclick="resetClock()">Reset</button>

<h3>Home</h3>
<div id="homeStats"></div>

<h3>Away</h3>
<div id="awayStats"></div>
</div>

<div id="history" class="section">
<div id="teamList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* UI */
function showTab(id,el){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 el.classList.add('active');
}

/* DATA */
const positions=[[92,50],[78,25],[78,50],[78,75],[62,25],[62,50],[62,75],[46,40],[46,60],[30,25],[30,50],[30,75],[14,25],[14,50],[14,75]];

let data={home:{name:"Home",players:Array(15).fill("")},away:{name:"Away",players:Array(15).fill("")}};
let stats={home:{goals:0,points:0,wides:0,passes:0,turnovers:0,tackles:0},away:{goals:0,points:0}};

/* PLAYER CLICK */
function playerAction(team,i){
 let c=prompt("1 Goal\n2 Point\n3 Edit Name");

 if(c=="1"){stats[team].goals++;}
 else if(c=="2"){stats[team].points++;}
 else if(c=="3"){
  let n=prompt("Name:",data[team].players[i]);
  if(n!==null) data[team].players[i]=n;
 }

 renderPitch(team);
 renderStats();
 updateScore();
}

/* RENDER */
function renderPitch(team){
 document.getElementById(team+"Pitch").innerHTML=
 positions.map((p,i)=>`
 <div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="playerAction('${team}',${i})">
 ${i+1}<br>${data[team].players[i]||""}
 </div>`).join("");
}

/* STATS (UNCHANGED ORIGINAL STYLE) */
function renderStats(){
 homeStats.innerHTML=`
 <div class="stat-row"><span>GOALS ${stats.home.goals}</span></div>
 <div class="stat-row"><span>POINTS ${stats.home.points}</span></div>
 <div class="stat-row"><span>WIDES ${stats.home.wides}</span></div>
 <div class="stat-row"><span>PASSES ${stats.home.passes}</span></div>
 <div class="stat-row"><span>TURNOVERS ${stats.home.turnovers}</span></div>
 <div class="stat-row"><span>TACKLES ${stats.home.tackles}</span></div>
 `;

 awayStats.innerHTML=`
 <div class="stat-row"><span>GOALS ${stats.away.goals}</span></div>
 <div class="stat-row"><span>POINTS ${stats.away.points}</span></div>
 `;
}

/* SCORE */
function updateScore(){
 function total(g,p){return g*3+p;}
 let h=total(stats.home.goals,stats.home.points);
 let a=total(stats.away.goals,stats.away.points);

 scoreboard.innerHTML=`<div class="score-row">
 ${data.home.name} ${stats.home.goals}-${stats.home.points} (${h}) |
 ${data.away.name} ${stats.away.goals}-${stats.away.points} (${a})
 </div>`;
}

/* SHARE */
function shareMatch(){
 html2canvas(document.querySelector('.section.active')).then(c=>{
  let link=document.createElement("a");
  link.download="match.png";
  link.href=c.toDataURL();
  link.click();
 });
}

function shareWhatsApp(){
 html2canvas(document.querySelector('.section.active')).then(canvas=>{
  canvas.toBlob(async blob=>{
    if(navigator.share){
      await navigator.share({files:[new File([blob],"match.png",{type:"image/png"})]});
    }
  });
 });
}

/* CLOCK */
let timer=null,seconds=0;
function updateClock(){
 let m=String(Math.floor(seconds/60)).padStart(2,'0');
 let s=String(seconds%60).padStart(2,'0');
 matchClock.innerText=`${m}:${s}`;
}
function startClock(){if(timer)return;timer=setInterval(()=>{seconds++;updateClock();},1000);}
function pauseClock(){clearInterval(timer);timer=null;}
function resetClock(){pauseClock();seconds=0;updateClock();}

/* INIT */
window.onload=function(){
 renderPitch("home");
 renderPitch("away");
 renderStats();
 updateScore();
 updateClock();
};

</script>

</body>
</html>
