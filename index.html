<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Stats</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

.section {
  margin: 20px 0;
}

button {
  width: 40px;
  height: 40px;
  margin: 5px;
}

.value {
  display: inline-block;
  width: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>Match Stats</h1>
<h3>Colmcille vs Team B</h3>

<h1 id="scoreboard">0-00 | 0-00</h1>

<hr>

<!-- COLMCILLE -->
<div class="section">
<h2>Colmcille (Full Stats)</h2>

<div>
Goals
<button onclick="update('home','goals',-1)">-</button>
<span id="home_goals" class="value">0</span>
<button onclick="update('home','goals',1)">+</button>

Points
<button onclick="update('home','points',-1)">-</button>
<span id="home_points" class="value">0</span>
<button onclick="update('home','points',1)">+</button>
</div>

<div>
Wides
<button onclick="stat('home_wides',-1)">-</button>
<span id="home_wides" class="value">0</span>
<button onclick="stat('home_wides',1)">+</button>

Fouls
<button onclick="stat('home_fouls',-1)">-</button>
<span id="home_fouls" class="value">0</span>
<button onclick="stat('home_fouls',1)">+</button>
</div>

<div>
Passes
<button onclick="stat('home_passes',-1)">-</button>
<span id="home_passes" class="value">0</span>
<button onclick="stat('home_passes',1)">+</button>

Turnovers
<button onclick="stat('home_turnovers',-1)">-</button>
<span id="home_turnovers" class="value">0</span>
<button onclick="stat('home_turnovers',1)">+</button>
</div>
</div>

<hr>

<!-- TEAM B -->
<div class="section">
<h2>Team B (Score Only)</h2>

<div>
Goals
<button onclick="update('away','goals',-1)">-</button>
<span id="away_goals" class="value">0</span>
<button onclick="update('away','goals',1)">+</button>

Points
<button onclick="update('away','points',-1)">-</button>
<span id="away_points" class="value">0</span>
<button onclick="update('away','points',1)">+</button>
</div>
</div>

<script>
// ✅ Separate teams completely
let home = { goals: 0, points: 0 };
let away = { goals: 0, points: 0 };

// ✅ SCORE UPDATE (fixed)
function update(team, type, change) {
  let t = team === 'home' ? home : away;

  t[type] += change;
  if (t[type] < 0) t[type] = 0;

  document.getElementById(team + "_" + type).innerText = t[type];

  renderScore();
}

// ✅ STATS (passes, fouls etc)
function stat(id, change) {
  let el = document.getElementById(id);
  let val = parseInt(el.innerText);

  if (isNaN(val)) val = 0;

  val += change;
  if (val < 0) val = 0;

  el.innerText = val;
}

// ✅ SCOREBOARD (no crossover anymore)
function renderScore() {
  const homeScore = home.goals + "-" + String(home.points).padStart(2,'0');
  const awayScore = away.goals + "-" + String(away.points).padStart(2,'0');

  document.getElementById("scoreboard").innerText =
    homeScore + " | " + awayScore;
}
</script>

</body>
</html>
