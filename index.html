<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px; height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
  display:flex; flex-direction:column; justify-content:center;
}

.subs { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 12px auto; }

.sub {
  width: 55px; height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 11px;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}

.history-item { background:#f4f4f4;margin:10px auto;padding:12px;width:90%;max-width:420px;border-radius:12px;}

.top-btn { margin:5px;padding:8px 14px;border:none;border-radius:8px;background:#333;color:white;}

.meta {
  font-size:12px;
  color:#555;
  cursor:pointer;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button class="top-btn" onclick="resetTeam('home')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('home')">Save Team</button>
<div class="pitch green" id="homePitch"></div>
<div class="subs" id="homeSubs"></div>
</div>

<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button class="top-btn" onclick="resetTeam('away')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('away')">Save Team</button>
<div class="pitch blue" id="awayPitch"></div>
<div class="subs" id="awaySubs"></div>
</div>

<div id="history" class="section">
<h2>Saved Teams</h2>
<div id="teamList"></div>
</div>

<script>

/* STORAGE */
function getTeams(){ return JSON.parse(localStorage.getItem("gaaTeams")||"[]"); }

function saveTeam(team){
let list=getTeams();
let teamData = JSON.parse(JSON.stringify(data[team]));

// keep existing if present
teamData.savedAt = new Date().toISOString();
teamData.opponent = data[team].opponent || "";
teamData.venue = data[team].venue || "";

list.unshift(teamData);
localStorage.setItem("gaaTeams",JSON.stringify(list));
renderTeams();
}

/* EDIT DATE */
function editDate(i){
let list=getTeams();
let current = list[i].savedAt ? new Date(list[i].savedAt).toLocaleString() : "";
let newDate = prompt("Edit Date:", current);
if(newDate){
  list[i].savedAt = new Date(newDate).toISOString();
  localStorage.setItem("gaaTeams",JSON.stringify(list));
  renderTeams();
}
}

/* ✅ EDIT OPPONENT */
function editOpponent(i){
let list=getTeams();
let current = list[i].opponent || "";
let val = prompt("Opponent:", current);
if(val !== null){
  list[i].opponent = val;
  localStorage.setItem("gaaTeams",JSON.stringify(list));
  renderTeams();
}
}

/* ✅ EDIT VENUE */
function editVenue(i){
let list=getTeams();
let current = list[i].venue || "";
let val = prompt("Venue:", current);
if(val !== null){
  list[i].venue = val;
  localStorage.setItem("gaaTeams",JSON.stringify(list));
  renderTeams();
}
}

function loadTeam(team,i){
let list=getTeams();
data[team]=JSON.parse(JSON.stringify(list[i]));
renderPitch(team);
renderSubs(team);
}

function deleteSavedTeam(i){
let list=getTeams();
list.splice(i,1);
localStorage.setItem("gaaTeams",JSON.stringify(list));
renderTeams();
}

function renderTeams(){
let list=getTeams();
teamList.innerHTML=list.map((t,i)=>{

let date = t.savedAt ? new Date(t.savedAt).toLocaleString() : "No date";
let opponent = t.opponent || "Tap to add opponent";
let venue = t.venue || "Tap to add venue";

return `
<div class="history-item">
<b>${t.name}</b>

<div class="meta" onclick="editDate(${i})">📅 ${date}</div>
<div class="meta" onclick="editOpponent(${i})">⚔️ ${opponent}</div>
<div class="meta" onclick="editVenue(${i})">📍 ${venue}</div>

<button onclick="loadTeam('home',${i})">Load Home</button>
<button onclick="loadTeam('away',${i})">Load Away</button>
<button onclick="deleteSavedTeam(${i})">Delete</button>
</div>`;
}).join("");
}

/* UI */

function showTab(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
}

const positions=[[92,50],[78,25],[78,50],[78,75],[62,25],[62,50],[62,75],[46,40],[46,60],[30,25],[30,50],[30,75],[14,25],[14,50],[14,75]];

let data={
home:{name:"Home",players:Array(15).fill(""),subs:Array(5).fill(""),opponent:"",venue:""},
away:{name:"Away",players:Array(15).fill(""),subs:Array(5).fill(""),opponent:"",venue:""}
};

function editTeamName(team,el){
let n=prompt("Team Name:",data[team].name);
if(n){data[team].name=n;el.innerText=n;}
}

function renderPitch(team){
document.getElementById(team+"Pitch").innerHTML=
positions.map((p,i)=>`
<div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="editPlayer('${team}',${i})">
${i+1}<br>${data[team].players[i]||""}
</div>`).join("");
}

function editPlayer(team,i){
let n=prompt("Player Name:",data[team].players[i]);
if(n!==null){data[team].players[i]=n;renderPitch(team);renderSubs(team);}
}

function renderSubs(team){
document.getElementById(team+"Subs").innerHTML=
data[team].subs.map((s,i)=>`
<div class="sub" onclick="editSub('${team}',${i})">
${i+16}<br>${s||""}
</div>`).join("");
}

function editSub(team,i){
let n=prompt("Sub Name:",data[team].subs[i]);
if(n!==null){data[team].subs[i]=n;renderSubs(team);}
}

function resetTeam(team){
if(!confirm("Reset team?")) return;
data[team].players=Array(15).fill("");
data[team].subs=Array(5).fill("");
renderPitch(team);
renderSubs(team);
}

/* INIT */
renderPitch("home");
renderPitch("away");
renderSubs("home");
renderSubs("away");
renderTeams();

</script>

</body>
</html>
