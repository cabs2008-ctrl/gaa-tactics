<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* SHARE (WHATSAPP ENABLED SAFE VERSION) */
function shareMatch(){
 const activeSection = document.querySelector('.section.active');
 if(!activeSection) return;

 html2canvas(activeSection).then(canvas => {

   canvas.toBlob(blob => {

     // Mobile share (WhatsApp will appear here)
     if (navigator.share && blob) {
       const file = new File([blob], "gaa-match.png", { type: "image/png" });

       navigator.share({
         title: "GAA Match",
         text: "Match Update",
         files: [file]
       }).catch(() => {});
     }

     // Fallback (download)
     const link = document.createElement("a");
     link.download = "gaa-match.png";
     link.href = canvas.toDataURL("image/png");
     link.click();

   });

 });
}

</script>
