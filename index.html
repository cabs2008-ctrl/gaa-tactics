<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }

.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }

.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch {
  position: relative;
  width: 95vw;
  height: 70vh;
  margin: 10px auto;
  border: 3px solid #333;
}

.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  line-height: 55px;
  font-size: 14px;
  font-weight: bold;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 10px auto;
  padding: 12px;
  width: 92%;
  max-width: 420px;
  background: #f4f4f4;
  border-radius: 14px;
}

.btn-minus, .btn-plus {
  width: 35px;
  height: 35px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
}

.btn-minus { background: #ff4d4d; color: white; }
.btn-plus { background: #28a745; color: white; }

.clock { font-size: 26px; font-weight: bold; }

.history-item {
  background: #f4f4f4;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  max-width: 420px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<div class="pitch green" id="homePitch"></div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<div class="pitch blue" id="awayPitch"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">
<h2>Match Stats</h2>
<h1 id="scoreboard"></h1>

<div class="clock" id="matchClock">00:00</div>
<button onclick="startClock()">Start</button>
<button onclick="pauseClock()">Pause</button>
<button onclick="resetClock()">Reset</button>

<h3 id="homeLabel"></h3>
<div id="homeStats"></div>

<hr>

<h3 id="awayLabel"></h3>
<div id="awayStats"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Match History</h2>
<button onclick="saveMatch()">Save Match</button>
<div id="historyList"></div>
</div>

<script>

/* POSITIONS */
const positions = [
[92,50],[78,25],[78,50],[78,75],
[62,25],[62,50],[62,75],
[46,40],[46,60],
[30,25],[30,50],[30,75],
[14,25],[14,50],[14,75]
];

/* DATA */
let data = JSON.parse(localStorage.getItem("gaaData")||"{}");

if(!data.home) data.home={name:"Home",players:Array.from({length:15},(_,i)=>i+1)};
if(!data.away) data.away={name:"Away",players:Array.from({length:15},(_,i)=>i+1)};

/* STATS LOAD */
let stats = JSON.parse(localStorage.getItem("gaaStats")||"null");

const statList = [
  {key:"goals",label:"Goals"},
  {key:"points",label:"Points"},
  {key:"wides",label:"Wides"},
  {key:"fouls",label:"Fouls"},
  {key:"turnovers",label:"Turnovers"}
];

if(!stats){
  stats = {
    home:Object.fromEntries(statList.map(s=>[s.key,0])),
    away:Object.fromEntries(statList.map(s=>[s.key,0]))
  };
}

function saveData(){
  localStorage.setItem("gaaData",JSON.stringify(data));
  localStorage.setItem("gaaStats",JSON.stringify(stats));
}

/* RENDER PLAYERS */
function renderPitch(team){
  document.getElementById(team+"Pitch").innerHTML =
    positions.map((p,i)=>`
      <div class="player"
        style="top:${p[0]}%;left:${p[1]}%"
        onclick="editPlayer('${team}',${i})">
        ${data[team].players[i]}
      </div>
    `).join("");
}

function editPlayer(team,i){
  let n=prompt("Player:",data[team].players[i]);
  if(n){ data[team].players[i]=n; saveData(); renderPitch(team); }
}

function editTeamName(team,el){
  let n=prompt("Team:",data[team].name);
  if(n){ data[team].name=n; el.innerText=n; saveData(); renderLabels(); }
}

/* TABS */
function showTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

/* STATS */
function renderStats(){
  renderLabels();

  ["home","away"].forEach(team=>{
    document.getElementById(team+"Stats").innerHTML =
      statList.map(s=>row(team,s)).join("");
  });
}

function renderLabels(){
  homeLabel.innerText = data.home.name;
  awayLabel.innerText = data.away.name;
}

function row(team,s){
  return `
  <div class="stat-row">
    <div>${s.label}</div>
    <div>
      <button class="btn-minus" onclick="updateStat('${team}','${s.key}',-1)">-</button>
      <span id="${team}_${s.key}">${stats[team][s.key]}</span>
      <button class="btn-plus" onclick="updateStat('${team}','${s.key}',1)">+</button>
    </div>
  </div>`;
}

function updateStat(team,key,val){
  stats[team][key]=Math.max(0,stats[team][key]+val);
  document.getElementById(`${team}_${key}`).innerText=stats[team][key];
  saveData();
  updateScore();
}

/* SCORE */
function updateScore(){
  let h=stats.home.goals*3+stats.home.points;
  let a=stats.away.goals*3+stats.away.points;

  scoreboard.innerText=
    `${data.home.name} ${stats.home.goals}-${stats.home.points} (${h}) 
     vs 
     ${data.away.name} ${stats.away.goals}-${stats.away.points} (${a})`;
}

/* CLOCK */
let sec=0,timer=null;

function startClock(){
  if(!timer){
    timer=setInterval(()=>{sec++;updateClock();},1000);
  }
}

function pauseClock(){
  clearInterval(timer);
  timer=null;
}

function resetClock(){
  pauseClock();
  sec=0;
  updateClock();
}

function updateClock(){
  matchClock.innerText=
    String(Math.floor(sec/60)).padStart(2,"0")+":"+
    String(sec%60).padStart(2,"0");
}

/* HISTORY */
function getHistory(){
  return JSON.parse(localStorage.getItem("gaaHistory")||"[]");
}

function saveMatch(){
  if(!scoreboard.innerText) return;

  let h=getHistory();
  h.unshift({
    score:scoreboard.innerText,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("gaaHistory",JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=getHistory();

  historyList.innerHTML=h.map((m,i)=>`
    <div class="history-item">
      ${m.score}<br>${m.date}
      <br><button onclick="deleteMatch(${i})">Delete</button>
    </div>
  `).join("");
}

function deleteMatch(i){
  let h=getHistory();
  h.splice(i,1);
  localStorage.setItem("gaaHistory",JSON.stringify(h));
  renderHistory();
}

/* INIT */
document.querySelector("#home h2").innerText=data.home.name;
document.querySelector("#away h2").innerText=data.away.name;

renderPitch("home");
renderPitch("away");
renderStats();
updateScore();
updateClock();
renderHistory();

</script>

</body>
</html>
