<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.tab { display:none; }
.active { display:block; }

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.player {
  width:48px; height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

canvas { position:absolute; top:0; left:0; }

button { margin:4px; padding:10px; }

.nav {
  background:#333;
  color:white;
  padding:10px;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('tactics')">Tactics</button>
<button onclick="showTab('score')">Score</button>
</div>

<!-- TACTICS TAB -->
<div id="tactics" class="tab active">

<div style="position:relative; max-width:400px; margin:auto;">
  <div class="pitch" id="pitch"></div>
  <canvas id="draw" width="400" height="600"></canvas>
</div>

<div>
<button onclick="formation()">Formation</button>
<button onclick="toggleTeam()">Team</button>
<button onclick="toggleDraw()">Draw</button>
<button onclick="clearDraw()">Clear</button>
</div>

</div>

<!-- SCORE TAB -->
<div id="score" class="tab">

<h2>Score</h2>

<div id="scoreDisplay">0-00</div>

<button onclick="goal()">+ Goal</button>
<button onclick="point()">+ Point</button>
<button onclick="wide()">+ Wide</button>

<p>Wides: <span id="wides">0</span></p>

</div>

<script>
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

const pitch=document.getElementById("pitch");
const canvas=document.getElementById("draw");
const ctx=canvas.getContext("2d");

let players=[];
let team="A";
let drawing=false;

// SCORE
let goals=0, points=0, wides=0;

function updateScore(){
 document.getElementById("scoreDisplay").innerText =
  goals + "-" + (points<10?"0":"") + points;
 document.getElementById("wides").innerText = wides;
}

function goal(){ goals++; updateScore(); }
function point(){ points++; updateScore(); }
function wide(){ wides++; updateScore(); }

// PLAYERS
function createPlayer(n,x,y){
 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 // TOUCH DRAG
 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  let x=e.touches[0].clientX-rect.left-offsetX;
  let y=e.touches[0].clientY-rect.top-offsetY;
  p.style.left=x+"px";
  p.style.top=y+"px";
 });

 // MOUSE DRAG
 p.onmousedown=e=>{
  let shiftX=e.clientX-p.offsetLeft;
  let shiftY=e.clientY-p.offsetTop;

  function move(e){
    p.style.left=e.pageX-shiftX+"px";
    p.style.top=e.pageY-shiftY+"px";
  }

  document.addEventListener("mousemove",move);

  document.onmouseup=()=>{
    document.removeEventListener("mousemove",move);
  };
 };

 // TAP TO RENAME
 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
 players.push(p);
}

function clearPlayers(){
 players.forEach(p=>p.remove());
 players=[];
}

// CORRECT GAA FORMATION
function formation(){
 clearPlayers();

 let pos=[
  [170,20], // GK

  [60,100],[170,100],[280,100], // FB
  [60,180],[170,180],[280,180], // HB

  [120,260],[220,260], // MF

  [60,340],[170,340],[280,340], // HF
  [60,440],[170,440],[280,440] // FF
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1]));
}

function toggleTeam(){
 team = team==="A"?"B":"A";
 alert("Team "+team);
}

// DRAWING
function toggleDraw(){ drawing=!drawing; }

canvas.addEventListener("touchstart",e=>{
 if(!drawing) return;
 ctx.beginPath();
 ctx.moveTo(e.touches[0].clientX,e.touches[0].clientY);
});

canvas.addEventListener("touchmove",e=>{
 if(!drawing) return;
 ctx.lineTo(e.touches[0].clientX,e.touches[0].clientY);
 ctx.stroke();
});

function clearDraw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
