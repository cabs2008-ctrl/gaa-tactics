<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { font-family: Arial; margin:0; text-align:center; }

.tabs { display:flex; background:#333; }
.tab { flex:1; padding:15px; color:white; cursor:pointer; }
.active { background:#555; }

.section { display:none; padding:20px; }
.section.active { display:block; }

/* PITCH FIX */
.pitch {
  width:95%;
  height:500px;
  background:#2e7d32;
  margin:auto;
  position:relative;
  border:3px solid white;
  border-radius:10px;
}

/* PLAYERS */
.player {
  width:42px;
  height:42px;
  border-radius:50%;
  background:#1b5e20;
  color:white;
  line-height:42px;
  position:absolute;
  font-weight:bold;
  transform:translate(-50%,-50%);
}

/* BUTTONS */
button { width:40px; height:40px; margin:5px; }
.value { display:inline-block; width:30px; }

</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('colmcille')">Colmcille</div>
  <div class="tab" onclick="showTab('teamB')">Team B</div>
  <div class="tab" onclick="showTab('stats')">Stats</div>
</div>

<!-- HOME -->
<div id="colmcille" class="section active">
<h2>Colmcille</h2>
<div class="pitch" id="pitchHome"></div>
</div>

<!-- AWAY -->
<div id="teamB" class="section">
<h2>Team B</h2>
<div class="pitch" id="pitchAway"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">
<h2>Match Stats</h2>
<h3>Colmcille vs Team B</h3>
<h1 id="scoreboard">0-00 | 0-00</h1>

<hr>

<h3>Colmcille</h3>

Goals
<button onclick="updateScore('home','goals',-1)">-</button>
<span id="home_goals" class="value">0</span>
<button onclick="updateScore('home','goals',1)">+</button>

Points
<button onclick="updateScore('home','points',-1)">-</button>
<span id="home_points" class="value">0</span>
<button onclick="updateScore('home','points',1)">+</button>

<br><br>

Passes
<button onclick="updateStat('home_passes',-1)">-</button>
<span id="home_passes" class="value">0</span>
<button onclick="updateStat('home_passes',1)">+</button>

Turnovers
<button onclick="updateStat('home_turnovers',-1)">-</button>
<span id="home_turnovers" class="value">0</span>
<button onclick="updateStat('home_turnovers',1)">+</button>

<hr>

<h3>Team B</h3>

Goals
<button onclick="updateScore('away','goals',-1)">-</button>
<span id="away_goals" class="value">0</span>
<button onclick="updateScore('away','goals',1)">+</button>

Points
<button onclick="updateScore('away','points',-1)">-</button>
<span id="away_points" class="value">0</span>
<button onclick="updateScore('away','points',1)">+</button>

</div>

<script>

/* TABS */
function showTab(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

 document.getElementById(id).classList.add('active');
 event.target.classList.add('active');
}

/* SCORE */
let home = { goals:0, points:0 };
let away = { goals:0, points:0 };

function updateScore(team,type,change){
 let t = team === "home" ? home : away;

 t[type] += change;
 if(t[type] < 0) t[type] = 0;

 document.getElementById(team+"_"+type).innerText = t[type];
 renderScore();
}

function updateStat(id, change){
 let el = document.getElementById(id);
 let val = parseInt(el.innerText) || 0;
 val += change;
 if(val < 0) val = 0;
 el.innerText = val;
}

function renderScore(){
 let h = home.goals + "-" + String(home.points).padStart(2,"0");
 let a = away.goals + "-" + String(away.points).padStart(2,"0");
 document.getElementById("scoreboard").innerText = h + " | " + a;
}

/* 🔥 REAL GAA FORMATION (FIXED SPACING) */
const formation = [
  [50,92],   // 1 GK

  [20,78],[50,78],[80,78], // 2-4 FB
  [20,64],[50,64],[80,64], // 5-7 HB
  [35,50],[65,50],         // 8-9 MF
  [20,36],[50,36],[80,36], // 10-12 HF
  [20,22],[50,22],[80,22]  // 13-15 FF
];

/* DRAW TEAM */
function drawTeam(id){
 let pitch = document.getElementById(id);
 pitch.innerHTML = "";

 formation.forEach((pos,i)=>{
   let p = document.createElement("div");
   p.className="player";
   p.innerText = i+1;

   p.style.left = pos[0]+"%";
   p.style.top = pos[1]+"%";

   pitch.appendChild(p);
 });
}

/* INIT */
drawTeam("pitchHome");
drawTeam("pitchAway");

</script>

</body>
</html>
