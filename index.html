<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Day Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
}

h2 {
  margin:10px;
}

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  border:3px solid black;
  position:relative;
  background:#e8f5e9;
}

.player {
  width:50px;
  height:50px;
  border-radius:50%;
  background:#2e7d32;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  cursor:grab;
}

.controls {
  margin:10px;
}

button {
  padding:12px;
  margin:5px;
  font-size:14px;
}
</style>
</head>

<body>

<h2>GAA Match Day</h2>

<div class="pitch" id="pitch"></div>

<div class="controls">
<button onclick="formation()">Formation</button>
<button onclick="kickout()">Kickout</button>
<button onclick="defense()">Defense</button>
<button onclick="reset()">Reset</button>
</div>

<script>
const pitch = document.getElementById("pitch");
let players = [];

function createPlayer(n,x,y){
  let p = document.createElement("div");
  p.className="player";
  p.innerText=n;

  p.style.left=x+"px";
  p.style.top=y+"px";

  p.draggable=true;

  p.onclick = () => {
    let name = prompt("Player:", p.innerText);
    if(name) p.innerText = name;
  };

  p.ondragend = e => {
    let rect = pitch.getBoundingClientRect();
    let x = e.clientX - rect.left - 25;
    let y = e.clientY - rect.top - 25;

    x = Math.round(x/20)*20;
    y = Math.round(y/20)*20;

    p.style.left = x + "px";
    p.style.top = y + "px";
  };

  pitch.appendChild(p);
  players.push(p);
}

function clear(){
  pitch.innerHTML="";
  players=[];
}

function formation(){
  clear();
  let pos = [
    [175,20],
    [30,100],[120,100],[210,100],[300,100],
    [30,200],[120,200],[210,200],[300,200],
    [30,300],[120,300],[210,300],[300,300],
    [100,450],[250,450]
  ];
  pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1]));
}

function kickout(){
  clear();
  let pos = [
    [175,50],
    [50,150],[300,150],[175,150],
    [100,250],[250,250],
    [175,350],
    [50,450],[300,450],
    [100,520],[250,520],
    [175,580],[50,580],[300,580],[175,620]
  ];
  pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1]));
}

function defense(){
  clear();
  let pos = [
    [175,30],
    [30,100],[120,100],[210,100],[300,100],
    [30,160],[120,160],[210,160],[300,160],
    [80,220],[175,220],[260,220],
    [120,300],[230,300],[175,360]
  ];
  pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1]));
}

function reset(){
  clear();
}
</script>

</body>
</html>
