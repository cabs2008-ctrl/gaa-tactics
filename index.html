<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GAA Match Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: white;
}

/* Tabs */
.tabs {
  display: flex;
  background: #333;
}
.tab {
  flex: 1;
  padding: 15px;
  color: white;
  cursor: pointer;
}
.tab.active {
  background: #555;
}

/* Sections */
.section {
  display: none;
  padding: 20px;
}
.section.active {
  display: block;
}

/* Pitch */
.pitch {
  position: relative;
  width: 90%;
  height: 650px; /* FIXED HEIGHT */
  margin: auto;
  background: green;
  border: 2px solid #333;
}

.pitch.blue {
  background: #1e90ff;
}

/* Players */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.3);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  line-height: 40px;
  font-weight: bold;
}

/* Stats */
.stat-line {
  margin: 10px 0;
}

button {
  width: 40px;
  height: 40px;
  margin: 5px;
}
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('home')">Colmcille</div>
  <div class="tab" onclick="showTab('away')">Team B</div>
  <div class="tab" onclick="showTab('stats')">Stats</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <h1>Colmcille</h1>

  <div class="pitch">

    <!-- Goalkeeper -->
    <div class="player" style="top:95%; left:50%;">1</div>

    <!-- Full Back -->
    <div class="player" style="top:82%; left:20%;">2</div>

    <!-- Half Back -->
    <div class="player" style="top:68%; left:20%;">5</div>

    <div class="player" style="top:68%; left:80%;">7</div>

    <!-- Midfield -->
    <div class="player" style="top:50%; left:35%;">8</div>
    <div class="player" style="top:50%; left:65%;">9</div>

    <!-- Half Forward -->
    <div class="player" style="top:32%; left:20%;">10</div>
    <div class="player" style="top:32%; left:50%;">11</div>

    <!-- Full Forward -->

  </div>
</div>

<!-- AWAY -->
<div id="away" class="section">
  <h1>Team B</h1>

  <div class="pitch blue">

    <div class="player" style="top:95%; left:50%;">1</div>

    <div class="player" style="top:82%; left:20%;">2</div>
    <div class="player" style="top:82%; left:50%;">3</div>
    <div class="player" style="top:82%; left:80%;">4</div>

    <div class="player" style="top:68%; left:20%;">5</div>
    <div class="player" style="top:68%; left:50%;">6</div>

    <div class="player" style="top:50%; left:35%;">8</div>
    <div class="player" style="top:50%; left:65%;">9</div>

    <div class="player" style="top:32%; left:20%;">10</div>
    <div class="player" style="top:32%; left:50%;">11</div>

    <div class="player" style="top:15%; left:20%;">13</div>
    <div class="player" style="top:15%; left:50%;">14</div>
    <div class="player" style="top:15%; left:80%;">15</div>

  </div>
</div>

<!-- STATS -->
<div id="stats" class="section">

  <h2>Match Stats</h2>
  <h3>Colmcille vs Team B</h3>
  <h1 id="scoreboard">0-00 | 0-00</h1>

  <hr>

  <h3>Colmcille</h3>

  <div class="stat-line">
    Goals
    <button onclick="updateHome('goals',-1)">-</button>
    <span id="home_goals">0</span>
    <button onclick="updateHome('goals',1)">+</button>
  </div>

  <div class="stat-line">
    Points
    <button onclick="updateHome('points',-1)">-</button>
    <span id="home_points">0</span>
    <button onclick="updateHome('points',1)">+</button>
  </div>

  <hr>

  <h3>Team B</h3>

  <div class="stat-line">
    Goals
    <button onclick="updateAway('goals',-1)">-</button>
    <span id="away_goals">0</span>
    <button onclick="updateAway('goals',1)">+</button>
  </div>

  <div class="stat-line">
    Points
    <button onclick="updateAway('points',-1)">-</button>
    <span id="away_points">0</span>
    <button onclick="updateAway('points',1)">+</button>
  </div>

</div>

<script>

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

/* Separate scores */
let homeGoals = 0;
let homePoints = 0;
let awayGoals = 0;
let awayPoints = 0;

function updateHome(type, change) {
  if (type === "goals") {
    homeGoals = Math.max(0, homeGoals + change);
    document.getElementById("home_goals").innerText = homeGoals;
  }
  if (type === "points") {
    homePoints = Math.max(0, homePoints + change);
    document.getElementById("home_points").innerText = homePoints;
  }
  updateScoreboard();
}

function updateAway(type, change) {
  if (type === "goals") {
    awayGoals = Math.max(0, awayGoals + change);
    document.getElementById("away_goals").innerText = awayGoals;
  }
  if (type === "points") {
    awayPoints = Math.max(0, awayPoints + change);
    document.getElementById("away_points").innerText = awayPoints;
  }
  updateScoreboard();
}

function updateScoreboard() {
  document.getElementById("scoreboard").innerText =
    homeGoals + "-" + String(homePoints).padStart(2,"0") +
    " | " +
    awayGoals + "-" + String(awayPoints).padStart(2,"0");
}

</script>

</body>
</html>
