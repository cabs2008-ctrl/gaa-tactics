<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:5px;
  padding:10px;
  color:white;
  background:#555;
  border:none;
}

.tab { display:none; }
.active { display:block; }

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

.player {
  width:45px;
  height:45px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  touch-action:none;
}

.teamA { background:#1b5e20; }
.teamB { background:#1565c0; }

.stat-row {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

.stat-block {
  display:flex;
  align-items:center;
  gap:5px;
}

button { padding:8px; font-size:16px; }
.history { max-width:400px; margin:auto; text-align:left; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('stats')">Stats</button>
<button onclick="showTab('history')">History</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3><input id="teamAInput" value="Colmcille"></h3>
<div class="pitch" id="pitchA"><div class="line"></div></div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3><input id="teamBInput" placeholder="Team B"></h3>
<div class="pitch" id="pitchB"><div class="line"></div></div>
</div>

<!-- STATS -->
<div id="stats" class="tab">

<h2>Match Stats</h2>

<h3>
<span id="nameA">Colmcille</span> vs 
<span id="nameB">Team B</span>
</h3>

<h1 id="score">0-00 | 0-00</h1>

<button onclick="confirmReset()" style="background:#c62828; color:white;">Reset</button>
<button onclick="saveMatch()" style="background:#2e7d32; color:white;">Save</button>

<hr>

<h3>Colmcille</h3>

<div class="stat-row">
<div class="stat-block">Goals 
<button onclick="gA(-1)">➖</button> 
<span id="gA_val">0</span> 
<button onclick="gA(1)">➕</button></div>

<div class="stat-block">Points 
<button onclick="pA(-1)">➖</button> 
<span id="pA_val">0</span> 
<button onclick="pA(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Wides 
<button onclick="wA(-1)">➖</button> 
<span id="wA_val">0</span> 
<button onclick="wA(1)">➕</button></div>

<div class="stat-block">Fouls 
<button onclick="fA(-1)">➖</button> 
<span id="fA_val">0</span> 
<button onclick="fA(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Passes 
<button onclick="paA(-1)">➖</button> 
<span id="paA_val">0</span> 
<button onclick="paA(1)">➕</button></div>
</div>

<hr>

<h3>Team B</h3>

<div class="stat-row">
<div class="stat-block">Goals 
<button onclick="gB(-1)">➖</button> 
<span id="gB_val">0</span> 
<button onclick="gB(1)">➕</button></div>

<div class="stat-block">Points 
<button onclick="pB(-1)">➖</button> 
<span id="pB_val">0</span> 
<button onclick="pB(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Wides 
<button onclick="wB(-1)">➖</button> 
<span id="wB_val">0</span> 
<button onclick="wB(1)">➕</button></div>

<div class="stat-block">Fouls 
<button onclick="fB(-1)">➖</button> 
<span id="fB_val">0</span> 
<button onclick="fB(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Passes 
<button onclick="paB(-1)">➖</button> 
<span id="paB_val">0</span> 
<button onclick="paB(1)">➕</button></div>
</div>

</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>Match History</h2>
<div id="historyList" class="history"></div>
</div>

<script>

window.onload = function(){
 loadPlayers();
 loadHistory();
};

function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

teamAInput.oninput = ()=> nameA.innerText = teamAInput.value;
teamBInput.oninput = ()=> nameB.innerText = teamBInput.value;

/* DATA */
let GA=0,PA=0,WA=0,FA=0,PSA=0;
let GB=0,PB=0,WB=0,FB=0,PSB=0;

function update(){
 score.innerText =
  GA+"-"+(PA<10?"0":"")+PA + " | " +
  GB+"-"+(PB<10?"0":"")+PB;

 gA_val.innerText=GA;
 pA_val.innerText=PA;
 wA_val.innerText=WA;
 fA_val.innerText=FA;
 paA_val.innerText=PSA;

 gB_val.innerText=GB;
 pB_val.innerText=PB;
 wB_val.innerText=WB;
 fB_val.innerText=FB;
 paB_val.innerText=PSB;
}

/* FUNCTIONS */
function gA(v){ GA=Math.max(0,GA+v); update(); }
function pA(v){ PA=Math.max(0,PA+v); update(); }
function wA(v){ WA=Math.max(0,WA+v); update(); }
function fA(v){ FA=Math.max(0,FA+v); update(); }
function paA(v){ PSA=Math.max(0,PSA+v); update(); }

function gB(v){ GB=Math.max(0,GB+v); update(); }
function pB(v){ PB=Math.max(0,PB+v); update(); }
function wB(v){ WB=Math.max(0,WB+v); update(); }
function fB(v){ FB=Math.max(0,FB+v); update(); }
function paB(v){ PSB=Math.max(0,PSB+v); update(); }

/* RESET */
function confirmReset(){
 if(confirm("Reset match?")) resetMatch();
}
function resetMatch(){
 GA=PA=WA=FA=PSA=0;
 GB=PB=WB=FB=PSB=0;
 update();
}

/* SAVE */
function saveMatch(){
 let history = JSON.parse(localStorage.getItem("gaaHistory")||"[]");

 history.unshift({
  teamA: teamAInput.value,
  teamB: teamBInput.value,
  score: score.innerText,
  date: new Date().toLocaleString()
 });

 localStorage.setItem("gaaHistory", JSON.stringify(history));
 loadHistory();
 alert("Saved!");
}

function loadHistory(){
 let history = JSON.parse(localStorage.getItem("gaaHistory")||"[]");
 let html="";
 history.forEach(m=>{
  html += `<div><b>${m.teamA} vs ${m.teamB}</b><br>${m.score}<br><small>${m.date}</small><hr></div>`;
 });
 document.getElementById("historyList").innerHTML=html;
}

/* PLAYERS */
function addPlayer(n,x,y,pitch){
 let p=document.createElement("div");
 p.className="player "+(pitch.id==="pitchA"?"teamA":"teamB");
 p.innerText=n;
 p.style.left=x+"px";
 p.style.top=y+"px";

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 let ox,oy;

 p.addEventListener("touchstart",e=>{
  ox=e.touches[0].clientX-p.offsetLeft;
  oy=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let r=pitch.getBoundingClientRect();
  p.style.left=(e.touches[0].clientX-r.left-ox)+"px";
  p.style.top=(e.touches[0].clientY-r.top-oy)+"px";
 });

 pitch.appendChild(p);
}

function loadPlayers(){
 let pos=[[170,20],[60,100],[170,100],[280,100],[60,180],[170,180],[280,180],[120,260],[220,260],[60,340],[170,340],[280,340],[60,440],[170,440],[280,440]];

 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],document.getElementById("pitchA")));
 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],document.getElementById("pitchB")));
}

</script>

</body>
</html>
