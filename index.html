<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.stat-row {
  display:flex;
  justify-content:center;
  gap:20px;
  margin:10px 0;
}

.stat-block {
  display:flex;
  align-items:center;
  gap:5px;
  font-size:18px;
}

.timer {
  font-size:24px;
  margin:10px;
}

button { padding:8px; font-size:16px; }
</style>
</head>

<body>

<h2>Match Stats</h2>

<h3>
<span>Colmcille</span> vs 
<span>Team B</span>
</h3>

<h1 id="score">0-00 | 0-00</h1>

<div class="timer" id="timer">00:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset Timer</button>

<br><br>

<button onclick="confirmReset()">Reset Match</button>
<button onclick="shareStats()">Share Stats</button>

<hr>

<h3>Colmcille (Full Stats)</h3>

<div class="stat-row">
<div class="stat-block">Goals <button onclick="gA(-1)">➖</button> <span id="gA">0</span> <button onclick="gA(1)">➕</button></div>
<div class="stat-block">Points <button onclick="pA(-1)">➖</button> <span id="pA">0</span> <button onclick="pA(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Wides <button onclick="wA(-1)">➖</button> <span id="wA">0</span> <button onclick="wA(1)">➕</button></div>
<div class="stat-block">Fouls <button onclick="fA(-1)">➖</button> <span id="fA">0</span> <button onclick="fA(1)">➕</button></div>
</div>

<div class="stat-row">
<div class="stat-block">Passes <button onclick="paA(-1)">➖</button> <span id="paA">0</span> <button onclick="paA(1)">➕</button></div>
<div class="stat-block">Turnovers <button onclick="toA(-1)">➖</button> <span id="toA">0</span> <button onclick="toA(1)">➕</button></div>
</div>

<hr>

<h3>Team B (Score Only)</h3>

<div class="stat-row">
<div class="stat-block">Goals <button onclick="gB(-1)">➖</button> <span id="gB">0</span> <button onclick="gB(1)">➕</button></div>
<div class="stat-block">Points <button onclick="pB(-1)">➖</button> <span id="pB">0</span> <button onclick="pB(1)">➕</button></div>
</div>

<script>

/* TIMER */
let timerInterval = null;
let seconds = 0;

function startTimer(){
 if(timerInterval !== null) return;

 timerInterval = setInterval(()=>{
  seconds++;
  let m = Math.floor(seconds/60);
  let s = seconds%60;
  document.getElementById("timer").innerText =
   (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
 },1000);
}

function pauseTimer(){
 clearInterval(timerInterval);
 timerInterval = null;
}

function resetTimer(){
 seconds = 0;
 document.getElementById("timer").innerText = "00:00";
}

/* TEAM A (HOME) */
let GA=0,PA=0,WA=0,FA=0,PSA=0,TOA=0;

/* TEAM B (AWAY - ONLY SCORE) */
let GB=0,PB=0;

/* UPDATE DISPLAY */
function update(){

 // SCORE LINE
 document.getElementById("score").innerText =
  GA+"-"+(PA<10?"0":"")+PA+" | "+
  GB+"-"+(PB<10?"0":"")+PB;

 // TEAM A
 document.getElementById("gA").innerText=GA;
 document.getElementById("pA").innerText=PA;
 document.getElementById("wA").innerText=WA;
 document.getElementById("fA").innerText=FA;
 document.getElementById("paA").innerText=PSA;
 document.getElementById("toA").innerText=TOA;

 // TEAM B (ONLY THESE)
 document.getElementById("gB").innerText=GB;
 document.getElementById("pB").innerText=PB;
}

/* TEAM A FUNCTIONS */
function gA(v){ GA=Math.max(0,GA+v); update(); }
function pA(v){ PA=Math.max(0,PA+v); update(); }
function wA(v){ WA=Math.max(0,WA+v); update(); }
function fA(v){ FA=Math.max(0,FA+v); update(); }
function paA(v){ PSA=Math.max(0,PSA+v); update(); }
function toA(v){ TOA=Math.max(0,TOA+v); update(); }

/* TEAM B FUNCTIONS (SEPARATE) */
function gB(v){ GB=Math.max(0,GB+v); update(); }
function pB(v){ PB=Math.max(0,PB+v); update(); }

/* RESET */
function confirmReset(){
 if(confirm("Reset match?")){
  GA=PA=WA=FA=PSA=TOA=0;
  GB=PB=0;
  update();
 }
}

/* SHARE */
function shareStats(){
 html2canvas(document.body).then(canvas=>{
  canvas.toBlob(blob=>{
   let file=new File([blob],"stats.png",{type:"image/png"});
   if(navigator.share){
    navigator.share({files:[file]});
   }
  });
 });
}

/* INIT */
update();

</script>

</body>
</html>
