<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Day Pro</title>
<style>
body { font-family: Arial; text-align:center; margin:0; }
.pitch { width:100%; max-width:360px; height:560px; margin:auto; border:2px solid black; position:relative; background:#f9f9f9;}
.player {
  width:48px;height:48px;border-radius:50%;color:white;position:absolute;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px; cursor:grab;
}
.teamA{background:#4CAF50;}
button { margin:4px; padding:10px; font-size:14px; }
</style>
</head>
<body>

<h3>GAA Match Day Pro</h3>

<div class="pitch" id="pitch"></div>

<div>
<button onclick="preset()">Standard</button>
<button onclick="kickout()">Kickout Press</button>
<button onclick="defense()">Defensive Shell</button>
<button onclick="twoFF()">2-Man FF</button>
</div>

<script>
const pitch=document.getElementById("pitch");
let players=[];

function create(n,x,y){
 let p=document.createElement("div");
 p.className="player teamA";
 p.innerText=n;
 p.style.left=x+"px"; p.style.top=y+"px";
 p.draggable=true;

 p.ondragend=e=>{
  let r=pitch.getBoundingClientRect();
  let x=e.clientX-r.left-24;
  let y=e.clientY-r.top-24;
  x=Math.round(x/25)*25; y=Math.round(y/25)*25;
  p.style.left=x+"px"; p.style.top=y+"px";
 };

 pitch.appendChild(p); players.push(p);
}

function clear(){ pitch.innerHTML=""; players=[]; }

function preset(){
 clear();
 let pos=[[150,20],[20,100],[100,100],[180,100],[260,100],
 [20,200],[100,200],[180,200],[260,200],
 [20,300],[100,300],[180,300],[260,300],
 [80,420],[200,420]];
 pos.forEach((p,i)=>create(i+1,p[0],p[1]));
}

function kickout(){
 clear();
 let pos=[[150,40],[40,140],[260,140],[150,140],
 [80,240],[220,240],[150,300],
 [40,360],[260,360],
 [80,440],[220,440],
 [150,480],[50,500],[250,500],[150,520]];
 pos.forEach((p,i)=>create(i+1,p[0],p[1]));
}

function defense(){
 clear();
 let pos=[[150,30],[20,80],[100,80],[180,80],[260,80],
 [20,140],[100,140],[180,140],[260,140],
 [60,200],[140,200],[220,200],
 [80,260],[200,260],[150,320]];
 pos.forEach((p,i)=>create(i+1,p[0],p[1]));
}

function twoFF(){
 clear();
 let pos=[[150,20],[20,100],[100,100],[180,100],[260,100],
 [20,200],[100,200],[180,200],[260,200],
 [60,300],[140,300],[220,300],
 [100,450],[200,450],[150,500]];
 pos.forEach((p,i)=>create(i+1,p[0],p[1]));
}
</script>

</body>
</html>
