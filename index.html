<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
 position: absolute;
 transform: translate(-50%, -50%);
 width: 55px; height: 55px;
 border-radius: 50%;
 background: rgba(255,255,255,0.7);
 font-size: 12px;
 display:flex; flex-direction:column; justify-content:center;
 cursor:pointer;
}

.subs { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:12px auto; }

.sub {
 width:55px;height:55px;border-radius:50%;
 background:rgba(255,255,255,0.7);
 font-size:11px;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
 cursor:pointer;
}

.history-item { background:#f4f4f4;margin:10px auto;padding:12px;width:90%;max-width:420px;border-radius:12px;}

.stat-row {
 display:flex; justify-content:space-between; align-items:center;
 margin:10px auto; padding:12px;
 width:92%; max-width:420px;
 background:#f4f4f4; border-radius:14px;
}

.btn-minus,.btn-plus {
 width:35px;height:35px;border:none;border-radius:10px;font-size:18px;
}
.btn-minus{background:#ff4d4d;color:white;}
.btn-plus{background:#28a745;color:white;}

.score-row {
 padding:10px;
 margin:10px auto;
 max-width:420px;
 background:#555;
 color:white;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="showTab('home',this)">Home</div>
<div class="tab" onclick="showTab('away',this)">Away</div>
<div class="tab" onclick="showTab('stats',this)">Stats</div>
<div class="tab" onclick="showTab('history',this)">History</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<button onclick="saveTeam('home')">Save Team</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<div class="pitch green" id="homePitch"></div>
<div class="subs" id="homeSubs"></div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<button onclick="saveTeam('away')">Save Team</button>
<button onclick="shareWhatsApp()">WhatsApp</button>
<div class="pitch blue" id="awayPitch"></div>
<div class="subs" id="awaySubs"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">
<div id="scoreboard"></div>
<div id="homeStats"></div>
<div id="awayStats"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<div id="teamList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* UI */
function showTab(id,el){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 el.classList.add('active');
}

/* DATA */
const positions=[[92,50],[78,25],[78,50],[78,75],[62,25],[62,50],[62,75],[46,40],[46,60],[30,25],[30,50],[30,75],[14,25],[14,50],[14,75]];

let data={
 home:{players:Array(15).fill(""),subs:Array(5).fill("")},
 away:{players:Array(15).fill(""),subs:Array(5).fill("")}
};

let stats={
 home:{goals:0,points:0,wides:0,passes:0,turnovers:0,tackles:0},
 away:{goals:0,points:0}
};

/* TEAM */
function renderPitch(team){
 document.getElementById(team+"Pitch").innerHTML=
 positions.map((p,i)=>`
 <div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="editPlayer('${team}',${i})">
 ${i+1}<br>${data[team].players[i]||""}
 </div>`).join("");
}

function renderSubs(team){
 document.getElementById(team+"Subs").innerHTML=
 data[team].subs.map((s,i)=>`
 <div class="sub" onclick="editSub('${team}',${i})">
 ${i+16}<br>${s||""}
 </div>`).join("");
}

function editPlayer(team,i){
 let n=prompt("Player Name:",data[team].players[i]);
 if(n!==null){data[team].players[i]=n;renderPitch(team);}
}

function editSub(team,i){
 let n=prompt("Sub Name:",data[team].subs[i]);
 if(n!==null){data[team].subs[i]=n;renderSubs(team);}
}

/* STATS FULL */
function renderStats(){
 homeStats.innerHTML=`
 <div class="stat-row"><button class="btn-minus" onclick="updateScoreStat('home','goals',-1)">-G</button> GOALS ${stats.home.goals} <button class="btn-plus" onclick="updateScoreStat('home','goals',1)">+G</button></div>
 <div class="stat-row"><button class="btn-minus" onclick="updateScoreStat('home','points',-1)">-P</button> POINTS ${stats.home.points} <button class="btn-plus" onclick="updateScoreStat('home','points',1)">+P</button></div>
 <div class="stat-row">WIDES ${stats.home.wides}</div>
 <div class="stat-row">PASSES ${stats.home.passes}</div>
 <div class="stat-row">TURNOVERS ${stats.home.turnovers}</div>
 <div class="stat-row">TACKLES ${stats.home.tackles}</div>
 `;
 awayStats.innerHTML=`
 <div class="stat-row"><button class="btn-minus" onclick="updateScoreStat('away','goals',-1)">-G</button> GOALS ${stats.away.goals} <button class="btn-plus" onclick="updateScoreStat('away','goals',1)">+G</button></div>
 <div class="stat-row"><button class="btn-minus" onclick="updateScoreStat('away','points',-1)">-P</button> POINTS ${stats.away.points} <button class="btn-plus" onclick="updateScoreStat('away','points',1)">+P</button></div>
 `;
}

function updateScoreStat(team,type,val){
 stats[team][type]+=val;
 if(stats[team][type]<0) stats[team][type]=0;
 renderStats(); updateScore();
}

/* SCORE */
function updateScore(){
 let h=stats.home.goals*3+stats.home.points;
 let a=stats.away.goals*3+stats.away.points;
 scoreboard.innerHTML=`<div class="score-row">${h} - ${a}</div>`;
}

/* SHARE */
function shareWhatsApp(){
 html2canvas(document.querySelector('.section.active')).then(canvas=>{
  canvas.toBlob(async blob=>{
    if(navigator.share){
      await navigator.share({
        files:[new File([blob],"match.png",{type:"image/png"})]
      });
    }
  });
 });
}

/* SAVE */
function saveTeam(team){
 let teams=JSON.parse(localStorage.getItem("teams")||"[]");
 teams.push(JSON.parse(JSON.stringify(data[team])));
 localStorage.setItem("teams",JSON.stringify(teams));
 renderHistory();
}

/* HISTORY */
function renderHistory(){
 let teams=JSON.parse(localStorage.getItem("teams")||"[]");

 teamList.innerHTML=teams.map((t,i)=>`
 <div class="history-item">
 Team ${i+1}
 <button onclick="loadTeam(${i})">Load</button>
 <button onclick="deleteTeam(${i})">Delete</button>
 </div>`).join("");
}

function loadTeam(i){
 let teams=JSON.parse(localStorage.getItem("teams")||"[]");
 data.home=JSON.parse(JSON.stringify(teams[i]));
 renderPitch("home");
 renderSubs("home");
}

function deleteTeam(i){
 let teams=JSON.parse(localStorage.getItem("teams")||"[]");
 teams.splice(i,1);
 localStorage.setItem("teams",JSON.stringify(teams));
 renderHistory();
}

/* INIT */
window.onload=function(){
 renderPitch("home"); renderPitch("away");
 renderSubs("home"); renderSubs("away");
 renderStats();
 updateScore();
 renderHistory();
};

</script>

</body>
</html>
