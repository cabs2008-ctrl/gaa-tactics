<script>

/* =========================
   TIMER
========================= */
let timerInterval = null;
let seconds = 0;

function startTimer(){
  if(timerInterval) return;
  timerInterval = setInterval(()=>{
    seconds++;
    let m = Math.floor(seconds/60);
    let s = seconds % 60;
    document.getElementById("timer").innerText =
      (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  },1000);
}

function pauseTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
}

function resetTimer(){
  seconds = 0;
  document.getElementById("timer").innerText = "00:00";
}

/* =========================
   STATS (SEPARATE TEAMS)
========================= */

// HOME TEAM
let GA=0, PA=0, WA=0, FA=0, PSA=0, TOA=0;

// AWAY TEAM
let GB=0, PB=0;

/* =========================
   UPDATE DISPLAY
========================= */
function updateScore(){

  // SCORE LINE
  document.getElementById("score").innerText =
    GA + "-" + (PA<10?"0":"") + PA +
    " | " +
    GB + "-" + (PB<10?"0":"") + PB;

  // HOME TEAM
  setText("gA", GA);
  setText("pA", PA);
  setText("wA", WA);
  setText("fA", FA);
  setText("paA", PSA);
  setText("toA", TOA);

  // AWAY TEAM
  setText("gB", GB);
  setText("pB", PB);
}

/* SAFE SET TEXT */
function setText(id, value){
  let el = document.getElementById(id);
  if(el) el.innerText = value;
}

/* =========================
   HOME TEAM BUTTONS
========================= */
function addGA(v){ GA = Math.max(0, GA + v); updateScore(); }
function addPA(v){ PA = Math.max(0, PA + v); updateScore(); }
function addWA(v){ WA = Math.max(0, WA + v); updateScore(); }
function addFA(v){ FA = Math.max(0, FA + v); updateScore(); }
function addPSA(v){ PSA = Math.max(0, PSA + v); updateScore(); }
function addTOA(v){ TOA = Math.max(0, TOA + v); updateScore(); }

/* =========================
   TEAM B (ISOLATED FIX)
========================= */
function addGB(v){
  GB = Math.max(0, GB + v);
  updateScore();
}

function addPB(v){
  PB = Math.max(0, PB + v);
  updateScore();
}

/* =========================
   RESET MATCH
========================= */
function confirmReset(){
  if(confirm("Are you sure you want to reset the match?")){
    GA=PA=WA=FA=PSA=TOA=0;
    GB=PB=0;
    updateScore();
  }
}

/* =========================
   SHARE
========================= */
function shareStats(){
  html2canvas(document.body).then(canvas=>{
    canvas.toBlob(blob=>{
      let file = new File([blob],"stats.png",{type:"image/png"});
      if(navigator.share){
        navigator.share({files:[file]});
      }
    });
  });
}

/* INIT */
updateScore();

</script>
