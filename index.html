<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
  display:flex; flex-direction:column; justify-content:center;
}
.player.selected { border:3px solid yellow; }

.subs {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 10px; margin: 12px auto; width: 95%; max-width: 420px;
}

.sub {
  width: 55px; height: 55px; border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 11px;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}

.stat-row {
  display: flex; justify-content: space-between;
  margin: 10px auto; padding: 12px;
  width: 92%; max-width: 420px;
  background: #f4f4f4; border-radius: 14px;
}

.btn-minus,.btn-plus {
  width: 35px; height: 35px; border: none;
  border-radius: 10px; font-size: 18px;
}
.btn-minus { background:#ff4d4d;color:white; }
.btn-plus { background:#28a745;color:white; }

.clock { font-size: 26px; font-weight: bold; }
.history-item { background:#f4f4f4;margin:10px auto;padding:12px;width:90%;max-width:420px;border-radius:12px;}
.top-btn { margin:5px;padding:8px 14px;border:none;border-radius:8px;background:#333;color:white;}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button class="top-btn" onclick="toggleSwapMode()">Swap Mode</button>
<button class="top-btn" onclick="resetTeam('home')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('home')">Save Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>
<div class="pitch green" id="homePitch"></div>
<h4>Subs</h4>
<div class="subs" id="homeSubs"></div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button class="top-btn" onclick="toggleSwapMode()">Swap Mode</button>
<button class="top-btn" onclick="resetTeam('away')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('away')">Save Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>
<div class="pitch blue" id="awayPitch"></div>
<h4>Subs</h4>
<div class="subs" id="awaySubs"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">
<h2>Match Stats</h2>
<button class="top-btn" onclick="shareMatch()">Share</button>

<h1 id="scoreboard"></h1>

<div class="clock" id="matchClock">00:00</div>
<button onclick="startClock()">Start</button>
<button onclick="pauseClock()">Pause</button>
<button onclick="resetClock()">Reset</button>

<h3>Home</h3>
<div id="homeStats"></div>

<hr>

<h3>Away</h3>
<div id="awayStats"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Match History</h2>
<button class="top-btn" onclick="saveMatch()">Save Match</button>
<button class="top-btn" onclick="shareMatch()">Share</button>

<h3>Saved Teams</h3>
<div id="teamList"></div>

<h3>Matches</h3>
<div id="historyList"></div>
</div>

<script>

/* POSITIONS */
const positions = [
[92,50],[78,25],[78,50],[78,75],
[62,25],[62,50],[62,75],
[46,40],[46,60],
[30,25],[30,50],[30,75],
[14,25],[14,50],[14,75]
];

/* DATA */
let data = JSON.parse(localStorage.getItem("gaaData")||"{}");
if(!data.home) data.home={name:"Home",players:Array(15).fill(""),subs:Array(5).fill("")};
if(!data.away) data.away={name:"Away",players:Array(15).fill(""),subs:Array(5).fill("")};
function saveData(){ localStorage.setItem("gaaData",JSON.stringify(data)); }

/* TEAM SAVE */
function getTeams(){ return JSON.parse(localStorage.getItem("gaaTeams")||"[]"); }
function saveTeam(team){
let list=getTeams();
list.unshift({...data[team]});
localStorage.setItem("gaaTeams",JSON.stringify(list));
renderTeams();
}
function loadTeam(team,i){
let list=getTeams();
data[team]=JSON.parse(JSON.stringify(list[i]));
saveData();
renderPitch(team);
renderSubs(team);
}
function deleteTeam(i){
let list=getTeams();
list.splice(i,1);
localStorage.setItem("gaaTeams",JSON.stringify(list));
renderTeams();
}
function renderTeams(){
let list=getTeams();
teamList.innerHTML=list.map((t,i)=>`
<div class="history-item">
<b>${t.name}</b><br>
<button onclick="loadTeam('home',${i})">Load Home</button>
<button onclick="loadTeam('away',${i})">Load Away</button>
<button onclick="deleteTeam(${i})">Delete</button>
</div>`).join("");
}

/* TEAM NAME */
function editTeamName(team, el){
let name=prompt("Team Name:",data[team].name);
if(name){data[team].name=name;el.innerText=name;saveData();}
}

/* PLAYERS + SUBS (unchanged swap logic) */
let swapMode=false,selectedPlayer=null;
function toggleSwapMode(){ swapMode=!swapMode; selectedPlayer=null; }

function renderPitch(team){
document.getElementById(team+"Pitch").innerHTML=
positions.map((p,i)=>`
<div class="player" style="top:${p[0]}%;left:${p[1]}">${i+1}<br>${data[team].players[i]||""}</div>`).join("");
}

function renderSubs(team){
document.getElementById(team+"Subs").innerHTML=
data[team].subs.map((s,i)=>`<div class="sub">${i+16}<br>${s||""}</div>`).join("");
}

/* ===== STATS RESTORED ===== */
const homeStatsList=[
{key:"goals",label:"Goals"},{key:"points",label:"Points"},
{key:"wides",label:"Wides"},{key:"fouls",label:"Fouls"},
{key:"turnovers",label:"Turnovers"},{key:"passes",label:"Passes"},
{key:"tackles",label:"Tackles"}
];
const awayStatsList=[
{key:"goals",label:"Goals"},{key:"points",label:"Points"}
];

let stats={
home:Object.fromEntries(homeStatsList.map(s=>[s.key,0])),
away:Object.fromEntries(awayStatsList.map(s=>[s.key,0]))
};

function renderStats(){
homeStats.innerHTML=homeStatsList.map(s=>`
<div class="stat-row">
<div>${s.label}</div>
<div>
<button class="btn-minus" onclick="updateStat('home','${s.key}',-1)">-</button>
<span id="home_${s.key}">${stats.home[s.key]}</span>
<button class="btn-plus" onclick="updateStat('home','${s.key}',1)">+</button>
</div></div>`).join("");

awayStats.innerHTML=awayStatsList.map(s=>`
<div class="stat-row">
<div>${s.label}</div>
<div>
<button class="btn-minus" onclick="updateStat('away','${s.key}',-1)">-</button>
<span id="away_${s.key}">${stats.away[s.key]}</span>
<button class="btn-plus" onclick="updateStat('away','${s.key}',1)">+</button>
</div></div>`).join("");
}

function updateStat(team,key,val){
stats[team][key]=Math.max(0,stats[team][key]+val);
document.getElementById(`${team}_${key}`).innerText=stats[team][key];
updateScore();
}

function updateScore(){
let h=stats.home.goals*3+stats.home.points;
let a=stats.away.goals*3+stats.away.points;
scoreboard.innerText=`${data.home.name} ${stats.home.goals}-${stats.home.points} (${h}) | ${data.away.name} ${stats.away.goals}-${stats.away.points} (${a})`;
}

/* CLOCK */
let sec=0,timer=null;
function startClock(){ if(!timer) timer=setInterval(()=>{sec++;updateClock();},1000); }
function pauseClock(){ clearInterval(timer); timer=null; }
function resetClock(){ pauseClock(); sec=0; updateClock(); }
function updateClock(){
matchClock.innerText=String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0");
}

/* HISTORY */
function getHistory(){ return JSON.parse(localStorage.getItem("gaaHistory")||"[]"); }
function saveMatch(){
let h=getHistory();
h.unshift({score:scoreboard.innerText,date:new Date().toLocaleString()});
localStorage.setItem("gaaHistory",JSON.stringify(h));
renderHistory();
}
function renderHistory(){
let h=getHistory();
historyList.innerHTML=h.map(m=>`<div class="history-item">${m.score}<br>${m.date}</div>`).join("");
}

/* SHARE */
function shareMatch(){
let text=scoreboard.innerText||"No score yet";
if(navigator.share){navigator.share({text});}
else{prompt("Copy:",text);}
}

/* TABS */
function showTab(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
}

/* INIT */
document.querySelector("#home h2").innerText=data.home.name;
document.querySelector("#away h2").innerText=data.away.name;

renderPitch("home");
renderPitch("away");
renderSubs("home");
renderSubs("away");
renderStats();
updateScore();
updateClock();
renderTeams();
renderHistory();

</script>

</body>
</html>
