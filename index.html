<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.tab { display:none; }
.active { display:block; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:3px;
  padding:8px;
  color:white;
  background:#555;
  border:none;
}

/* PITCH */
.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

/* PLAYERS */
.player {
  width:48px;
  height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

button { margin:5px; padding:10px; }

input { padding:8px; font-size:14px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Columkill</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('score')">Score</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3>Columkill</h3>
<div class="pitch" id="pitchA">
<div class="line"></div>
</div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3>
<input id="teamBInput" placeholder="Enter Team B name" oninput="updateTeamBName()">
</h3>
<div class="pitch" id="pitchB">
<div class="line"></div>
</div>
</div>

<!-- SCORE -->
<div id="score" class="tab">
<h2>Match Stats</h2>

<h3>Columkill vs <span id="scoreTeamB">Team B</span></h3>

<h1 id="scoreDisplay">0-00</h1>

<h3>Goals</h3>
<button onclick="goal(-1)">➖</button>
<span id="g">0</span>
<button onclick="goal(1)">➕</button>

<h3>Points</h3>
<button onclick="point(-1)">➖</button>
<span id="p">0</span>
<button onclick="point(1)">➕</button>

<h3>Wides</h3>
<button onclick="wide(-1)">➖</button>
<span id="w">0</span>
<button onclick="wide(1)">➕</button>

</div>

<script>

// TAB SWITCH
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// TEAM B NAME
function updateTeamBName(){
 let name = document.getElementById("teamBInput").value || "Team B";
 document.getElementById("scoreTeamB").innerText = name;
}

// SCORE SYSTEM
let goals = 0;
let points = 0;
let wides = 0;

function updateScore(){
 document.getElementById("scoreDisplay").innerText =
  goals + "-" + (points<10?"0":"") + points;

 document.getElementById("g").innerText = goals;
 document.getElementById("p").innerText = points;
 document.getElementById("w").innerText = wides;
}

function goal(val){
 goals = Math.max(0, goals + val);
 updateScore();
}

function point(val){
 points = Math.max(0, points + val);
 updateScore();
}

function wide(val){
 wides = Math.max(0, wides + val);
 updateScore();
}

// PLAYER CREATION
function createPlayer(n,x,y,team){
 let pitch = team==="A" ? pitchA : pitchB;

 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  let x=e.touches[0].clientX-rect.left-offsetX;
  let y=e.touches[0].clientY-rect.top-offsetY;
  p.style.left=x+"px";
  p.style.top=y+"px";
 });

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
}

// GAA FORMATION
function loadFormation(){
 let pos=[
  [170,20],   // GK
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],"A"));
 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],"B"));
}

// LOAD
window.onload = loadFormation;

</script>

</body>
</html>
