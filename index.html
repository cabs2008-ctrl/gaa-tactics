<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:5px;
  padding:10px;
  color:white;
  background:#555;
  border:none;
}

.tab { display:none; }
.active { display:block; }

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

.player {
  width:45px;
  height:45px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  background:#1b5e20;
  touch-action:none;
}

button { padding:8px; margin:3px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('stats')">Stats</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3><input id="teamAInput" value="Colmcille"></h3>
<div class="pitch" id="pitchA"><div class="line"></div></div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3><input id="teamBInput" placeholder="Team B"></h3>
<div class="pitch" id="pitchB"><div class="line"></div></div>
</div>

<!-- STATS -->
<div id="stats" class="tab">

<h2>Match Stats</h2>

<h3>
<span id="nameA">Colmcille</span> vs 
<span id="nameB">Team B</span>
</h3>

<h1 id="score">0-00 | 0-00</h1>

<hr>

<h3>Colmcille</h3>

Goals <button onclick="gA(-1)">➖</button> <span id="gA">0</span> <button onclick="gA(1)">➕</button><br><br>
Points <button onclick="pA(-1)">➖</button> <span id="pA">0</span> <button onclick="pA(1)">➕</button><br><br>
Wides <button onclick="wA(-1)">➖</button> <span id="wA">0</span> <button onclick="wA(1)">➕</button><br><br>
Fouls <button onclick="fA(-1)">➖</button> <span id="fA">0</span> <button onclick="fA(1)">➕</button><br><br>
Passes <button onclick="paA(-1)">➖</button> <span id="paA">0</span> <button onclick="paA(1)">➕</button>

<hr>

<h3>Team B</h3>

Goals <button onclick="gB(-1)">➖</button> <span id="gB">0</span> <button onclick="gB(1)">➕</button><br><br>
Points <button onclick="pB(-1)">➖</button> <span id="pB">0</span> <button onclick="pB(1)">➕</button><br><br>
Wides <button onclick="wB(-1)">➖</button> <span id="wB">0</span> <button onclick="wB(1)">➕</button><br><br>
Fouls <button onclick="fB(-1)">➖</button> <span id="fB">0</span> <button onclick="fB(1)">➕</button><br><br>
Passes <button onclick="paB(-1)">➖</button> <span id="paB">0</span> <button onclick="paB(1)">➕</button>

</div>

<script>

/* TABS */
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* TEAM NAMES */
teamAInput.oninput = ()=> nameA.innerText = teamAInput.value;
teamBInput.oninput = ()=> nameB.innerText = teamBInput.value;

/* STATS */
let GA=0, PA=0, WA=0, FA=0, PSA=0;
let GB=0, PB=0, WB=0, FB=0, PSB=0;

function update(){
 score.innerText =
  GA+"-"+(PA<10?"0":"")+PA + " | " +
  GB+"-"+(PB<10?"0":"")+PB;

 document.getElementById("gA").innerText=GA;
 document.getElementById("pA").innerText=PA;
 document.getElementById("wA").innerText=WA;
 document.getElementById("fA").innerText=FA;
 document.getElementById("paA").innerText=PSA;

 document.getElementById("gB").innerText=GB;
 document.getElementById("pB").innerText=PB;
 document.getElementById("wB").innerText=WB;
 document.getElementById("fB").innerText=FB;
 document.getElementById("paB").innerText=PSB;
}

/* FUNCTIONS */
function gA(v){ GA=Math.max(0,GA+v); update(); }
function pA(v){ PA=Math.max(0,PA+v); update(); }
function wA(v){ WA=Math.max(0,WA+v); update(); }
function fA(v){ FA=Math.max(0,FA+v); update(); }
function paA(v){ PSA=Math.max(0,PSA+v); update(); }

function gB(v){ GB=Math.max(0,GB+v); update(); }
function pB(v){ PB=Math.max(0,PB+v); update(); }
function wB(v){ WB=Math.max(0,WB+v); update(); }
function fB(v){ FB=Math.max(0,FB+v); update(); }
function paB(v){ PSB=Math.max(0,PSB+v); update(); }

/* PLAYERS */
function addPlayer(n,x,y,pitch){
 let p=document.createElement("div");
 p.className="player";
 p.innerText=n;
 p.style.left=x+"px";
 p.style.top=y+"px";

 let ox, oy;

 p.addEventListener("touchstart",e=>{
  ox=e.touches[0].clientX-p.offsetLeft;
  oy=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let r=pitch.getBoundingClientRect();
  p.style.left=(e.touches[0].clientX-r.left-ox)+"px";
  p.style.top=(e.touches[0].clientY-r.top-oy)+"px";
 });

 pitch.appendChild(p);
}

/* FORMATION */
function load(){
 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],pitchA));
 pos.forEach((p,i)=>addPlayer(i+1,p[0],p[1],pitchB));
}

window.onload=load;

</script>

</body>
</html>
