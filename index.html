<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
 position: absolute;
 transform: translate(-50%, -50%);
 width: 60px; height: 60px;
 border-radius: 50%;
 background: rgba(255,255,255,0.85);
 font-size: 11px;
 display:flex; flex-direction:column; justify-content:center;
 cursor:pointer;
}

.subs { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:12px auto; }

.sub {
 width:55px;height:55px;border-radius:50%;
 background:rgba(255,255,255,0.7);
 font-size:11px;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
 cursor:pointer;
}

.stat-row {
 display:flex; justify-content:space-between; align-items:center;
 margin:10px auto; padding:12px;
 width:92%; max-width:420px;
 background:#f4f4f4; border-radius:14px;
}

.btn-minus,.btn-plus {
 width:35px;height:35px;border:none;border-radius:10px;font-size:18px;
}
.btn-minus{background:#ff4d4d;color:white;}
.btn-plus{background:#28a745;color:white;}

.clock { font-size:26px;font-weight:bold; }

.score-row {
 padding:10px;
 margin:10px auto;
 max-width:420px;
 background:#555;
 color:white;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="tabs">
 <div class="tab active" onclick="showTab('home',this)">Home</div>
 <div class="tab" onclick="showTab('away',this)">Away</div>
 <div class="tab" onclick="showTab('stats',this)">Stats</div>
</div>

<div id="home" class="section active">
<h2>Home</h2>
<div class="pitch green" id="homePitch"></div>
</div>

<div id="away" class="section">
<h2>Away</h2>
<div class="pitch blue" id="awayPitch"></div>
</div>

<div id="stats" class="section">
<div id="scoreboard"></div>
</div>

<script>

/* UI */
function showTab(id,el){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 el.classList.add('active');
}

/* DATA */
const positions=[[92,50],[78,25],[78,50],[78,75],[62,25],[62,50],[62,75],[46,40],[46,60],[30,25],[30,50],[30,75],[14,25],[14,50],[14,75]];

let data={
 home:{players:Array(15).fill(""),scores:Array(15).fill({g:0,p:0})},
 away:{players:Array(15).fill(""),scores:Array(15).fill({g:0,p:0})}
};

let stats={home:{goals:0,points:0},away:{goals:0,points:0}};

/* PLAYER CLICK = SCORE */
function playerAction(team,i){
 let choice=prompt("1 = Goal\n2 = Point\n3 = Edit Name");

 if(choice=="1"){
  stats[team].goals++;
  data[team].scores[i].g++;
 }
 else if(choice=="2"){
  stats[team].points++;
  data[team].scores[i].p++;
 }
 else if(choice=="3"){
  let n=prompt("Name:",data[team].players[i]);
  if(n!==null) data[team].players[i]=n;
 }

 renderPitch(team);
 updateScore();
}

/* RENDER */
function renderPitch(team){
 document.getElementById(team+"Pitch").innerHTML=
 positions.map((p,i)=>{
  let sc=data[team].scores[i];
  return `<div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="playerAction('${team}',${i})">
  ${i+1}<br>${data[team].players[i]||""}<br>${sc.g}-${sc.p}
  </div>`;
 }).join("");
}

/* SCOREBOARD */
function updateScore(){
 function total(g,p){return g*3+p;}
 let h=total(stats.home.goals,stats.home.points);
 let a=total(stats.away.goals,stats.away.points);

 document.getElementById("scoreboard").innerHTML=
 `<div class="score-row">Home ${stats.home.goals}-${stats.home.points} (${h}) | Away ${stats.away.goals}-${stats.away.points} (${a})</div>`;
}

/* INIT */
window.onload=function(){
 renderPitch("home");
 renderPitch("away");
 updateScore();
};

</script>

</body>
</html>
