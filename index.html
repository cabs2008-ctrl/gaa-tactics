<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAA Match Tracker</title>

<style>

body {
  font-family: Arial;
  margin: 0;
  background: white;
  text-align: center;
}

/* TABS */
.tabs {
  display: flex;
  width: 100%;
  background: #333;
}

.tab {
  flex: 1;
  padding: 16px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.tab.active { background: #555; }

/* SECTIONS */
.section {
  display: none;
  padding: 10px;
}

.section.active { display: block; }

/* PITCH */
.pitch {
  position: relative;
  width: 95vw;
  height: 70vh;
  margin: 10px auto;
  border: 3px solid #333;
}

.green { background: green; }
.blue { background: #1e90ff; }

/* PLAYERS */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  line-height: 55px;
  font-size: 16px;
  font-weight: bold;
}

/* STATS */
.stats-container { margin-top: 10px; }

.team-title {
  font-size: 22px;
  margin: 10px 0;
  font-weight: bold;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px auto;
  padding: 12px 16px;
  width: 92%;
  max-width: 420px;
  background: #f4f4f4;
  border-radius: 14px;
  font-size: 18px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.stat-label { font-weight: 600; }

.stat-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.stat-controls span {
  min-width: 30px;
  text-align: center;
  font-weight: bold;
}

.stat-controls button {
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 10px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}

.btn-minus { background: #ff4d4d; color: white; }
.btn-plus { background: #28a745; color: white; }

.highlight {
  background: #fff3cd;
  border: 2px solid #ffc107;
}

.stat-controls button:active {
  transform: scale(0.9);
}

/* HISTORY */
.history-item {
  background: #f4f4f4;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  max-width: 420px;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.history-title { font-weight: bold; }

.history-buttons {
  margin-top: 8px;
  display: flex;
  justify-content: space-around;
}

h1 { font-size: 34px; }
h2 { font-size: 26px; }

button {
  padding: 10px 16px;
  font-size: 16px;
  margin: 10px 0;
}

</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Colmcille</div>
  <div class="tab" onclick="showTab('away',this)">Team B</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2 onclick="editTeamName(this)">Colmcille</h2>
<button onclick="sharePage()">Share</button>

<div class="pitch green">
  <div class="player" style="top:92%; left:50%" onclick="editPlayer(this)">1</div>
</div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2 onclick="editTeamName(this)">Team B</h2>

<div class="pitch blue">
  <div class="player" style="top:92%; left:50%" onclick="editPlayer(this)">1</div>
</div>
</div>

<!-- STATS -->
<div id="stats" class="section">
  <h2>Match Stats</h2>
  <button onclick="sharePage()">Share</button>

  <h1 id="scoreboard">0-00 | 0-00</h1>

  <div id="homeStats"></div>
  <hr>
  <div id="awayStats"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
  <h2>Match History</h2>
  <button onclick="saveMatch()">Save Match</button>
  <div id="historyList"></div>
</div>

<script>

/* TABS */
function showTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

/* EDIT */
function editTeamName(el){
  let name = prompt("Team name:", el.innerText);
  if(name) el.innerText = name;
}

function editPlayer(el){
  let name = prompt("Player:", el.innerText);
  if(name) el.innerText = name;
}

/* CONFIG */
const statConfig = {
  home: [
    { key:"goals",label:"Goals",highlight:true },
    { key:"points",label:"Points",highlight:true },
    { key:"wides",label:"Wides" },
    { key:"fouls",label:"Fouls" },
    { key:"passes",label:"Passes" },
    { key:"turnovers",label:"Turnovers" }
  ],
  away: [
    { key:"goals",label:"Goals",highlight:true },
    { key:"points",label:"Points",highlight:true }
  ]
};

let stats = { home:{}, away:{} };

/* INIT */
function initStats(){
  statConfig.home.forEach(s=>stats.home[s.key]=0);
  statConfig.away.forEach(s=>stats.away[s.key]=0);
}

/* RENDER */
function renderStats(){
  renderTeam("home","Colmcille","homeStats");
  renderTeam("away","Team B","awayStats");
}

function renderTeam(team,title,id){
  const el = document.getElementById(id);
  el.innerHTML = `
    <div class="stats-container">
      <div class="team-title">${title}</div>
      ${statConfig[team].map(s=>`
        <div class="stat-row ${s.highlight?'highlight':''}">
          <div>${s.label}</div>
          <div class="stat-controls">
            <button class="btn-minus" onclick="updateStat('${team}','${s.key}',-1)">−</button>
            <span id="${team}_${s.key}">${stats[team][s.key]}</span>
            <button class="btn-plus" onclick="updateStat('${team}','${s.key}',1)">+</button>
          </div>
        </div>
      `).join("")}
    </div>`;
}

/* UPDATE */
function updateStat(team,key,val){
  stats[team][key]=Math.max(0,stats[team][key]+val);
  document.getElementById(`${team}_${key}`).innerText=stats[team][key];
  updateScore();
  saveData();
}

/* SCORE */
function updateScore(){
  let h=stats.home.goals*3+stats.home.points;
  let a=stats.away.goals*3+stats.away.points;
  scoreboard.innerText=
    stats.home.goals+"-"+String(stats.home.points).padStart(2,"0")+
    " ("+h+") | "+
    stats.away.goals+"-"+String(stats.away.points).padStart(2,"0")+
    " ("+a+")";
}

/* SAVE CURRENT */
function saveData(){
  localStorage.setItem("gaaStats",JSON.stringify(stats));
}

function loadData(){
  let d=localStorage.getItem("gaaStats");
  if(d) stats=JSON.parse(d);
}

/* SHARE */
function sharePage(){
  navigator.clipboard.writeText(scoreboard.innerText);
  alert("Copied!");
}

/* HISTORY */
function getHistory(){
  return JSON.parse(localStorage.getItem("gaaHistory")||"[]");
}

function saveHistory(h){
  localStorage.setItem("gaaHistory",JSON.stringify(h));
}

function saveMatch(){
  let h=getHistory();
  h.unshift({
    date:new Date().toLocaleString(),
    stats:JSON.parse(JSON.stringify(stats)),
    score:scoreboard.innerText
  });
  saveHistory(h);
  renderHistory();
}

function renderHistory(){
  let h=getHistory();
  let el=document.getElementById("historyList");

  if(!h.length){
    el.innerHTML="<p>No matches saved</p>";
    return;
  }

  el.innerHTML=h.map((m,i)=>`
    <div class="history-item">
      <div class="history-title">${m.score}</div>
      <div>${m.date}</div>
      <div class="history-buttons">
        <button onclick="loadMatch(${i})">Load</button>
        <button onclick="deleteMatch(${i})">Delete</button>
      </div>
    </div>
  `).join("");
}

function loadMatch(i){
  let h=getHistory();
  stats=h[i].stats;
  renderStats();
  updateScore();
  saveData();
}

function deleteMatch(i){
  let h=getHistory();
  if(!confirm("Delete match?")) return;
  h.splice(i,1);
  saveHistory(h);
  renderHistory();
}

/* INIT */
initStats();
loadData();
renderStats();
updateScore();
renderHistory();

</script>

</body>
</html>
