<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GAA Match Tracker</title>

<style>

body {
  font-family: Arial;
  margin: 0;
  background: white;
  text-align: center;
}

/* TABS */
.tabs {
  display: flex;
  width: 100%;
  background: #333;
}

.tab {
  flex: 1;
  padding: 16px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.tab.active { background: #555; }

/* SECTIONS */
.section {
  display: none;
  padding: 10px;
}

.section.active { display: block; }

/* PITCH */
.pitch {
  position: relative;
  width: 95vw;
  height: 70vh;
  margin: 10px auto;
  border: 3px solid #333;
}

.green { background: green; }
.blue { background: #1e90ff; }

/* PLAYERS */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  line-height: 55px;
  font-size: 16px;
  font-weight: bold;
}

/* STATS */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px auto;
  padding: 12px 16px;
  width: 92%;
  max-width: 420px;
  background: #f4f4f4;
  border-radius: 14px;
}

.stat-controls {
  display: flex;
  gap: 12px;
}

.stat-controls button {
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 10px;
  font-size: 20px;
}

.btn-minus { background: #ff4d4d; color: white; }
.btn-plus { background: #28a745; color: white; }

/* CLOCK */
.clock {
  font-size: 28px;
  margin: 10px 0;
  font-weight: bold;
}

.clock-controls button {
  margin: 5px;
}

/* HISTORY */
.history-item {
  background: #f4f4f4;
  margin: 10px auto;
  padding: 12px;
  width: 90%;
  max-width: 420px;
  border-radius: 12px;
}

</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Colmcille</div>
  <div class="tab" onclick="showTab('away',this)">Team B</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2 onclick="editTeamName(this)">Colmcille</h2>

<div class="pitch green">
  <!-- FULL 15 -->
  <div class="player" style="top:92%; left:50%" onclick="editPlayer(this)">1</div>
  <div class="player" style="top:78%; left:25%" onclick="editPlayer(this)">2</div>
  <div class="player" style="top:78%; left:50%" onclick="editPlayer(this)">3</div>
  <div class="player" style="top:78%; left:75%" onclick="editPlayer(this)">4</div>
  <div class="player" style="top:62%; left:25%" onclick="editPlayer(this)">5</div>
  <div class="player" style="top:62%; left:50%" onclick="editPlayer(this)">6</div>
  <div class="player" style="top:62%; left:75%" onclick="editPlayer(this)">7</div>
  <div class="player" style="top:46%; left:40%" onclick="editPlayer(this)">8</div>
  <div class="player" style="top:46%; left:60%" onclick="editPlayer(this)">9</div>
  <div class="player" style="top:30%; left:25%" onclick="editPlayer(this)">10</div>
  <div class="player" style="top:30%; left:50%" onclick="editPlayer(this)">11</div>
  <div class="player" style="top:30%; left:75%" onclick="editPlayer(this)">12</div>
  <div class="player" style="top:14%; left:25%" onclick="editPlayer(this)">13</div>
  <div class="player" style="top:14%; left:50%" onclick="editPlayer(this)">14</div>
  <div class="player" style="top:14%; left:75%" onclick="editPlayer(this)">15</div>
</div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2 onclick="editTeamName(this)">Team B</h2>

<div class="pitch blue">
  <!-- SAME 15 -->
  <div class="player" style="top:92%; left:50%" onclick="editPlayer(this)">1</div>
  <div class="player" style="top:78%; left:25%" onclick="editPlayer(this)">2</div>
  <div class="player" style="top:78%; left:50%" onclick="editPlayer(this)">3</div>
  <div class="player" style="top:78%; left:75%" onclick="editPlayer(this)">4</div>
  <div class="player" style="top:62%; left:25%" onclick="editPlayer(this)">5</div>
  <div class="player" style="top:62%; left:50%" onclick="editPlayer(this)">6</div>
  <div class="player" style="top:62%; left:75%" onclick="editPlayer(this)">7</div>
  <div class="player" style="top:46%; left:40%" onclick="editPlayer(this)">8</div>
  <div class="player" style="top:46%; left:60%" onclick="editPlayer(this)">9</div>
  <div class="player" style="top:30%; left:25%" onclick="editPlayer(this)">10</div>
  <div class="player" style="top:30%; left:50%" onclick="editPlayer(this)">11</div>
  <div class="player" style="top:30%; left:75%" onclick="editPlayer(this)">12</div>
  <div class="player" style="top:14%; left:25%" onclick="editPlayer(this)">13</div>
  <div class="player" style="top:14%; left:50%" onclick="editPlayer(this)">14</div>
  <div class="player" style="top:14%; left:75%" onclick="editPlayer(this)">15</div>
</div>
</div>

<!-- STATS -->
<div id="stats" class="section">
<h2>Match Stats</h2>

<h1 id="scoreboard">0-00 | 0-00</h1>

<!-- CLOCK -->
<div class="clock" id="matchClock">00:00</div>
<div class="clock-controls">
  <button onclick="startClock()">Start</button>
  <button onclick="pauseClock()">Pause</button>
  <button onclick="resetClock()">Reset</button>
</div>

<div id="homeStats"></div>
<hr>
<div id="awayStats"></div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>Match History</h2>
<button onclick="saveMatch()">Save Match</button>
<div id="historyList"></div>
</div>

<script>

/* TABS */
function showTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

/* EDIT */
function editTeamName(el){
  let name = prompt("Team name:", el.innerText);
  if(name) el.innerText = name;
}

function editPlayer(el){
  let name = prompt("Player:", el.innerText);
  if(name) el.innerText = name;
}

/* STATS */
const statConfig = {
  home:[
    {key:"goals",label:"Goals"},
    {key:"points",label:"Points"}
  ],
  away:[
    {key:"goals",label:"Goals"},
    {key:"points",label:"Points"}
  ]
};

let stats={home:{goals:0,points:0},away:{goals:0,points:0}};

function renderStats(){
  renderTeam("home","homeStats");
  renderTeam("away","awayStats");
}

function renderTeam(team,id){
  document.getElementById(id).innerHTML=
    statConfig[team].map(s=>`
      <div class="stat-row">
        <div>${s.label}</div>
        <div class="stat-controls">
          <button class="btn-minus" onclick="updateStat('${team}','${s.key}',-1)">−</button>
          <span id="${team}_${s.key}">${stats[team][s.key]}</span>
          <button class="btn-plus" onclick="updateStat('${team}','${s.key}',1)">+</button>
        </div>
      </div>
    `).join("");
}

function updateStat(team,key,val){
  stats[team][key]=Math.max(0,stats[team][key]+val);
  document.getElementById(`${team}_${key}`).innerText=stats[team][key];
  updateScore();
}

/* SCORE */
function updateScore(){
  let h=stats.home.goals*3+stats.home.points;
  let a=stats.away.goals*3+stats.away.points;
  scoreboard.innerText=`${stats.home.goals}-${stats.home.points} (${h}) | ${stats.away.goals}-${stats.away.points} (${a})`;
}

/* CLOCK */
let seconds=0;
let timer=null;

function startClock(){
  if(timer) return;
  timer=setInterval(()=>{
    seconds++;
    updateClock();
  },1000);
}

function pauseClock(){
  clearInterval(timer);
  timer=null;
}

function resetClock(){
  pauseClock();
  seconds=0;
  updateClock();
}

function updateClock(){
  let m=String(Math.floor(seconds/60)).padStart(2,"0");
  let s=String(seconds%60).padStart(2,"0");
  matchClock.innerText=`${m}:${s}`;
}

/* HISTORY */
function getHistory(){
  return JSON.parse(localStorage.getItem("gaaHistory")||"[]");
}

function saveHistory(h){
  localStorage.setItem("gaaHistory",JSON.stringify(h));
}

function saveMatch(){
  let h=getHistory();
  h.unshift({
    score:scoreboard.innerText,
    date:new Date().toLocaleString()
  });
  saveHistory(h);
  renderHistory();
}

function renderHistory(){
  let h=getHistory();
  historyList.innerHTML=h.map((m,i)=>`
    <div class="history-item">
      <div>${m.score}</div>
      <div>${m.date}</div>
      <button onclick="deleteMatch(${i})">Delete</button>
    </div>
  `).join("");
}

function deleteMatch(i){
  let h=getHistory();
  h.splice(i,1);
  saveHistory(h);
  renderHistory();
}

/* INIT */
renderStats();
updateScore();
updateClock();
renderHistory();

</script>

</body>
</html>
