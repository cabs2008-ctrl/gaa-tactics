<script>

function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

let homeGoals=0, homePoints=0, awayGoals=0, awayPoints=0;

function updateHome(type,val){
  if(type==="goals"){homeGoals=Math.max(0,homeGoals+val);home_goals.innerText=homeGoals;}
  if(type==="points"){homePoints=Math.max(0,homePoints+val);home_points.innerText=homePoints;}
  updateScore();
}

function updateAway(type,val){

  if(type==="points"){awayPoints=Math.max(0,awayPoints+val);away_points.innerText=awayPoints;}
  updateScore();
}

function updateScore(){
  scoreboard.innerText =
    homeGoals+"-"+String(homePoints).padStart(2,"0") +
    " | " +
    awayGoals+"-"+String(awayPoints).padStart(2,"0");
}
