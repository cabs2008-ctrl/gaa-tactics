<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin:0;
  text-align:center;
  background:white !important;
}

/* TABS */
.tabs {
  display:flex;
  background:#333;
}
.tab {
  flex:1;
  padding:15px;
  color:white;
  cursor:pointer;
}
.active {
  background:#555;
}

/* SECTIONS */
.section {
  display:none;
  padding:20px;
  background:white !important;
}
.section.active {
  display:block;
}

/* STATS LAYOUT */
.stat-line {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin:8px 0;
}

.label {
  width:90px;
  text-align:right;
}

.value {
  width:25px;
  text-align:center;
  font-weight:bold;
}

button {
  width:35px;
  height:35px;
}

/* PITCH */
.pitch {
  height:450px;
  position:relative;
  margin:10px;
}

#pitchHome {
  background:green;
}

#pitchAway {
  background:blue;
}

.player {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#ffffff55;
  color:white;
  line-height:35px;
  position:absolute;
}
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('colmcille')">Colmcille</div>
  <div class="tab" onclick="showTab('teamB')">Team B</div>
  <div class="tab" onclick="showTab('stats')">Stats</div>
</div>

<!-- COLMCILLE -->
<div id="colmcille" class="section active">
<h2>Colmcille</h2>
<div id="pitchHome" class="pitch"></div>
</div>

<!-- TEAM B -->
<div id="teamB" class="section">
<h2>Team B</h2>
<div id="pitchAway" class="pitch"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">

<h2>Match Stats</h2>
<h3>Colmcille vs Team B</h3>
<h1 id="scoreboard">0-00 | 0-00</h1>

<hr>

<h3>Colmcille</h3>

<div class="stat-line">
  <span class="label">Goals</span>
  <button onclick="updateScore('home','goals',-1)">-</button>
  <span id="home_goals" class="value">0</span>
  <button onclick="updateScore('home','goals',1)">+</button>
</div>

<div class="stat-line">
  <span class="label">Points</span>
  <button onclick="updateScore('home','points',-1)">-</button>
  <span id="home_points" class="value">0</span>
  <button onclick="updateScore('home','points',1)">+</button>
</div>

<div class="stat-line">
  <span class="label">Wides</span>
  <button onclick="updateStat('home_wides',-1)">-</button>
  <span id="home_wides" class="value">0</span>
  <button onclick="updateStat('home_wides',1)">+</button>
</div>

<div class="stat-line">
  <span class="label">Fouls</span>
  <button onclick="updateStat('home_fouls',-1)">-</button>
  <span id="home_fouls" class="value">0</span>
  <button onclick="updateStat('home_fouls',1)">+</button>
</div>

<div class="stat-line">
  <span class="label">Passes</span>
  <button onclick="updateStat('home_passes',-1)">-</button>
  <span id="home_passes" class="value">0</span>
  <button onclick="updateStat('home_passes',1)">+</button>
</div>

<div class="stat-line">
  <span class="label">Turnovers</span>
  <button onclick="updateStat('home_turnovers',-1)">-</button>
  <span id="home_turnovers" class="value">0</span>
  <button onclick="updateStat('home_turnovers',1)">+</button>
</div>

<hr>

<h3>Team B (Score Only)</h3>

<div class="stat-line">
  <span class="label">Goals</span>
  <button onclick="updateScore('away','goals',-1)">-</button>
  <span id="away_goals" class="value">0</span>
  <button onclick="updateScore('away','goals',1)">+</button>
</div>

<div class="stat-line">
  <span class="label">Points</span>
  <button onclick="updateScore('away','points',-1)">-</button>
  <span id="away_points" class="value">0</span>
  <button onclick="updateScore('away','points',1)">+</button>
</div>

</div>

<script>

/* TABS */
function showTab(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

 document.getElementById(id).classList.add('active');
 event.target.classList.add('active');
}

/* DATA */
let home = { goals: 0, points: 0 };
let away = { goals: 0, points: 0 };

/* FIXED SCORE SYSTEM (FULLY ISOLATED) */
function updateScore(team, type, change) {

  if (team === "home") {
    home[type] = Math.max(0, home[type] + change);
    document.getElementById("home_" + type).innerText = home[type];
  }

  if (team === "away") {
    away[type] = Math.max(0, away[type] + change);
    document.getElementById("away_" + type).innerText = away[type];
  }

  const homeScore = home.goals + "-" + String(home.points).padStart(2, "0");
  const awayScore = away.goals + "-" + String(away.points).padStart(2, "0");

  document.getElementById("scoreboard").innerText =
    homeScore + " | " + awayScore;
}

/* STATS */
function updateStat(id, change){
 let el = document.getElementById(id);
 let val = parseInt(el.innerText) || 0;

 val = Math.max(0, val + change);
 el.innerText = val;
}

  [50,90],

  [20,60],[50,60],[80,60],
  [35,45],[65,45],
  [20,30],[50,30],[80,30],
  [20,15],[50,15
