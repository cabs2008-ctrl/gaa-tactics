<script>

/* FIXED PLAYER EDIT (ONLY CHANGE) */

function renderPitch(team){
 document.getElementById(team+"Pitch").innerHTML =
 positions.map((p,i)=>`
   <div class="player"
     style="top:${p[0]}%;left:${p[1]}%"
     onclick="editPlayer('${team}',${i})">
     ${i+1}<br>${data[team].players[i] || ""}
   </div>
 `).join("");
}

function editPlayer(team,i){
 let current = data[team].players[i] || "";
 let n = prompt("Player Name:", current);

 // IMPORTANT: allow empty string but not cancel
 if(n !== null){
   data[team].players[i] = n;
   renderPitch(team);
 }
}

</script>
