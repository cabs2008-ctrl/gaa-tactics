<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch {
  position: relative;
  width: 95vw;
  height: 70vh;
  margin: 10px auto;
  border: 3px solid #333;
}
.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.player.selected {
  border: 3px solid yellow;
}

.subs {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin: 12px auto;
  width: 95%;
  max-width: 420px;
}

.sub {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 11px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.top-btn { margin:5px;padding:8px 14px;border:none;border-radius:8px;background:#333;color:white;}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button class="top-btn" onclick="toggleSwapMode()">Swap Mode</button>
<div class="pitch green" id="homePitch"></div>
<h4>Subs</h4>
<div class="subs" id="homeSubs"></div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button class="top-btn" onclick="toggleSwapMode()">Swap Mode</button>
<div class="pitch blue" id="awayPitch"></div>
<h4>Subs</h4>
<div class="subs" id="awaySubs"></div>
</div>

<script>

/* DATA */
let data = JSON.parse(localStorage.getItem("gaaData")||"{}");

if(!data.home) data.home={name:"Home",players:Array.from({length:15},()=>""),subs:Array.from({length:5},()=> "")};
if(!data.away) data.away={name:"Away",players:Array.from({length:15},()=>""),subs:Array.from({length:5},()=> "")};

function saveData(){ localStorage.setItem("gaaData",JSON.stringify(data)); }

/* TEAM NAME */
function editTeamName(team, el){
  let name = prompt("Team Name:", data[team].name);
  if(name){ data[team].name=name; el.innerText=name; saveData(); }
}

/* POSITIONS */
const positions = [
[92,50],[78,25],[78,50],[78,75],
[62,25],[62,50],[62,75],
[46,40],[46,60],
[30,25],[30,50],[30,75],
[14,25],[14,50],[14,75]
];

/* SWAP MODE */
let swapMode = false;
let selectedPlayer = null;

function toggleSwapMode(){
  swapMode = !swapMode;
  selectedPlayer = null;
}

/* PLAYERS */
function renderPitch(team){
  document.getElementById(team+"Pitch").innerHTML =
    positions.map((p,i)=>`
      <div class="player ${selectedPlayer && selectedPlayer.team===team && selectedPlayer.index===i ? 'selected' : ''}"
      style="top:${p[0]}%;left:${p[1]}%"
      onclick="${swapMode ? `selectPlayer('${team}',${i})` : `editPlayer('${team}',${i})`}">
        ${i+1}<br>${data[team].players[i]||""}
      </div>`).join("");
}

function editPlayer(team,i){
  let n=prompt("Player Name:",data[team].players[i]);
  if(n!==null){ data[team].players[i]=n; saveData(); renderPitch(team); }
}

function selectPlayer(team,i){
  selectedPlayer={team,index:i};
  renderPitch(team);
}

/* SUBS */
function renderSubs(team){
  document.getElementById(team+"Subs").innerHTML =
    data[team].subs.map((s,i)=>`
      <div class="sub"
      onclick="${swapMode ? `swapWithSub('${team}',${i})` : `editSub('${team}',${i})`}">
        ${i+16}<br>${s||""}
      </div>`).join("");
}

function editSub(team,i){
  let n=prompt("Sub Name:",data[team].subs[i]);
  if(n!==null){ data[team].subs[i]=n; saveData(); renderSubs(team); }
}

function swapWithSub(team,i){
  if(!selectedPlayer || selectedPlayer.team!==team) return;

  let temp=data[team].players[selectedPlayer.index];
  data[team].players[selectedPlayer.index]=data[team].subs[i];
  data[team].subs[i]=temp;

  selectedPlayer=null;
  saveData();
  renderPitch(team);
  renderSubs(team);
}

/* TABS */
function showTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

/* INIT */
document.querySelector("#home h2").innerText=data.home.name;
document.querySelector("#away h2").innerText=data.away.name;

renderPitch("home");
renderPitch("away");
renderSubs("home");
renderSubs("away");

</script>

</body>
</html>
