<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px; height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
  display:flex; flex-direction:column; justify-content:center;
  cursor:pointer;
}

.subs { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:12px auto; }

.sub {
  width:55px;height:55px;border-radius:50%;
  background:rgba(255,255,255,0.7);
  font-size:11px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  cursor:pointer;
}

.history-item { background:#f4f4f4;margin:10px auto;padding:12px;width:90%;max-width:420px;border-radius:12px;}
.top-btn { margin:5px;padding:8px 14px;border:none;border-radius:8px;background:#333;color:white;}

.stat-row {
  display:flex; justify-content:space-between; align-items:center;
  margin:10px auto; padding:12px;
  width:92%; max-width:420px;
  background:#f4f4f4; border-radius:14px;
}

.btn-minus,.btn-plus {
  width:35px;height:35px;border:none;border-radius:10px;font-size:18px;
}
.btn-minus{background:#ff4d4d;color:white;}
.btn-plus{background:#28a745;color:white;}

.clock { font-size:26px;font-weight:bold; }

.scoreboard { display:flex; flex-direction:column; gap:8px; margin:10px auto; max-width:420px; }
.score-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px; border-radius:10px; font-weight:bold; color:white;
}
.score-row.win { background:#28a745; }
.score-row.lose { background:#dc3545; }
.score-row.draw { background:#555; }
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button class="top-btn" onclick="resetTeam('home')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('home')">Save Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>
<div class="pitch green" id="homePitch"></div>
<h4>Subs</h4>
<div class="subs" id="homeSubs"></div>
</div>

<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button class="top-btn" onclick="resetTeam('away')">Reset Team</button>
<button class="top-btn" onclick="saveTeam('away')">Save Team</button>
<button class="top-btn" onclick="shareMatch()">Share</button>
<div class="pitch blue" id="awayPitch"></div>
<h4>Subs</h4>
<div class="subs" id="awaySubs"></div>
</div>

<div id="stats" class="section">
<h2>Match Stats</h2>
<button class="top-btn" onclick="shareMatch()">Share</button>

<div id="scoreboard"></div>

<div class="clock" id="matchClock">00:00</div>
<button onclick="startClock()">Start</button>
<button onclick="pauseClock()">Pause</button>
<button onclick="resetClock()">Reset</button>

<h3>Home</h3>
<div id="homeStats"></div>

<hr>

<h3>Away</h3>
<div id="awayStats"></div>
</div>

<div id="history" class="section">
<h2>Saved Teams</h2>
<div id="teamList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* DOM refs */
const homeStats = document.getElementById("homeStats");
const awayStats = document.getElementById("awayStats");
const scoreboard = document.getElementById("scoreboard");
const matchClock = document.getElementById("matchClock");
const teamList = document.getElementById("teamList");

/* UI */
function showTab(id,el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
}

/* TEAM */
const positions=[[92,50],[78,25],[78,50],[78,75],[62,25],[62,50],[62,75],[46,40],[46,60],[30,25],[30,50],[30,75],[14,25],[14,50],[14,75]];

let data={
home:{name:"Home",players:Array(15).fill(""),subs:Array(5).fill("")},
away:{name:"Away",players:Array(15).fill(""),subs:Array(5).fill("")}
};

function editTeamName(team,el){
let n=prompt("Team Name:",data[team].name);
if(n){data[team].name=n;el.innerText=n;updateScore();}
}

function renderPitch(team){
document.getElementById(team+"Pitch").innerHTML=
positions.map((p,i)=>`
<div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="editPlayer('${team}',${i})">
${i+1}<br>${data[team].players[i]||""}
</div>`).join("");
}

function editPlayer(team,i){
let n=prompt("Player Name:",data[team].players[i]);
if(n!==null){data[team].players[i]=n;renderPitch(team);}
}

function renderSubs(team){
document.getElementById(team+"Subs").innerHTML=
data[team].subs.map((s,i)=>`
<div class="sub" onclick="editSub('${team}',${i})">
${i+16}<br>${s||""}
</div>`).join("");
}

function editSub(team,i){
let n=prompt("Sub Name:",data[team].subs[i]);
if(n!==null){data[team].subs[i]=n;renderSubs(team);}
}

function resetTeam(team){
if(!confirm("Reset team?")) return;
data[team].players=Array(15).fill("");
data[team].subs=Array(5).fill("");
renderPitch(team);
renderSubs(team);
}

/* 🔥 SHARE IMAGE (ONLY CHANGE) */
function shareMatch(){

let h = stats.home.goals*3 + stats.home.points;
let a = stats.away.goals*3 + stats.away.points;

let pitch = document.querySelector(".section.active .pitch").cloneNode(true);

let container = document.createElement("div");
container.style.width = "600px";
container.style.background = "white";
container.style.padding = "10px";
container.style.fontFamily = "Arial";

/* score */
let score = document.createElement("div");
score.style.textAlign = "center";
score.style.fontWeight = "bold";
score.style.marginBottom = "10px";
score.innerHTML = `
<div>${data.home.name} ${stats.home.goals}-${stats.home.points} (${h})</div>
<div>${data.away.name} ${stats.away.goals}-${stats.away.points} (${a})</div>
`;

/* stats */
let statsBox = document.createElement("div");
statsBox.style.display = "grid";
statsBox.style.gridTemplateColumns = "1fr 1fr";
statsBox.style.marginTop = "10px";

statsBox.innerHTML = `
<div>Wides: ${stats.home.wides} - ${stats.away.wides}</div>
<div>Passes: ${stats.home.passes} - ${stats.away.passes}</div>
<div>Tackles: ${stats.home.tackles} - ${stats.away.tackles}</div>
<div>Turnovers: ${stats.home.turnovers} - ${stats.away.turnovers}</div>
`;

pitch.style.width = "100%";
pitch.style.height = "350px";

container.appendChild(score);
container.appendChild(pitch);
container.appendChild(statsBox);

let wrapper = document.createElement("div");
wrapper.style.position = "fixed";
wrapper.style.left = "-9999px";
wrapper.appendChild(container);
document.body.appendChild(wrapper);

html2canvas(container).then(canvas=>{
canvas.toBlob(blob=>{
let file = new File([blob], "match.png", {type:"image/png"});

if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
navigator.share({files:[file]});
}else{
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="match.png";
link.click();
}

document.body.removeChild(wrapper);
});
});

}

/* STATS */
let stats={
home:{goals:0,points:0,wides:0,passes:0,tackles:0,turnovers:0},
away:{goals:0,points:0,wides:0,passes:0,tackles:0,turnovers:0}
};

function renderStats(){
homeStats.innerHTML=
row('home','goals','Goals')+
row('home','points','Points')+
row('home','wides','Wides')+
row('home','passes','Passes')+
row('home','tackles','Tackles')+
row('home','turnovers','Turnovers');

awayStats.innerHTML=
row('away','goals','Goals')+
row('away','points','Points')+
row('away','wides','Wides')+
row('away','passes','Passes')+
row('away','tackles','Tackles')+
row('away','turnovers','Turnovers');
}

function row(team,key,label){
return `<div class="stat-row">
<div>${label}</div>
<div>
<button class="btn-minus" onclick="updateStat('${team}','${key}',-1)">-</button>
<span id="${team}_${key}">${stats[team][key]}</span>
<button class="btn-plus" onclick="updateStat('${team}','${key}',1)">+</button>
</div></div>`;
}

function updateStat(team,key,val){
stats[team][key]=Math.max(0,stats[team][key]+val);
document.getElementById(`${team}_${key}`).innerText=stats[team][key];
updateScore();
}

function updateScore(){
let h=stats.home.goals*3+stats.home.points;
let a=stats.away.goals*3+stats.away.points;

scoreboard.innerHTML=`
<div class="scoreboard">
<div class="score-row">
<div>${data.home.name}</div>
<div>${stats.home.goals}-${stats.home.points} (${h})</div>
</div>
<div class="score-row">
<div>${data.away.name}</div>
<div>${stats.away.goals}-${stats.away.points} (${a})</div>
</div>
</div>`;
}

/* CLOCK */
let sec=0,timer=null;
function startClock(){if(!timer)timer=setInterval(()=>{sec++;updateClock();},1000);}
function pauseClock(){clearInterval(timer);timer=null;}
function resetClock(){pauseClock();sec=0;updateClock();}
function updateClock(){matchClock.innerText=String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0");}

/* INIT */
window.onload=function(){
renderPitch("home");
renderPitch("away");
renderSubs("home");
renderSubs("away");
renderStats();
updateScore();
updateClock();
};

</script>

</body>
</html>
