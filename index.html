<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:3px;
  padding:10px;
  color:white;
  background:#555;
  border:none;
}

.tab { display:none; }
.active { display:block; }

/* PITCH */
.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

/* PLAYERS */
.player {
  width:48px;
  height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

button { margin:4px; padding:10px; }

input {
  padding:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('score')">Score</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3>
<input id="teamAInput" value="Colmcille" oninput="updateTeamAName()">
</h3>

<div class="pitch" id="pitchA">
<div class="line"></div>
</div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3>
<input id="teamBInput" placeholder="Enter Team B name" oninput="updateTeamBName()">
</h3>

<div class="pitch" id="pitchB">
<div class="line"></div>
</div>
</div>

<!-- SCORE -->
<div id="score" class="tab">

<h2>Match Stats</h2>

<h3>
<span id="teamALabel">Colmcille</span> vs 
<span id="teamBLabel">Team B</span>
</h3>

<h1 id="scoreDisplay">
0-00 | 0-00
</h1>

<hr>

<!-- TEAM A -->
<h3 id="teamALabel2">Colmcille</h3>

Goals  
<button onclick="goalA(-1)">➖</button>
<span id="gA">0</span>
<button onclick="goalA(1)">➕</button>

Points  
<button onclick="pointA(-1)">➖</button>
<span id="pA">0</span>
<button onclick="pointA(1)">➕</button>

Wides  
<button onclick="wideA(-1)">➖</button>
<span id="wA">0</span>
<button onclick="wideA(1)">➕</button>

Turnovers  
<button onclick="turnoverA(-1)">➖</button>
<span id="tA">0</span>
<button onclick="turnoverA(1)">➕</button>

Fouls  
<button onclick="foulA(-1)">➖</button>
<span id="fA">0</span>
<button onclick="foulA(1)">➕</button>

<hr>

<!-- TEAM B -->
<h3 id="teamBLabel2">Team B</h3>

Goals  
<button onclick="goalB(-1)">➖</button>
<span id="gB">0</span>
<button onclick="goalB(1)">➕</button>

Points  
<button onclick="pointB(-1)">➖</button>
<span id="pB">0</span>
<button onclick="pointB(1)">➕</button>

Wides  
<button onclick="wideB(-1)">➖</button>
<span id="wB">0</span>
<button onclick="wideB(1)">➕</button>

Turnovers  
<button onclick="turnoverB(-1)">➖</button>
<span id="tB">0</span>
<button onclick="turnoverB(1)">➕</button>

Fouls  
<button onclick="foulB(-1)">➖</button>
<span id="fB">0</span>
<button onclick="foulB(1)">➕</button>

</div>

<script>

/* TABS */
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* TEAM NAMES */
function updateTeamAName(){
 let name = document.getElementById("teamAInput").value || "Colmcille";
 document.getElementById("teamALabel").innerText = name;
 document.getElementById("teamALabel2").innerText = name;
}

function updateTeamBName(){
 let name = document.getElementById("teamBInput").value || "Team B";
 document.getElementById("teamBLabel").innerText = name;
 document.getElementById("teamBLabel2").innerText = name;
}

/* SCORE */
let gA=0,pA=0,wA=0,tA=0,fA=0;
let gB=0,pB=0,wB=0,tB=0,fB=0;

function updateScore(){

 document.getElementById("scoreDisplay").innerText =
  gA+"-"+(pA<10?"0":"")+pA + " | " +
  gB+"-"+(pB<10?"0":"")+pB;

 document.getElementById("gA").innerText=gA;
 document.getElementById("pA").innerText=pA;
 document.getElementById("wA").innerText=wA;
 document.getElementById("tA").innerText=tA;
 document.getElementById("fA").innerText=fA;

 document.getElementById("gB").innerText=gB;
 document.getElementById("pB").innerText=pB;
 document.getElementById("wB").innerText=wB;
 document.getElementById("tB").innerText=tB;
 document.getElementById("fB").innerText=fB;
}

/* TEAM A */
function goalA(v){ gA=Math.max(0,gA+v); updateScore(); }
function pointA(v){ pA=Math.max(0,pA+v); updateScore(); }
function wideA(v){ wA=Math.max(0,wA+v); updateScore(); }
function turnoverA(v){ tA=Math.max(0,tA+v); updateScore(); }
function foulA(v){ fA=Math.max(0,fA+v); updateScore(); }

/* TEAM B */
function goalB(v){ gB=Math.max(0,gB+v); updateScore(); }
function pointB(v){ pB=Math.max(0,pB+v); updateScore(); }
function wideB(v){ wB=Math.max(0,wB+v); updateScore(); }
function turnoverB(v){ tB=Math.max(0,tB+v); updateScore(); }
function foulB(v){ fB=Math.max(0,fB+v); updateScore(); }

/* PLAYERS */
function createPlayer(n,x,y,team){
 let pitch = team==="A" ? pitchA : pitchB;

 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  let x=e.touches[0].clientX-rect.left-offsetX;
  let y=e.touches[0].clientY-rect.top-offsetY;
  p.style.left=x+"px";
  p.style.top=y+"px";
 });

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
}

/* FORMATION */
function loadFormation(){
 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],"A"));
 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],"B"));
}

window.onload = loadFormation;

</script>

</body>
</html>
