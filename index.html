<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Stats</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
}

.tabs {
  display: flex;
  background: #333;
}

.tab {
  flex: 1;
  padding: 15px;
  color: white;
  cursor: pointer;
}

.active {
  background: #555;
}

.section {
  display: none;
  padding: 20px;
}

.section.active {
  display: block;
}

button {
  width: 40px;
  height: 40px;
  margin: 5px;
}

.value {
  display: inline-block;
  width: 30px;
}

hr {
  margin: 20px 0;
}
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('stats')">Stats</div>
  <div class="tab" onclick="showTab('pitch')">Pitch</div>
</div>

<!-- STATS TAB -->
<div id="stats" class="section active">

<h1>Match Stats</h1>
<h3>Colmcille vs Team B</h3>

<h1 id="scoreboard">0-00 | 0-00</h1>

<hr>

<!-- COLMCILLE -->
<h2>Colmcille (Full Stats)</h2>

<div>
Goals
<button onclick="updateScore('home','goals',-1)">-</button>
<span id="home_goals" class="value">0</span>
<button onclick="updateScore('home','goals',1)">+</button>

Points
<button onclick="updateScore('home','points',-1)">-</button>
<span id="home_points" class="value">0</span>
<button onclick="updateScore('home','points',1)">+</button>
</div>

<div>
Wides
<button onclick="updateStat('home_wides',-1)">-</button>
<span id="home_wides" class="value">0</span>
<button onclick="updateStat('home_wides',1)">+</button>

Fouls
<button onclick="updateStat('home_fouls',-1)">-</button>
<span id="home_fouls" class="value">0</span>
<button onclick="updateStat('home_fouls',1)">+</button>
</div>

<div>
Passes
<button onclick="updateStat('home_passes',-1)">-</button>
<span id="home_passes" class="value">0</span>
<button onclick="updateStat('home_passes',1)">+</button>

Turnovers
<button onclick="updateStat('home_turnovers',-1)">-</button>
<span id="home_turnovers" class="value">0</span>
<button onclick="updateStat('home_turnovers',1)">+</button>
</div>

<hr>

<!-- TEAM B -->
<h2>Team B (Score Only)</h2>

<div>
Goals
<button onclick="updateScore('away','goals',-1)">-</button>
<span id="away_goals" class="value">0</span>
<button onclick="updateScore('away','goals',1)">+</button>

Points
<button onclick="updateScore('away','points',-1)">-</button>
<span id="away_points" class="value">0</span>
<button onclick="updateScore('away','points',1)">+</button>
</div>

</div>

<!-- PITCH TAB -->
<div id="pitch" class="section">
  <h2>Pitch View</h2>
  <p>(Your player layout goes here)</p>
</div>

<script>

// ✅ TAB SWITCHING (restored)
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// ✅ SEPARATE TEAM DATA (fixes your bug)
let home = { goals: 0, points: 0 };
let away = { goals: 0, points: 0 };

// ✅ SCORE UPDATE (NO CROSSOVER)
function updateScore(team, type, change) {

  let t = team === 'home' ? home : away;

  t[type] += change;
  if (t[type] < 0) t[type] = 0;

  document.getElementById(team + "_" + type).innerText = t[type];

  renderScore();
}

// ✅ STATS (passes, turnovers etc)
function updateStat(id, change) {
  let el = document.getElementById(id);
  let val = parseInt(el.innerText) || 0;

  val += change;
  if (val < 0) val = 0;

  el.innerText = val;
}

// ✅ SCOREBOARD DISPLAY
function renderScore() {
  const homeScore = home.goals + "-" + String(home.points).padStart(2,'0');
  const awayScore = away.goals + "-" + String(away.points).padStart(2,'0');

  document.getElementById("scoreboard").innerText =
    homeScore + " | " + awayScore;
}

</script>

</body>
</html>
