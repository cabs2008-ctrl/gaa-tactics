<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
 position: absolute;
 transform: translate(-50%, -50%);
 width: 55px; height: 55px;
 border-radius: 50%;
 background: rgba(255,255,255,0.7);
 font-size: 12px;
 display:flex; flex-direction:column; justify-content:center;
 cursor:pointer;
}

.subs { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:12px auto; }

.sub {
 width:55px;height:55px;border-radius:50%;
 background:rgba(255,255,255,0.7);
 font-size:11px;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
 cursor:pointer;
}

.history-item { background:#f4f4f4;margin:10px auto;padding:12px;width:90%;max-width:420px;border-radius:12px;}

.stat-row {
 display:flex; justify-content:space-between; align-items:center;
 margin:10px auto; padding:12px;
 width:92%; max-width:420px;
 background:#f4f4f4; border-radius:14px;
}

.btn-minus{background:#ff4d4d;color:white;}
.btn-plus{background:#28a745;color:white;}

.score-row { padding:10px; margin:10px; border-radius:10px; color:white;}
.win{background:#28a745;} .lose{background:#dc3545;} .draw{background:#555;}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="showTab('home',this)">Home</div>
<div class="tab" onclick="showTab('away',this)">Away</div>
<div class="tab" onclick="showTab('stats',this)">Stats</div>
<div class="tab" onclick="showTab('history',this)">History</div>
</div>

<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button onclick="saveTeam('home')">Save Team</button>
<button onclick="shareMatch()">Share</button>
<div class="pitch green" id="homePitch"></div>
<div id="homeSubs"></div>
</div>

<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button onclick="saveTeam('away')">Save Team</button>
<button onclick="shareMatch()">Share</button>
<div class="pitch blue" id="awayPitch"></div>
<div id="awaySubs"></div>
</div>

<div id="stats" class="section">
<div id="scoreboard"></div>
<div id="homeStats"></div>
<div id="awayStats"></div>
</div>

<div id="history" class="section">
<div id="teamList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* UI */
function showTab(id,el){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 el.classList.add('active');
}

/* DATA */
const positions=[[92,50],[78,25],[78,50],[78,75]];
let data={home:{name:"Home",players:Array(4).fill("")},away:{name:"Away",players:Array(4).fill("")}};
let stats={home:{goals:0,points:0,wides:0},away:{goals:0,points:0}};

/* RENDER */
function renderPitch(team){
 document.getElementById(team+"Pitch").innerHTML=
 positions.map((p,i)=>`
 <div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="editPlayer('${team}',${i})">
 ${i+1}<br>${data[team].players[i]||""}
 </div>`).join("");
}

function editPlayer(team,i){
 let n=prompt("Player",data[team].players[i]);
 if(n!==null){data[team].players[i]=n;renderPitch(team);}
}

/* SAVE TEAM */
function saveTeam(team){
 let saved=JSON.parse(localStorage.getItem("teams")||"[]");
 saved.push(data[team]);
 localStorage.setItem("teams",JSON.stringify(saved));
 renderHistory();
}

/* SHARE FIX */
function shareMatch(){
 // save to history
 let matches=JSON.parse(localStorage.getItem("matches")||"[]");
 matches.push({data,stats});
 localStorage.setItem("matches",JSON.stringify(matches));
 renderHistory();

 // share image
 html2canvas(document.body).then(canvas=>{
  canvas.toBlob(async blob=>{
    if(navigator.share){
      try{
        await navigator.share({
          files:[new File([blob],"match.png",{type:"image/png"})]
        });
        return;
      }catch{}
    }
    let a=document.createElement("a");
    a.href=canvas.toDataURL();
    a.download="match.png";
    a.click();
  });
 });
}

/* STATS FIX */
function renderStats(){
 homeStats.innerHTML=`
 <div class="stat-row">Goals ${stats.home.goals}</div>
 <div class="stat-row">Points ${stats.home.points}</div>
 <div class="stat-row">Wides ${stats.home.wides}</div>`;
}

/* HISTORY */
function renderHistory(){
 let matches=JSON.parse(localStorage.getItem("matches")||"[]");
 teamList.innerHTML=matches.map((m,i)=>`<div class="history-item">Match ${i+1}</div>`).join("");
}

/* INIT */
window.onload=function(){
 renderPitch("home"); renderPitch("away");
 renderStats();
 renderHistory();
};

</script>
</body>
</html>
