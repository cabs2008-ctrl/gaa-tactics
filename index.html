```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: white;
}

/* Tabs */
.tabs {
  display: flex;
  background: #333;
}
.tab {
  flex: 1;
  padding: 14px;
  color: white;
  cursor: pointer;
}
.tab.active {
  background: #555;
}

/* Sections */
.section {
  display: none;
  padding: 10px;
}
.section.active {
  display: block;
}

/* Pitch */
.pitch {
  position: relative;
  width: 100%;
  aspect-ratio: 1.5;
  background: green;
  border: 2px solid #333;
}

.pitch.blue {
  background: #1e90ff;
}

/* Players */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.5);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4px;
  cursor: pointer;
}

/* Stats */
.stat-line {
  margin: 10px 0;
}

button {
  width: 35px;
  height: 35px;
}
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('home')">Colmcille</div>
  <div class="tab" onclick="showTab('away')">Team B</div>
  <div class="tab" onclick="showTab('stats')">Stats</div>
</div>

<!-- HOME -->
<div id="home" class="section active">
<h2>Colmcille</h2>

<div class="pitch" id="homePitch"></div>
</div>

<!-- AWAY -->
<div id="away" class="section">
<h2>Team B</h2>

<div class="pitch blue" id="awayPitch"></div>
</div>

<!-- STATS -->
<div id="stats" class="section">

<h2>Match Stats</h2>
<h3>Colmcille vs Team B</h3>
<h1 id="scoreboard">0-00 | 0-00</h1>

<hr>

<h3>Colmcille</h3>

<div class="stat-line">
Goals
<button onclick="updateStat('home','goals',-1)">-</button>
<span id="home_goals">0</span>
<button onclick="updateStat('home','goals',1)">+</button>

Points
<button onclick="updateStat('home','points',-1)">-</button>
<span id="home_points">0</span>
<button onclick="updateStat('home','points',1)">+</button>
</div>

<div class="stat-line">
Wides
<button onclick="updateStat('home','wides',-1)">-</button>
<span id="home_wides">0</span>
<button onclick="updateStat('home','wides',1)">+</button>

Fouls
<button onclick="updateStat('home','fouls',-1)">-</button>
<span id="home_fouls">0</span>
<button onclick="updateStat('home','fouls',1)">+</button>
</div>

<div class="stat-line">
Passes
<button onclick="updateStat('home','passes',-1)">-</button>
<span id="home_passes">0</span>
<button onclick="updateStat('home','passes',1)">+</button>
</div>

<div class="stat-line">
Turnovers
<button onclick="updateStat('home','turnovers',-1)">-</button>
<span id="home_turnovers">0</span>
<button onclick="updateStat('home','turnovers',1)">+</button>
</div>

<hr>

<h3>Team B</h3>

<div class="stat-line">
Goals
<button onclick="updateStat('away','goals',-1)">-</button>
<span id="away_goals">0</span>
<button onclick="updateStat('away','goals',1)">+</button>

Points
<button onclick="updateStat('away','points',-1)">-</button>
<span id="away_points">0</span>
<button onclick="updateStat('away','points',1)">+</button>
</div>

</div>

<script>

/* Tabs */
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

/* Stats */
let stats={
  home:{goals:0,points:0,wides:0,fouls:0,passes:0,turnovers:0},
  away:{goals:0,points:0}
};

function updateStat(team,type,val){
  stats[team][type]=Math.max(0,(stats[team][type]||0)+val);
  document.getElementById(team+"_"+type).innerText=stats[team][type];
  updateScore();
}

function updateScore(){
  scoreboard.innerText=
    stats.home.goals+"-"+String(stats.home.points).padStart(2,"0")+
    " | "+
    stats.away.goals+"-"+String(stats.away.points).padStart(2,"0");
}

/* Create Players */
function createTeam(pitch){
  const positions=[
    [50,92],
    [25,75],[50,75],[75,75],
    [25,60],[50,60],[75,60],
    [40,48],[60,48],
    [25,35],[50,35],[75,35],
    [25,20],[50,20],[75,20]
  ];

  positions.forEach((pos,i)=>{
    let p=document.createElement("div");
    p.className="player";
    p.innerText=i+1;

    p.style.left=pos[0]+"%";
    p.style.top=pos[1]+"%";

    p.onclick=()=>{
      let name=prompt("Enter player name:",p.innerText);
      if(name) p.innerText=name;
    };

    pitch.appendChild(p);
  });
}

createTeam(document.getElementById("homePitch"));
createTeam(document.getElementById("awayPitch"));

</script>

</body>
</html>
