<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Pro</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.wrapper { position:relative; max-width:400px; margin:auto; }

.pitch {
  width:100%;
  height:600px;
  background:#4CAF50;
  position:relative;
  border:2px solid white;
}

/* Lines */
.line { position:absolute; width:100%; height:2px; background:white; }

.halfway { top:50%; }
.line45_top { top:25%; }
.line45_bottom { top:75%; }
.line65_top { top:15%; }
.line65_bottom { top:85%; }

/* Boxes */
.box {
  position:absolute;
  border:2px solid white;
}

.small_top { top:0; left:35%; width:30%; height:60px; }
.small_bottom { bottom:0; left:35%; width:30%; height:60px; }

.large_top { top:0; left:25%; width:50%; height:120px; }
.large_bottom { bottom:0; left:25%; width:50%; height:120px; }

/* 45m arcs */
.arc {
  position:absolute;
  border:2px solid white;
  border-radius:50%;
  width:200px;
  height:200px;
  left:50%;
  transform:translateX(-50%);
}

.arc_top {
  top:120px;
  clip-path: inset(0 0 50% 0);
}

.arc_bottom {
  bottom:120px;
  clip-path: inset(50% 0 0 0);
}

/* Players */
.player {
  width:48px; height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

canvas { position:absolute; top:0; left:0; }

button { padding:10px; margin:4px; }

.scoreboard {
  margin:10px;
  padding:10px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>GAA Match Pro</h2>

<div class="wrapper" id="capture">
  <div class="pitch" id="pitch">

    <!-- Lines -->
    <div class="line halfway"></div>
    <div class="line line45_top"></div>
    <div class="line line45_bottom"></div>
    <div class="line line65_top"></div>
    <div class="line line65_bottom"></div>

    <!-- Boxes -->
    <div class="box small_top"></div>
    <div class="box small_bottom"></div>
    <div class="box large_top"></div>
    <div class="box large_bottom"></div>

    <!-- Arcs -->
    <div class="arc arc_top"></div>
    <div class="arc arc_bottom"></div>

  </div>

  <canvas id="draw" width="400" height="600"></canvas>
</div>

<div>
<button onclick="formation()">Formation</button>
<button onclick="toggleTeam()">Team</button>
<button onclick="toggleDraw()">Draw</button>
<button onclick="clearDraw()">Clear Lines</button>
<button onclick="save()">Save</button>
<button onclick="load()">Load</button>
<button onclick="exportImg()">Export</button>
</div>

<div class="scoreboard">
<h3>Score</h3>

<div id="score">0-00</div>

<button onclick="goal()">+ Goal</button>
<button onclick="point()">+ Point</button>
<button onclick="wide()">+ Wide</button>

<p>Wides: <span id="wides">0</span></p>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
const pitch=document.getElementById("pitch");
const canvas=document.getElementById("draw");
const ctx=canvas.getContext("2d");

let players=[];
let team="A";
let drawing=false;

let goals=0, points=0, wides=0;

function updateScore(){
 document.getElementById("score").innerText =
  goals + "-" + (points<10?"0":"") + points;
 document.getElementById("wides").innerText = wides;
}

function goal(){ goals++; updateScore(); }
function point(){ points++; updateScore(); }
function wide(){ wides++; updateScore(); }

function createPlayer(n,x,y){
 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let ox, oy;

 p.addEventListener("touchstart",e=>{
  ox=e.touches[0].clientX-p.offsetLeft;
  oy=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let r=pitch.getBoundingClientRect();
  let x=e.touches[0].clientX-r.left-ox;
  let y=e.touches[0].clientY-r.top-oy;
  p.style.left=x+"px";
  p.style.top=y+"px";
 });

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
 players.push(p);
}

function clearPlayers(){
 players.forEach(p=>p.remove());
 players=[];
}

function formation(){
 clearPlayers();
 let pos=[
 [170,20],
 [30,100],[120,100],[210,100],[300,100],
 [30,200],[120,200],[210,200],[300,200],
 [30,300],[120,300],[210,300],[300,300],
 [100,450],[250,450]
 ];
 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1]));
}

function toggleTeam(){
 team = team==="A"?"B":"A";
 alert("Team "+team);
}

function save(){
 let data={
  players: players.map(p=>({
    text:p.innerText,x:p.style.left,y:p.style.top,
    team:p.classList.contains("A")?"A":"B"
  })),
  score:{goals,points,wides}
 };
 localStorage.setItem("gaa",JSON.stringify(data));
 alert("Saved");
}

function load(){
 let data=JSON.parse(localStorage.getItem("gaa")||"{}");
 clearPlayers();

 data.players?.forEach(p=>{
  team=p.team;
  createPlayer(p.text,parseInt(p.x),parseInt(p.y));
 });

 goals=data.score?.goals||0;
 points=data.score?.points||0;
 wides=data.score?.wides||0;

 updateScore();
}

function toggleDraw(){ drawing=!drawing; }

canvas.addEventListener("touchstart",e=>{
 if(!drawing) return;
 ctx.beginPath();
 ctx.moveTo(e.touches[0].clientX,e.touches[0].clientY);
});

canvas.addEventListener("touchmove",e=>{
 if(!drawing) return;
 ctx.lineTo(e.touches[0].clientX,e.touches[0].clientY);
 ctx.stroke();
});

function clearDraw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function exportImg(){
 html2canvas(document.getElementById("capture")).then(c=>{
  let link=document.createElement("a");
  link.download="match.png";
  link.href=c.toDataURL();
  link.click();
 });
}
</script>

</body>
</html>
