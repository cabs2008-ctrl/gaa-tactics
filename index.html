<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: white;
}

/* Tabs */
.tabs {
  display: flex;
  background: #333;
}
.tab {
  flex: 1;
  padding: 14px;
  color: white;
  cursor: pointer;
}
.tab.active {
  background: #555;
}

/* Sections */
.section {
  display: none;
  padding: 10px;
}
.section.active {
  display: block;
}

/* Pitch */
.pitch {
  position: relative;
  width: 100%;
  height: 75vh;
  max-height: 650px;
  background: green;
  border: 2px solid #333;
}

.pitch.blue {
  background: #1e90ff;
}

/* Players (SMALLER + CLEAN) */
.player {
  position: absolute;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.6);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 3px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home')">Colmcille</div>
  <div class="tab" onclick="showTab('away')">Team B</div>
  <div class="tab" onclick="showTab('stats')">Stats</div>
</div>

<div id="home" class="section active">
<h2>Colmcille</h2>
<div class="pitch" id="homePitch"></div>
</div>

<div id="away" class="section">
<h2>Team B</h2>
<div class="pitch blue" id="awayPitch"></div>
</div>

<!-- STATS (UNCHANGED) -->
<div id="stats" class="section">
<h2>Match Stats</h2>
<h3>Colmcille vs Team B</h3>
<h1 id="scoreboard">0-00 | 0-00</h1>
</div>

<script>

function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

/* CORRECT SPREAD POSITIONS (NO OVERLAP) */
function createTeam(pitch){
  const positions=[

    [50,92], // 1

    [15,78],[50,78],[85,78], // 2-4 WIDE

    [15,64],[50,64],[85,64], // 5-7

    [35,52],[65,52], // 8-9 SPREAD

    [15,40],[50,40],[85,40], // 10-12

    [15,25],[50,25],[85,25] // 13-15

  ];

  positions.forEach((pos,i)=>{
    let p=document.createElement("div");
    p.className="player";
    p.innerText=i+1;

    p.style.left=pos[0]+"%";
    p.style.top=pos[1]+"%";

    p.onclick=()=>{
      let name=prompt("Player name:",p.innerText);
      if(name) p.innerText=name;
    };

    pitch.appendChild(p);
  });
}

createTeam(document.getElementById("homePitch"));
createTeam(document.getElementById("awayPitch"));

</script>

</body>
</html>
