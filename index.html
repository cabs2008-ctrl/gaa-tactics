<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

/* NAV */
.nav { background:#333; padding:10px; }
.nav button {
  margin:5px;
  padding:10px;
  color:white;
  background:#555;
  border:none;
}

/* TABS */
.tab { display:none; }
.active { display:block; }

/* PITCH */
.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

/* PLAYERS */
.player {
  width:45px;
  height:45px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  background:#1b5e20;
  touch-action:none;
}

/* STATS */
.stat-row { margin:10px 0; }
button { padding:8px; margin:3px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('score')">Stats</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3><input id="teamAInput" value="Colmcille"></h3>
<div class="pitch" id="pitchA">
<div class="line"></div>
</div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3><input id="teamBInput" placeholder="Team B"></h3>
<div class="pitch" id="pitchB">
<div class="line"></div>
</div>
</div>

<!-- STATS -->
<div id="score" class="tab">

<h2>Match Stats</h2>

<h3>
<span id="teamAName">Colmcille</span> vs 
<span id="teamBName">Team B</span>
</h3>

<h1 id="scoreDisplay">0-00</h1>

<hr>

<h3>Colmcille</h3>

<div class="stat-row">Goals 
<button onclick="goalA(-1)">➖</button> <span id="gA">0</span> <button onclick="goalA(1)">➕</button></div>

<div class="stat-row">Points 
<button onclick="pointA(-1)">➖</button> <span id="pA">0</span> <button onclick="pointA(1)">➕</button></div>

<div class="stat-row">Wides 
<button onclick="wideA(-1)">➖</button> <span id="wA">0</span> <button onclick="wideA(1)">➕</button></div>

<div class="stat-row">Turnovers 
<button onclick="turnA(-1)">➖</button> <span id="tA">0</span> <button onclick="turnA(1)">➕</button></div>

<div class="stat-row">Fouls 
<button onclick="foulA(-1)">➖</button> <span id="fA">0</span> <button onclick="foulA(1)">➕</button></div>

<div class="stat-row">Passes Completed 
<button onclick="passA(-1)">➖</button> <span id="passA">0</span> <button onclick="passA(1)">➕</button></div>

<hr>

<h3>Team B</h3>

<div class="stat-row">Goals 
<button onclick="goalB(-1)">➖</button> <span id="gB">0</span> <button onclick="goalB(1)">➕</button></div>

<div class="stat-row">Points 
<button onclick="pointB(-1)">➖</button> <span id="pB">0</span> <button onclick="pointB(1)">➕</button></div>

<div class="stat-row">Wides 
<button onclick="wideB(-1)">➖</button> <span id="wB">0</span> <button onclick="wideB(1)">➕</button></div>

<div class="stat-row">Turnovers 
<button onclick="turnB(-1)">➖</button> <span id="tB">0</span> <button onclick="turnB(1)">➕</button></div>

<div class="stat-row">Fouls 
<button onclick="foulB(-1)">➖</button> <span id="fB">0</span> <button onclick="foulB(1)">➕</button></div>

<div class="stat-row">Passes Completed 
<button onclick="passB(-1)">➖</button> <span id="passB">0</span> <button onclick="passB(1)">➕</button></div>

</div>

<script>

/* TAB SWITCH */
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* TEAM NAMES */
teamAInput.oninput = () => teamAName.innerText = teamAInput.value;
teamBInput.oninput = () => teamBName.innerText = teamBInput.value;

/* STATS */
let gA=0,pA=0,wA=0,tA=0,fA=0,passA=0;
let gB=0,pB=0,wB=0,tB=0,fB=0,passB=0;

function updateScore(){
 scoreDisplay.innerText =
  gA+"-"+(pA<10?"0":"")+pA;

 gAEl.innerText=gA; pAEl.innerText=pA; wAEl.innerText=wA;
 tAEl.innerText=tA; fAEl.innerText=fA; passAEl.innerText=passA;

 gBEl.innerText=gB; pBEl.innerText=pB; wBEl.innerText=wB;
 tBEl.innerText=tB; fBEl.innerText=fB; passBEl.innerText=passB;
}

/* ELEMENTS */
let gAEl=gA,pAEl=pA,wAEl=wA,tAEl=tA,fAEl=fA,passAEl=passA;
let gBEl=gB,pBEl=pB,wBEl=wB,tBEl=tB,fBEl=fB,passBEl=passB;

/* FUNCTIONS */
function goalA(v){ gA=Math.max(0,gA+v); updateScore(); }
function pointA(v){ pA=Math.max(0,pA+v); updateScore(); }
function wideA(v){ wA=Math.max(0,wA+v); updateScore(); }
function turnA(v){ tA=Math.max(0,tA+v); updateScore(); }
function foulA(v){ fA=Math.max(0,fA+v); updateScore(); }
function passA(v){ passA=Math.max(0,passA+v); updateScore(); }

function goalB(v){ gB=Math.max(0,gB+v); updateScore(); }
function pointB(v){ pB=Math.max(0,pB+v); updateScore(); }
function wideB(v){ wB=Math.max(0,wB+v); updateScore(); }
function turnB(v){ tB=Math.max(0,tB+v); updateScore(); }
function foulB(v){ fB=Math.max(0,fB+v); updateScore(); }
function passB(v){ passB=Math.max(0,passB+v); updateScore(); }

/* PLAYERS */
function createPlayer(n,x,y,pitch){
 let p=document.createElement("div");
 p.className="player";
 p.innerText=n;
 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  p.style.left=(e.touches[0].clientX-rect.left-offsetX)+"px";
  p.style.top=(e.touches[0].clientY-rect.top-offsetY)+"px";
 });

 pitch.appendChild(p);
}

/* LOAD */
function load(){
 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],pitchA));
 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],pitchB));
}

window.onload=load;

</script>

</body>
</html>
