```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Match Stats</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: white;
}

.tabs {
  display: flex;
  background: #333;
}
.tab {
  flex: 1;
  padding: 15px;
  color: white;
  cursor: pointer;
}
.tab.active {
  background: #555;
}

.section {
  display: none;
  padding: 20px;
}
.section.active {
  display: block;
}

.stat-line {
  margin: 10px 0;
}

button {
  width: 40px;
  height: 40px;
  margin: 5px;
}

.value {
  display: inline-block;
  width: 30px;
}
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('colmcille')">Colmcille</div>
  <div class="tab" onclick="showTab('teamB')">Team B</div>
  <div class="tab" onclick="showTab('stats')">Stats</div>
</div>

<!-- COLMCILLE -->
<div id="colmcille" class="section active">
  <h1>Colmcille</h1>
  <p>Team layout here</p>
</div>

<!-- TEAM B -->
<div id="teamB" class="section">
  <h1>Team B</h1>
  <p>Team layout here</p>
</div>

<!-- STATS -->
<div id="stats" class="section">

  <h2>Match Stats</h2>
  <h3>Colmcille vs Team B</h3>
  <h1 id="scoreboard">0-00 | 0-00</h1>

  <hr>

  <!-- HOME -->
  <h3>Colmcille</h3>

  <div class="stat-line">
    Goals
    <button onclick="updateScore('home','goals',-1)">-</button>
    <span id="home_goals" class="value">0</span>
    <button onclick="updateScore('home','goals',1)">+</button>
  </div>

  <div class="stat-line">
    Points
    <button onclick="updateScore('home','points',-1)">-</button>
    <span id="home_points" class="value">0</span>
    <button onclick="updateScore('home','points',1)">+</button>
  </div>

  <div class="stat-line">
    Wides
    <button onclick="updateStat('home_wides',-1)">-</button>
    <span id="home_wides" class="value">0</span>
    <button onclick="updateStat('home_wides',1)">+</button>
  </div>

  <div class="stat-line">
    Fouls
    <button onclick="updateStat('home_fouls',-1)">-</button>
    <span id="home_fouls" class="value">0</span>
    <button onclick="updateStat('home_fouls',1)">+</button>
  </div>

  <div class="stat-line">
    Passes
    <button onclick="updateStat('home_passes',-1)">-</button>
    <span id="home_passes" class="value">0</span>
    <button onclick="updateStat('home_passes',1)">+</button>
  </div>

  <div class="stat-line">
    Turnovers
    <button onclick="updateStat('home_turnovers',-1)">-</button>
    <span id="home_turnovers" class="value">0</span>
    <button onclick="updateStat('home_turnovers',1)">+</button>
  </div>

  <hr>

  <!-- AWAY -->
  <h3>Team B (Score Only)</h3>

  <div class="stat-line">
    Goals
    <button onclick="updateScore('away','goals',-1)">-</button>
    <span id="away_goals" class="value">0</span>
    <button onclick="updateScore('away','goals',1)">+</button>
  </div>

  <div class="stat-line">
    Points
    <button onclick="updateScore('away','points',-1)">-</button>
    <span id="away_points" class="value">0</span>
    <button onclick="updateScore('away','points',1)">+</button>
  </div>

</div>

<script>

/* TAB SWITCH */
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

/* ✅ FIXED SCORE FUNCTION (NO CROSSOVER) */
function updateScore(team, type, change) {

  const el = document.getElementById(team + "_" + type);

  let val = parseInt(el.innerText) || 0;
  val = Math.max(0, val + change);

  el.innerText = val;

  const hg = parseInt(document.getElementById("home_goals").innerText) || 0;
  const hp = parseInt(document.getElementById("home_points").innerText) || 0;
  const ag = parseInt(document.getElementById("away_goals").innerText) || 0;
  const ap = parseInt(document.getElementById("away_points").innerText) || 0;

  document.getElementById("scoreboard").innerText =
    hg + "-" + String(hp).padStart(2,"0") +
    " | " +
    ag + "-" + String(ap).padStart(2,"0");
}

/* OTHER STATS */
function updateStat(id, change) {
  let el = document.getElementById(id);
  let val = parseInt(el.innerText) || 0;

  val = Math.max(0, val + change);
  el.innerText = val;
}

</script>

</body>
</html>
