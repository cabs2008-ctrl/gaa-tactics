<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:5px;
  padding:10px;
  color:white;
  background:#555;
  border:none;
}

.tab { display:none; }
.active { display:block; }

.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

.line {
  position:absolute;
  width:100%;
  height:2px;
  background:white;
  top:50%;
}

.player {
  width:45px;
  height:45px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:14px;
  touch-action:none;
}

.teamA { background:#1b5e20; }
.teamB { background:#1565c0; }

button { padding:8px; margin:3px; }
input { padding:8px; text-align:center; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Colmcille</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('score')">Score</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3><input id="teamAInput" value="Colmcille" oninput="updateNames()"></h3>
<div class="pitch" id="pitchA"><div class="line"></div></div>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3><input id="teamBInput" placeholder="Team B" oninput="updateNames()"></h3>
<div class="pitch" id="pitchB"><div class="line"></div></div>
</div>

<!-- SCORE -->
<div id="score" class="tab">
<h2>Match</h2>

<h3>
<span id="nameA">Colmcille</span> vs 
<span id="nameB">Team B</span>
</h3>

<h1 id="scoreDisplay">0-00 | 0-00</h1>

<h3>Colmcille</h3>
Goals <button onclick="goalA(-1)">➖</button> <span id="gA">0</span> <button onclick="goalA(1)">➕</button><br>
Points <button onclick="pointA(-1)">➖</button> <span id="pA">0</span> <button onclick="pointA(1)">➕</button><br>
Wides <button onclick="wideA(-1)">➖</button> <span id="wA">0</span> <button onclick="wideA(1)">➕</button>

<h3>Team B</h3>
Goals <button onclick="goalB(-1)">➖</button> <span id="gB">0</span> <button onclick="goalB(1)">➕</button><br>
Points <button onclick="pointB(-1)">➖</button> <span id="pB">0</span> <button onclick="pointB(1)">➕</button><br>
Wides <button onclick="wideB(-1)">➖</button> <span id="wB">0</span> <button onclick="wideB(1)">➕</button>

</div>

<script>

/* TABS */
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* TEAM NAMES */
function updateNames(){
 let a=document.getElementById("teamAInput").value || "Colmcille";
 let b=document.getElementById("teamBInput").value || "Team B";
 document.getElementById("nameA").innerText=a;
 document.getElementById("nameB").innerText=b;
}

/* SCORE */
let gA=0,pA=0,wA=0;
let gB=0,pB=0,wB=0;

function updateScore(){
 document.getElementById("scoreDisplay").innerText =
  gA+"-"+(pA<10?"0":"")+pA+" | "+
  gB+"-"+(pB<10?"0":"")+pB;

 document.getElementById("gA").innerText=gA;
 document.getElementById("pA").innerText=pA;
 document.getElementById("wA").innerText=wA;

 document.getElementById("gB").innerText=gB;
 document.getElementById("pB").innerText=pB;
 document.getElementById("wB").innerText=wB;
}

function goalA(v){ gA=Math.max(0,gA+v); updateScore(); }
function pointA(v){ pA=Math.max(0,pA+v); updateScore(); }
function wideA(v){ wA=Math.max(0,wA+v); updateScore(); }

function goalB(v){ gB=Math.max(0,gB+v); updateScore(); }
function pointB(v){ pB=Math.max(0,pB+v); updateScore(); }
function wideB(v){ wB=Math.max(0,wB+v); updateScore(); }

/* PLAYERS */
function createPlayer(n,x,y,pitch,team){
 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  p.style.left=(e.touches[0].clientX-rect.left-offsetX)+"px";
  p.style.top=(e.touches[0].clientY-rect.top-offsetY)+"px";
 });

 pitch.appendChild(p);
}

/* FORMATION */
function load(){
 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],pitchA,"teamA"));
 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],pitchB,"teamB"));
}

window.onload=load;

</script>

</body>
</html>
