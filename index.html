<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match App</title>

<style>
body { margin:0; font-family:Arial; text-align:center; }

.tab { display:none; }
.active { display:block; }

.nav { background:#333; padding:10px; }
.nav button {
  margin:3px;
  padding:8px;
  color:white;
  background:#555;
  border:none;
}

/* Pitch */
.pitch {
  width:100%;
  max-width:400px;
  height:600px;
  margin:auto;
  position:relative;
  background:#4CAF50;
  border:2px solid white;
}

/* Lines */
.line { position:absolute; width:100%; height:2px; background:white; }
.halfway { top:50%; }

/* Players */
.player {
  width:48px; height:48px;
  border-radius:50%;
  color:white;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  touch-action:none;
}

.A { background:#1b5e20; }
.B { background:#1565c0; }

button { margin:4px; padding:10px; }
</style>
</head>

<body>

<div class="nav">
<button onclick="showTab('teamA')">Columkill</button>
<button onclick="showTab('teamB')">Team B</button>
<button onclick="showTab('score')">Score</button>
</div>

<!-- TEAM A -->
<div id="teamA" class="tab active">
<h3>Columkill</h3>
<div class="pitch" id="pitchA">
<div class="line halfway"></div>
</div>
<button onclick="formation('A')">Formation</button>
</div>

<!-- TEAM B -->
<div id="teamB" class="tab">
<h3 id="teamBName" contenteditable="true" oninput="updateTeamBName()">Team B</h3>
<div class="pitch" id="pitchB">
<div class="line halfway"></div>
</div>
<button onclick="formation('B')">Formation</button>
</div>

<!-- SCORE -->
<div id="score" class="tab">

<h3>Score</h3>
<h4>Columkill vs <span id="scoreTeamB">Team B</span></h4>

<h2 id="scoreDisplay">0-00</h2>

<div>
<button onclick="goalPlus()">+ Goal</button>
<button onclick="goalMinus()">- Goal</button>
</div>

<div>
<button onclick="pointPlus()">+ Point</button>
<button onclick="pointMinus()">- Point</button>
</div>

<div>
<button onclick="widePlus()">+ Wide</button>
<button onclick="wideMinus()">- Wide</button>
</div>

<p>Wides: <span id="wides">0</span></p>

<!-- TIMER -->
<h3>Match Time</h3>
<h2 id="timer">00:00</h2>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

</div>

<script>

// TABS
function showTab(id){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// TEAM B NAME
function updateTeamBName(){
 let name = document.getElementById("teamBName").innerText;
 document.getElementById("scoreTeamB").innerText = name;
 localStorage.setItem("teamB", name);
}

// LOAD TEAM NAME
window.onload = () => {
 let saved = localStorage.getItem("teamB");
 if(saved){
  document.getElementById("teamBName").innerText = saved;
  document.getElementById("scoreTeamB").innerText = saved;
 }
};

// SCORE
let goals=0, points=0, wides=0;

function updateScore(){
 document.getElementById("scoreDisplay").innerText =
  goals + "-" + (points<10?"0":"") + points;
 document.getElementById("wides").innerText = wides;
}

function goalPlus(){ goals++; updateScore(); }
function goalMinus(){ if(goals>0) goals--; updateScore(); }

function pointPlus(){ points++; updateScore(); }
function pointMinus(){ if(points>0) points--; updateScore(); }

function widePlus(){ wides++; updateScore(); }
function wideMinus(){ if(wides>0) wides--; updateScore(); }

// PLAYERS
function createPlayer(n,x,y,team){
 let pitch = team==="A" ? pitchA : pitchB;

 let p=document.createElement("div");
 p.className="player "+team;
 p.innerText=n;

 p.style.left=x+"px";
 p.style.top=y+"px";

 let offsetX, offsetY;

 p.addEventListener("touchstart",e=>{
  offsetX=e.touches[0].clientX-p.offsetLeft;
  offsetY=e.touches[0].clientY-p.offsetTop;
 });

 p.addEventListener("touchmove",e=>{
  let rect=pitch.getBoundingClientRect();
  let x=e.touches[0].clientX-rect.left-offsetX;
  let y=e.touches[0].clientY-rect.top-offsetY;
  p.style.left=x+"px";
  p.style.top=y+"px";
 });

 p.onclick=()=>{
  let name=prompt("Player:",p.innerText);
  if(name) p.innerText=name;
 };

 pitch.appendChild(p);
}

function clear(pitch){
 pitch.innerHTML='<div class="line halfway"></div>';
}

// GAA FORMATION
function formation(team){
 let pitch = team==="A" ? pitchA : pitchB;
 clear(pitch);

 let pos=[
  [170,20],
  [60,100],[170,100],[280,100],
  [60,180],[170,180],[280,180],
  [120,260],[220,260],
  [60,340],[170,340],[280,340],
  [60,440],[170,440],[280,440]
 ];

 pos.forEach((p,i)=>createPlayer(i+1,p[0],p[1],team));
}

// TIMER
let seconds = 0;
let timerInterval = null;

function updateTimer(){
 let mins = Math.floor(seconds/60);
 let secs = seconds%60;

 document.getElementById("timer").innerText =
  (mins<10?"0":"")+mins+":"+(secs<10?"0":"")+secs;
}

function startTimer(){
 if(timerInterval) return;
 timerInterval=setInterval(()=>{
  seconds++;
  updateTimer();
 },1000);
}

function pauseTimer(){
 clearInterval(timerInterval);
 timerInterval=null;
}

function resetTimer(){
 pauseTimer();
 seconds=0;
 updateTimer();
}

</script>

</body>
</html>
