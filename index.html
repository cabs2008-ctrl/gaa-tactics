<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAA Match Tracker</title>

<style>
body { font-family: Arial; margin: 0; text-align: center; }
.tabs { display: flex; background: #333; }
.tab { flex: 1; padding: 14px; color: white; cursor: pointer; }
.tab.active { background: #555; }
.section { display: none; padding: 10px; }
.section.active { display: block; }

.pitch { position: relative; width: 95vw; height: 70vh; margin: 10px auto; border: 3px solid #333; }
.green { background: green; }
.blue { background: #1e90ff; }

.player {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 55px; height: 55px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  font-size: 12px;
  display:flex; flex-direction:column; justify-content:center;
  cursor:pointer;
}

.subs { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:12px auto; }

.sub {
  width:55px;height:55px;border-radius:50%;
  background:rgba(255,255,255,0.7);
  font-size:11px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  cursor:pointer;
}

.stat-row {
  display:flex; justify-content:space-between; align-items:center;
  margin:10px auto; padding:12px;
  width:92%; max-width:420px;
  background:#f4f4f4; border-radius:14px;
}

.btn-minus,.btn-plus {
  width:35px;height:35px;border:none;border-radius:10px;font-size:18px;
}
.btn-minus{background:#ff4d4d;color:white;}
.btn-plus{background:#28a745;color:white;}

.clock { font-size:26px;font-weight:bold; }

.score-row {
  padding:10px;
  margin:10px auto;
  max-width:420px;
  background:#555;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('home',this)">Home</div>
  <div class="tab" onclick="showTab('away',this)">Away</div>
  <div class="tab" onclick="showTab('stats',this)">Stats</div>
  <div class="tab" onclick="showTab('history',this)">History</div>
</div>

<div id="home" class="section active">
<h2 onclick="editTeamName('home',this)">Home</h2>
<button onclick="resetTeam('home')">Reset</button>
<button onclick="saveMatch()">Save Match</button>
<button onclick="shareMatch()">Share</button>
<div class="pitch green" id="homePitch"></div>
<div id="homeSubs" class="subs"></div>
</div>

<div id="away" class="section">
<h2 onclick="editTeamName('away',this)">Away</h2>
<button onclick="resetTeam('away')">Reset</button>
<button onclick="saveMatch()">Save Match</button>
<button onclick="shareMatch()">Share</button>
<div class="pitch blue" id="awayPitch"></div>
<div id="awaySubs" class="subs"></div>
</div>

<div id="stats" class="section">
<h2>Stats</h2>

<div id="scoreboard"></div>

<div class="clock" id="matchClock">00:00</div>
<button onclick="startClock()">Start</button>
<button onclick="pauseClock()">Pause</button>
<button onclick="resetClock()">Reset</button>

<h3>Home</h3>
<div id="homeStats"></div>

<h3>Away</h3>
<div id="awayStats"></div>
</div>

<div id="history" class="section">
<h2>Saved Matches</h2>
<div id="teamList"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* UI */
function showTab(id,el){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 el.classList.add('active');
}

/* DATA */
const positions=[[92,50],[78,25],[78,50],[78,75],[62,25],[62,50],[62,75],[46,40],[46,60],[30,25],[30,50],[30,75],[14,25],[14,50],[14,75]];

let data={home:{name:"Home",players:Array(15).fill(""),subs:Array(5).fill("")},away:{name:"Away",players:Array(15).fill(""),subs:Array(5).fill("")}};

let stats={home:{goals:0,points:0,wides:0,passes:0,turnovers:0,tackles:0},away:{goals:0,points:0}};

/* RENDER */
function renderPitch(team){
 document.getElementById(team+"Pitch").innerHTML=
 positions.map((p,i)=>`<div class="player" style="top:${p[0]}%;left:${p[1]}%" onclick="editPlayer('${team}',${i})">${i+1}<br>${data[team].players[i]}</div>`).join("");
}

function renderSubs(team){
 document.getElementById(team+"Subs").innerHTML=
 data[team].subs.map((s,i)=>`<div class="sub" onclick="editSub('${team}',${i})">${i+16}<br>${s}</div>`).join("");
}

/* EDIT */
function editPlayer(team,i){
 let n=prompt("Player:",data[team].players[i]);
 if(n!==null){data[team].players[i]=n;renderPitch(team);}
}
function editSub(team,i){
 let n=prompt("Sub:",data[team].subs[i]);
 if(n!==null){data[team].subs[i]=n;renderSubs(team);}
}
function editTeamName(team,el){
 let n=prompt("Team Name:",data[team].name);
 if(n){data[team].name=n;el.innerText=n;updateScore();}
}

/* STATS */
function renderStats(){
 document.getElementById("homeStats").innerHTML=`
 <div class="stat-row"><button onclick="updateScoreStat('home','goals',-1)">-G</button><span>GOALS ${stats.home.goals}</span><button onclick="updateScoreStat('home','goals',1)">+G</button></div>
 <div class="stat-row"><button onclick="updateScoreStat('home','points',-1)">-P</button><span>POINTS ${stats.home.points}</span><button onclick="updateScoreStat('home','points',1)">+P</button></div>
 <div class="stat-row"><button onclick="updateStat('home','wides',-1)">-</button><span>WIDES ${stats.home.wides}</span><button onclick="updateStat('home','wides',1)">+</button></div>
 `;

 document.getElementById("awayStats").innerHTML=`
 <div class="stat-row"><button onclick="updateScoreStat('away','goals',-1)">-G</button><span>GOALS ${stats.away.goals}</span><button onclick="updateScoreStat('away','goals',1)">+G</button></div>
 `;
}

function updateScoreStat(team,type,val){
 stats[team][type]+=val;
 if(stats[team][type]<0) stats[team][type]=0;
 renderStats();
 updateScore();
}
function updateStat(team,type,val){
 stats[team][type]+=val;
 if(stats[team][type]<0) stats[team][type]=0;
 renderStats();
}

/* SCORE */
function updateScore(){
 function total(g,p){return g*3+p;}
 let h=total(stats.home.goals,stats.home.points);
 let a=total(stats.away.goals,stats.away.points);

 document.getElementById("scoreboard").innerHTML=
 `<div class="score-row">${data.home.name} ${stats.home.goals}-${stats.home.points} (${h}) | ${data.away.name} ${stats.away.goals}-${stats.away.points} (${a})</div>`;
}

/* CLOCK */
let timer=null,seconds=0;
function updateClock(){
 let m=String(Math.floor(seconds/60)).padStart(2,'0');
 let s=String(seconds%60).padStart(2,'0');
 document.getElementById("matchClock").innerText=`${m}:${s}`;
}
function startClock(){if(timer)return;timer=setInterval(()=>{seconds++;updateClock();},1000);}
function pauseClock(){clearInterval(timer);timer=null;}
function resetClock(){pauseClock();seconds=0;updateClock();}

/* SAVE MATCH */
function saveMatch(){
 let matches=JSON.parse(localStorage.getItem("gaaMatches")||"[]");
 matches.push({data:JSON.parse(JSON.stringify(data)),stats:JSON.parse(JSON.stringify(stats)),time:seconds});
 localStorage.setItem("gaaMatches",JSON.stringify(matches));
 renderMatches();
}

function renderMatches(){
 let matches=JSON.parse(localStorage.getItem("gaaMatches")||"[]");
 document.getElementById("teamList").innerHTML=
 matches.map((m,i)=>`<div>Match ${i+1} <button onclick="loadMatch(${i})">Load</button></div>`).join("");
}

function loadMatch(i){
 let matches=JSON.parse(localStorage.getItem("gaaMatches")||"[]");
 let m=matches[i];
 data=m.data; stats=m.stats; seconds=m.time;
 renderPitch("home"); renderPitch("away");
 renderSubs("home"); renderSubs("away");
 renderStats(); updateScore(); updateClock();
}

/* SHARE */
function shareMatch(){
 html2canvas(document.querySelector('.section.active')).then(c=>{
  let link=document.createElement("a");
  link.download="match.png";
  link.href=c.toDataURL();
  link.click();
 });
}

/* INIT */
window.onload=function(){
 renderPitch("home"); renderPitch("away");
 renderSubs("home"); renderSubs("away");
 renderStats(); updateScore(); updateClock();
 renderMatches();
};

</script>

</body>
</html>
